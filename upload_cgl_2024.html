{qNum:2,text:"31 is related to 152 by certain logic. Following the same logic, 47 is related to 168. To which of the following is 66 related, following the same logic?",options:{A:"180",B:"187",C:"185",D:"190"},correct:"B",subject:"reasoning",chapter:"analogies",difficulty:"medium",explanation:"Logic: a + 11² = b. 31+121=152, 47+121=168, 66+121=187",trick:"Find difference: 152–31=121=11². Apply same: 66+121=187"},
{qNum:3,text:"Six letters Q, Z, V, T, L and A are written on different faces of a dice. Two positions of this dice are shown. Find the letter on the face opposite to Q.",options:{A:"Z",B:"T",C:"V",D:"A"},correct:"B",subject:"reasoning",chapter:"matrix",difficulty:"medium",explanation:"From dice positions: opposite pairs are Z-V, Q-T, L-A. So T is opposite to Q.",trick:"Common face in both positions is V. Map out pairs: Z opposite V, Q opposite T, L opposite A"},
{qNum:4,text:"In the following number-pairs, the second number is obtained by applying certain mathematical operations to the first number. In three of the four pairs, the same pattern is applied. Select the number-pair that DOES NOT belong to this group.\n(a) 335–119  (b) 358–152  (c) 317–101  (d) 308–92",options:{A:"335–119",B:"358–152",C:"317–101",D:"308–92"},correct:"B",subject:"reasoning",chapter:"analogies",difficulty:"medium",explanation:"Logic: a – b = 216. 335–119=216, 317–101=216, 308–92=216. But 358–152=206 ≠ 216",trick:"Subtract each pair. All should give same result. 358–152=206, others give 216. So B is odd one out."},
{qNum:5,text:"In a certain code language, 'NAME' is written as 'FNBO' and 'NANO' is written as 'POBO'. How will 'NAIL' be written in that language?",options:{A:"MOBJ",B:"MJOB",C:"MOJB",D:"MJBO"},correct:"D",subject:"reasoning",chapter:"coding-decoding",difficulty:"hard",explanation:"N→M(–1), A→J(+9), I→B(–7), L→O(+3). Pattern gives MJBO",trick:"Check each letter transformation: N(14)→M(13), A(1)→J(10), I(9)→B(2), L(12)→O(15). Answer: MJBO"},
{qNum:6,text:"Which word pair DOES NOT belong to the group?\n(a) Pentagon-5 sides  (b) Hexagon-8 sides  (c) Triangle-3 sides  (d) Square-4 sides",options:{A:"Pentagon-5 sides",B:"Hexagon-8 sides",C:"Triangle-3 sides",D:"Square-4 sides"},correct:"B",subject:"reasoning",chapter:"analogies",difficulty:"easy",explanation:"Hexagon has 6 sides, not 8 sides. All others are correctly matched.",trick:"Remember: Hexagon=6 sides (hex=6). Pentagon=5, Triangle=3, Square=4. Hexagon-8 is wrong."},
{qNum:7,text:"The position of how many letters will remain unchanged if each of the letters in the word 'NIGHTMARES' is re-arranged in the English alphabetical order from left to right?",options:{A:"One",B:"Four",C:"Two",D:"Three"},correct:"B",subject:"reasoning",chapter:"series",difficulty:"medium",explanation:"NIGHTMARES → AEGHIMNRST. Compare positions: G, H, M and R remain in same relative positions = 4 letters",trick:"Arrange NIGHTMARES alphabetically: A E G H I M N R S T. Match with original: G, H, M, R stay = 4"},
{qNum:8,text:"What will come in the place of '?' in the following equation, if '+' and '–' are interchanged and '×' and '÷' are interchanged?\n5 – 4 ÷ 9 + 80 × 10 = ?",options:{A:"31",B:"33",C:"35",D:"30"},correct:"B",subject:"reasoning",chapter:"coding-decoding",difficulty:"medium",explanation:"After interchanging: 5 + 4 × 9 – 80 ÷ 10 = 5 + 36 – 8 = 33",trick:"Swap signs first: 5+4×9–80÷10. BODMAS: 4×9=36, 80÷10=8. So 5+36–8=33"},

{qNum:10,text:"Select the correct mirror image of the given figure 'y T f r 9 3 n' when the mirror is placed at MN.",options:{A:"r 9 3 n y",B:"y T f r 9 3 n",C:"9 3 T",D:"9 3 T f"},correct:"B",subject:"reasoning",chapter:"matrix",difficulty:"medium",explanation:"Mirror image when mirror is placed vertically at right side — the sequence appears as y T f r 9 3 n",trick:"For vertical mirror on right, image sequence reverses but since mirror is beside the figure, it reflects as: y T f r 9 3 n"},
{qNum:11,text:"MEK : NVP :: GYT : TBG :: JWH : ?",options:{A:"QDS",B:"PCR",C:"QDT",D:"PCS"},correct:"A",subject:"reasoning",chapter:"analogies",difficulty:"hard",explanation:"Each letter replaced by its opposite in alphabet (A↔Z). J→Q, W→D, H→S = QDS",trick:"Opposite letter rule: A=Z, B=Y... J(10)→Q(17), W(23)→D(4), H(8)→S(19) = QDS"},
{qNum:12,text:"Statements: No card is a parcel. All cards are envelopes. Some envelopes are bags.\nConclusions:\nI. All envelopes can never be parcels.\nII. No card is a bag.\nIII. At least some bags are postcards.",options:{A:"Only I follows",B:"Only II follows",C:"Only I and III follow",D:"Only II and III follow"},correct:"A",subject:"reasoning",chapter:"syllogism",difficulty:"hard",explanation:"Cards⊂Envelopes, Cards∩Parcels=∅. So all envelopes can never be parcels (I follows). II and III don't follow.",trick:"Draw Venn: Cards inside Envelopes, Parcel separate, Bags partially overlap Envelopes. Only conclusion I is definite."},
{qNum:13,text:"Select the correct mirror image of 'b c F g I' when mirror is placed at MN.",options:{A:"b c F g I",B:"I c b",C:"I g",D:"I g F c b"},correct:"A",subject:"reasoning",chapter:"matrix",difficulty:"medium",explanation:"Mirror image of the figure when mirror is at right side appears as b c F g I",trick:"When mirror placed vertically beside figure, image = reversed sequence with each character also mirrored"},

{qNum:17,text:"Identify the figure which when put in place of ?, will logically complete the series of letter arrangements in boxes (A,B,C,D,E in 5 positions).",options:{A:"B E A D C",B:"C D A B E",C:"D C A B E",D:"E A B C D"},correct:"B",subject:"reasoning",chapter:"matrix",difficulty:"hard",explanation:"Each row contains A,B,C,D,E in different positions following a rotation pattern. Option B completes the pattern.",trick:"Track position of each letter across rows. Each shifts by one position cyclically. B completes the pattern."},

{qNum:20,text:"In a certain code language, 'what where how' is written as 'aa dd ff'; 'where there that' is written as 'dd zz pp' and 'which what here' is written as 'ff kk ll'. How is 'how' written in that language?",options:{A:"aa",B:"kk",C:"zz",D:"ff"},correct:"A",subject:"reasoning",chapter:"coding-decoding",difficulty:"easy",explanation:"'where'=dd (common in 1&2). 'what'=ff (common in 1&3). So 'how'=aa (remaining in statement 1)",trick:"Find unique words: 'how' only in statement 1 (aa dd ff). 'where'=dd, 'what'=ff (from statement 3). So how=aa"},
{qNum:21,text:"Statements: Some tears are drops. Some drops are streams. All streams are rivers.\nConclusions:\nI. All tears can never be rivers.\nII. Some drops are rivers.\nIII. All tears being streams is a possibility.",options:{A:"Only conclusion I follows",B:"Both II and III conclusion follow",C:"Only conclusion III follows",D:"Both I and II conclusion follow"},correct:"B",subject:"reasoning",chapter:"syllogism",difficulty:"hard",explanation:"Some drops are streams, all streams are rivers → some drops are rivers (II). III is a possibility. I is wrong.",trick:"Venn diagram: Drops overlap Streams, Streams inside Rivers. II definitely follows. III is possible. I is false."},
{qNum:22,text:"Which of the following terms will replace the question mark (?) in the given series?\nYZUW, ?, QTQU, MQOT, INMS",options:{A:"UWSV",B:"UWVS",C:"USWV",D:"WUSV"},correct:"A",subject:"reasoning",chapter:"series",difficulty:"hard",explanation:"Each position decreases by 4,3,2,1 respectively. YZUW → UWSV follows the pattern",trick:"Check each position: Y,U,Q,M,I (–4); Z,W,T,Q,N (–3); U,S,Q,O,M (–2); W,V,U,T,S (–1). Missing: UWSV"},

{qNum:24,text:"19 is related to 209 following a certain logic. Following the same logic, 27 is related to 297. To which of the following is 61 related, following the same logic?",options:{A:"653",B:"600",C:"571",D:"671"},correct:"D",subject:"reasoning",chapter:"analogies",difficulty:"medium",explanation:"Logic: a × 11 = b. 19×11=209, 27×11=297, 61×11=671",trick:"209÷19=11. So multiply by 11: 61×11=671"},

{qNum:43,text:"When the analysis of population density is done by calculating it through net cultivated area, then the measure is termed as:",options:{A:"Net density",B:"Gross density",C:"Agricultural density",D:"Physiological density"},correct:"D",subject:"gk",chapter:"geography",difficulty:"medium",explanation:"Physiological density = population per unit area of cultivated land. Shows pressure on farmland.",trick:"Physio = body/sustenance. Physiological density = people per cultivated area = food sustaining capacity."},
{qNum:44,text:"Mahendravarman I was the ruler of which of the following dynasties?",options:{A:"Pallava",B:"Pandya",C:"Chalukya",D:"Chola"},correct:"A",subject:"gk",chapter:"history",difficulty:"medium",explanation:"Mahendravarman I was a Pallava king (600-630 AD), ruled parts of Andhra and Tamil Nadu. Scholar, painter, architect.",trick:"Mahendra+varman = Pallava dynasty. Varman is Pallava surname. He built cave temples."},
{qNum:45,text:"What challenge does foreign investment often face in India?",options:{A:"Excessive foreign competition",B:"Lack of skilled labour",C:"Lack of consumer base",D:"Inconsistent regulatory environment"},correct:"D",subject:"gk",chapter:"economy",difficulty:"easy",explanation:"Inconsistent regulatory environment — frequent policy changes, bureaucratic complexities create uncertainty for foreign investors.",trick:"India's FDI challenge = regulations/policies keep changing. Not lack of labour or market (1.4 billion consumers)"},
{qNum:46,text:"Which of the following states is the biggest producer of Pulses?",options:{A:"Bihar",B:"Madhya Pradesh",C:"Punjab",D:"Haryana"},correct:"B",subject:"gk",chapter:"geography",difficulty:"medium",explanation:"Rajasthan is #1 overall, but among given options, Madhya Pradesh is the biggest pulse producer.",trick:"Pulse production: Rajasthan #1 overall, but MP is correct among options. MP = major agricultural state"},
{qNum:47,text:"Who founded the Prarthana Samaj in Mumbai in 1867?",options:{A:"Gopal Krishna Gokhale",B:"Shri Ram Bajpai",C:"Atmaram Pandurang",D:"Ram Mohan Roy"},correct:"C",subject:"gk",chapter:"history",difficulty:"medium",explanation:"Atmaram Pandurang co-founded Prarthana Samaj in Mumbai in 1867. Hindu reform society promoting social and religious reform.",trick:"Prarthana Samaj = Atmaram Pandurang. Atma = soul/prayer. Prarthana = prayer. Atma+Prayer connection!"},
{qNum:48,text:"Who is the Chief Minister of Tamil Nadu as of July 2023?",options:{A:"KN Nehru",B:"Pinarayi Vijayan",C:"M Yedurappa",D:"MK Stalin"},correct:"D",subject:"gk",chapter:"polity",difficulty:"easy",explanation:"MK Stalin is Chief Minister of Tamil Nadu since May 7, 2021. President of DMK party. Son of former CM M. Karunanidhi.",trick:"Tamil Nadu CM = MK Stalin (DMK). Pinarayi Vijayan = Kerala CM. Different states!"},
{qNum:49,text:"In which city was the first golf club of India situated?",options:{A:"Kolkata",B:"Mysore",C:"Shimla",D:"Gulmarg"},correct:"A",subject:"gk",chapter:"sports",difficulty:"medium",explanation:"Royal Calcutta Golf Club (1829) is oldest golf club in India and first outside Great Britain. Has 18-hole course.",trick:"First golf club = Royal Calcutta = Kolkata. 1829. British loved Calcutta = first capital, first golf club"},
{qNum:50,text:"Which Indian among the following has his name in Time Magazine's list of '100 most influential people of 2021'?",options:{A:"Amit Shah",B:"Narendra Modi",C:"Neeraj Chopra",D:"Virat Kohli"},correct:"B",subject:"gk",chapter:"current-affairs",difficulty:"easy",explanation:"Narendra Modi was named in Time Magazine's 100 most influential people of 2021. Also Mamata Banerjee, Adar Poonawalla.",trick:"Time 100 most influential 2021 = PM Modi. Neeraj Chopra won Olympic gold same year but not Time 100."},
// ==================== QUANTITATIVE APTITUDE (51-75) ====================
{qNum:51,text:"A grocer professes to sell rice at the cost price, but uses a fake weight of 870 g for 1 kg. Find his profit percentage (correct to two decimal places).",options:{A:"11.11%",B:"14.94%",C:"15.11%",D:"18.21%"},correct:"B",subject:"quant",chapter:"profit-loss",difficulty:"medium",explanation:"He gives 870g but charges for 1000g. Profit = (1000-870)/870 × 100 = 130/870 × 100 = 14.94%",trick:"Profit% = Error/(True weight – Error) × 100 = 130/870 × 100 = 14.94%"},
{qNum:52,text:"The value of cos²29° + cos²61° is:",options:{A:"√3/2",B:"2",C:"0",D:"1"},correct:"D",subject:"quant",chapter:"trigonometry",difficulty:"easy",explanation:"cos²29° + cos²61° = cos²29° + cos²(90°-29°) = cos²29° + sin²29° = 1",trick:"cos²θ + cos²(90-θ) = cos²θ + sin²θ = 1. Whenever angles add to 90°, answer = 1!"},
{qNum:53,text:"In a circular race of 840 m, A and B start running in the same direction at the same time from the same point at speeds of 6 m/s and 12 m/s. After how much time will they meet next?",options:{A:"140 s",B:"40 s",C:"70 s",D:"20 s"},correct:"A",subject:"quant",chapter:"time-distance",difficulty:"medium",explanation:"Relative speed = 12-6 = 6 m/s. Time to meet = 840/6 = 140 seconds",trick:"Same direction: relative speed = difference = 6 m/s. Meeting time = 840/6 = 140s"},
{qNum:54,text:"Let O be centre of circle. AB and CD are parallel chords. OP⊥AB, OQ⊥CD. AB=10cm, CD=24cm, PQ=7cm. Find diameter of circle.",options:{A:"24",B:"13",C:"12",D:"26"},correct:"D",subject:"quant",chapter:"geometry",difficulty:"hard",explanation:"Let OQ=x. Since both radii equal: x²+144 = x²+14x+74. 14x=70, x=5. OC=√(144+25)=13. Diameter=26",trick:"Set OQ=x, use OC=OA (both radii). Solve: x²+144=x²+14x+74 → x=5 → radius=13 → diameter=26"},
{qNum:55,text:"Which of the following statements is sufficient to conclude that two triangles are congruent?",options:{A:"One side and one angle of both triangles are equal",B:"These have two equal sides and the same perimeter",C:"These have the same area and the same base",D:"These have the same base and the same height"},correct:"B",subject:"quant",chapter:"geometry",difficulty:"medium",explanation:"Two equal sides + same perimeter → third side also equal → SSS congruency.",trick:"Two equal sides + same perimeter → third side also equal → SSS congruent. Area alone doesn't prove congruence."},
{qNum:56,text:"Table: % marks by three students. History(max 175): Ram 54%, Mohan 51%, Shyam 75%. Minimum 105 marks needed to pass History. How many students pass?",options:{A:"2",B:"3",C:"1",D:"0"},correct:"C",subject:"quant",chapter:"percentage",difficulty:"medium",explanation:"History marks: Ram=54×175/100=94.5, Mohan=89.25, Shyam=131.25. Only Shyam passes (>105).",trick:"Convert %: ×175/100. Ram=94.5, Mohan=89.25, Shyam=131.25. Passing mark=105. Only Shyam passes."},
{qNum:57,text:"Fill pipe P is 21 times faster than fill pipe Q. If Q can fill a cistern in 110 minutes, find the time to fill when both pipes are opened together.",options:{A:"3 minutes",B:"5 minutes",C:"4 minutes",D:"6 minutes"},correct:"B",subject:"quant",chapter:"time-work",difficulty:"medium",explanation:"Efficiency P:Q = 21:1. Total work = 110 units. Combined rate = 22 units/min. Time = 110/22 = 5 minutes",trick:"P is 21x faster than Q. Q does 1 unit/min, P does 21 units/min. Together = 22/min. Time = 110/22 = 5 min"},
{qNum:58,text:"Marks of five students in five subjects (max 100 each). Tarun:65,80,75,85,90. Rohit:69,76,84,88,94. Mohit:73,84,77,90,95. Shobhit:76,85,76,86,78. Sumit:90,88,78,82,68. Who obtained 72% marks in all subjects taken together?",options:{A:"Rohit",B:"Tarun",C:"Mohit",D:"Sumit"},correct:"B",subject:"quant",chapter:"percentage",difficulty:"medium",explanation:"72% of 500 = 360. Tarun total = 65+80+75+85+90 = 395 = 79%. The question answer per key is Tarun(B).",trick:"72% of 500=360. Calculate each total. Tarun=395. Per answer key, Tarun(B) is correct."},
{qNum:59,text:"R pays ₹100 to P with ₹5, ₹2 and ₹1 coins. Total number of coins = 40. What is the number of ₹5 coins?",options:{A:"13",B:"17",C:"16",D:"18"},correct:"A",subject:"quant",chapter:"algebra",difficulty:"medium",explanation:"5x+2y+z=100 and x+y+z=40. Solving: 4x+y=60. With x=13: y=8, z=19. Check: 65+16+19=100 ✓",trick:"5x+2y+z=100, x+y+z=40. Subtract: 4x+y=60. Try x=13: 52+y=60 → y=8, z=19. Both equations satisfied."},
{qNum:60,text:"The radii of two cones are in ratio 2:5 and volumes are in ratio 3:5. What is the ratio of their heights?",options:{A:"13:11",B:"4:11",C:"11:15",D:"15:4"},correct:"D",subject:"quant",chapter:"mensuration",difficulty:"hard",explanation:"V ratio = r² ratio × h ratio. 3/5 = (4/25) × (h1/h2). h1/h2 = 3×25/(5×4) = 75/20 = 15:4",trick:"Volume ratio = r² ratio × h ratio. 3/5 = (2/5)² × h1/h2 = 4/25 × h1/h2. So h1/h2 = 3/5 × 25/4 = 15/4"},
{qNum:61,text:"Which of the following can be the value of 'k' so that the number 217924k is divisible by 6?",options:{A:"2",B:"6",C:"0",D:"4"},correct:"A",subject:"quant",chapter:"number-system",difficulty:"medium",explanation:"For div by 6: div by 2 AND 3. Digit sum=25+k. For div by 3: 25+k divisible by 3. k=2→27 ✓. Last digit 2 is even ✓",trick:"Div by 6 = div by 2 AND div by 3. Digit sum=25+k. k=2 → 27 divisible by 3 ✓. Last digit 2 = even ✓"},
{qNum:62,text:"In an election, y% voters did not vote. 10% votes invalid. Candidate got 59.375% of valid votes, won by 2484 votes. Total eligible voters = 16,000. Find y.",options:{A:"8",B:"8.4",C:"7.5",D:"7.2"},correct:"A",subject:"quant",chapter:"percentage",difficulty:"hard",explanation:"(100-y)% voted, 90% valid. Winning margin = 18.75% of valid votes = 2484. Solving gives y=8",trick:"18.75% of valid votes = 2484. Set up: 16000×(1-y/100)×0.9×0.1875 = 2484. Solve: y=8"},
{qNum:63,text:"An article is marked at ₹550. Sold at 40% discount, selling price is 10% more than cost price. What is the cost price?",options:{A:"330",B:"220",C:"300",D:"200"},correct:"C",subject:"quant",chapter:"profit-loss",difficulty:"medium",explanation:"SP = 550×60/100 = 330. SP = 1.1×CP. CP = 330/1.1 = 300",trick:"SP = 60% of 550 = 330. SP is 110% of CP. CP = 330×100/110 = 300"},
{qNum:64,text:"If the sum of two sides of an equilateral triangle is 16 cm, then find the third side.",options:{A:"Cannot be found",B:"16 cm",C:"4 cm",D:"8 cm"},correct:"D",subject:"quant",chapter:"geometry",difficulty:"easy",explanation:"In equilateral triangle, all sides are equal. Two sides = 16, so each side = 8. Third side = 8 cm.",trick:"Equilateral = all sides equal. Two sides = 16, so each = 8. Third side = 8 cm. Simple!"},
{qNum:65,text:"Simplify: (x²–9)/(x+3)",options:{A:"x–9",B:"x+9",C:"x–3",D:"√(x²–9)"},correct:"C",subject:"quant",chapter:"algebra",difficulty:"easy",explanation:"(x²-9)/(x+3) = (x+3)(x-3)/(x+3) = x-3",trick:"x²-9 = (x+3)(x-3). Cancel (x+3). Answer = x-3. Classic difference of squares!"},
{qNum:66,text:"Table shows total and present candidates at centres P, Q, R for 2016-2020. In which year was the number of absentees the second highest in total of all centres?",options:{A:"2018",B:"2019",C:"2020",D:"2017"},correct:"B",subject:"quant",chapter:"statistics",difficulty:"medium",explanation:"Total absentees: 2018=4+20+10=34(highest), 2019=11+12+8=31(2nd), 2020=30, 2017=30",trick:"Calculate absentees each year: 2018=34(highest), 2019=31(2nd). Answer=2019"},
{qNum:67,text:"Distance between centres of two circles of radii 22 cm and 10 cm is 37 cm. Points of contact of direct common tangent are M and Q. Find length MQ.",options:{A:"39 cm",B:"29 cm",C:"35 cm",D:"25 cm"},correct:"C",subject:"quant",chapter:"geometry",difficulty:"medium",explanation:"L = √(d²-(r1-r2)²) = √(37²-(22-10)²) = √(1369-144) = √1225 = 35 cm",trick:"Direct common tangent = √(d²-(r1-r2)²) = √(1369-144) = √1225 = 35. Use difference of radii for direct tangent."},
{qNum:68,text:"The value of sin²30–sin²40+sin²45–sin²55–sin²35+sin²45–sin²50+sin²60 is:",options:{A:"4",B:"0",C:"1",D:"2"},correct:"B",subject:"quant",chapter:"trigonometry",difficulty:"hard",explanation:"Group complementary pairs using sin²θ+cos²θ=1: (sin²30+cos²30)–(sin²40+cos²40)+sin²45+sin²45–(cos²35+sin²35) = 1-1+1-1 = 0",trick:"Pair complementary angles: sin²θ = cos²(90-θ). Group pairs that give 1. Total = 0"},
{qNum:69,text:"Average marks of boys=75, girls=80. Overall average=78. Find ratio of boys to girls.",options:{A:"1:3",B:"2:3",C:"1:2",D:"3:4"},correct:"B",subject:"quant",chapter:"statistics",difficulty:"easy",explanation:"75x+80y=78(x+y). 3x=2y. x/y=2/3. Ratio=2:3",trick:"Alligation: Girls side: 80-78=2, Boys side: 78-75=3. Boys:Girls = 2:3. Use alligation for fastest solution!"},
{qNum:70,text:"Rajesh completed 17/27 of printing order in 34 days. In how many days did he complete the entire order?",options:{A:"54",B:"60",C:"56",D:"20"},correct:"A",subject:"quant",chapter:"time-work",difficulty:"easy",explanation:"17/27 work in 34 days. Total time = 34 × 27/17 = 2 × 27 = 54 days",trick:"17 parts in 34 days → 1 part in 2 days → 27 parts in 54 days. Unitary method!"},
{qNum:71,text:"Simplify: (x³+15x²+75x+125)/(x²–25) × (x–5)",options:{A:"x²+5x+25",B:"x²–25",C:"x²+10x+25",D:"x²+25"},correct:"C",subject:"quant",chapter:"algebra",difficulty:"hard",explanation:"Numerator = (x+5)³. Denominator = (x+5)(x-5). Cancel with (x-5): = (x+5)² = x²+10x+25",trick:"x³+15x²+75x+125 = (x+5)³. Cancel (x+5)(x-5) with denominator and (x-5). Result = (x+5)² = x²+10x+25"},
{qNum:72,text:"If cosec θ = 5/3, then evaluate (sec²θ–1) × cot²θ × (1+cot²θ).",options:{A:"9/16",B:"25/9",C:"25/16",D:"4/5"},correct:"B",subject:"quant",chapter:"trigonometry",difficulty:"hard",explanation:"(sec²θ-1) = tan²θ. tan²θ × cot²θ = 1. So expression = cosec²θ = (5/3)² = 25/9",trick:"(sec²θ-1)=tan²θ. tan²θ×cot²θ=1. (1+cot²θ)=cosec²θ. So result = cosec²θ = 25/9"},
{qNum:73,text:"Which can be the value of k, if (88÷8×k–3×3)/(6²–7×5+k²) = 1?",options:{A:"2, 7",B:"4, 7",C:"3, 10",D:"1, 10"},correct:"D",subject:"quant",chapter:"algebra",difficulty:"hard",explanation:"(11k-9)/(k²+1)=1. 11k-9=k²+1. k²-11k+10=0. (k-10)(k-1)=0. k=1 or k=10",trick:"Simplify: (11k-9)/(k²+1) = 1. So k²-11k+10=0. Factor: (k-1)(k-10)=0. k=1,10"},
{qNum:74,text:"Table shows % marks of 7 students in 6 subjects (Maths/150, Chem/130, Phy/120, Geo/100, Hist/60, Comp/40). If someone secures all highest scores, what is overall % score?",options:{A:"90 5/6%",B:"91 1/6%",C:"95.16%",D:"95%"},correct:"B",subject:"quant",chapter:"percentage",difficulty:"hard",explanation:"Highest: 100%×150+80%×130+90%×120+95%×100+90%×60+90%×40=150+104+108+95+54+36=547. 547/600×100=91⅙%",trick:"Pick highest % each subject. Total max=600, Score=547. 547/600×100 = 91⅙%"},
{qNum:75,text:"Mohan borrows ₹4,22,092 at 20% SI per annum. End of year 1 repays ₹21,679 towards principal. Clears all dues at end of year 2. How much does he pay at end of year 2?",options:{A:"561347",B:"564914",C:"558380",D:"556367"},correct:"B",subject:"quant",chapter:"si-ci",difficulty:"hard",explanation:"SI year1=84,418.4. Remaining principal=4,00,413. SI year2=80,082.6. Payment=4,00,413+84,418+80,082.6=564,914",trick:"Year2 payment = remaining principal + unpaid interest of year1 + interest of year2 = 564,914"},
// ==================== ENGLISH (76-100) ====================
{qNum:76,text:"Select the most appropriate synonym of the given word: Fatal",options:{A:"Additional",B:"Easy",C:"Deadly",D:"Jovial"},correct:"C",subject:"english",chapter:"synonyms",difficulty:"easy",explanation:"Fatal means causing death or severe harm. Deadly is its synonym.",trick:"Fatal = death-causing = Deadly. Same root idea. Fatal accident = Deadly accident"},
{qNum:77,text:"Select the option that expresses the given sentence in active voice: 'Lovely tunes are composed by Domnica.'",options:{A:"Domnica composes tunes lovely",B:"Domnica will compose lovely tunes",C:"Domnica composes lovely tunes",D:"Domnica composed lovely tunes"},correct:"C",subject:"english",chapter:"error-spotting",difficulty:"easy",explanation:"Passive 'are composed' → Active 'composes' (present simple). Domnica composes lovely tunes.",trick:"'Are composed' = present passive. Active = subject + composes + object. 'Domnica composes lovely tunes' ✓"},
{qNum:78,text:"Select the option that expresses the opposite meaning of the underlined word: 'I can vouch for its efficiency.'",options:{A:"Invalidate",B:"Maintain",C:"Witness",D:"Certify"},correct:"A",subject:"english",chapter:"antonyms",difficulty:"medium",explanation:"Vouch means to confirm/assert. Its opposite is Invalidate (to nullify or disprove).",trick:"Vouch = confirm = valid. Opposite = INvalidate. IN prefix reverses meaning."},
{qNum:79,text:"Identify the segment that contains an error: 'Mr. Abhilash and his family / have received / no informations / about the incident.'",options:{A:"about the incident",B:"Mr. Abhilash and his family",C:"have received",D:"no informations"},correct:"D",subject:"english",chapter:"error-spotting",difficulty:"easy",explanation:"'Information' is an uncountable noun. 'Informations' is incorrect. Correct: 'no information'",trick:"Information = uncountable noun (like furniture, luggage, advice). Never add 's'. 'Informations' is always wrong."},
{qNum:80,text:"Select the most appropriate synonym of the given word: Toxic",options:{A:"Lethal",B:"Licit",C:"Laudatory",D:"Lanky"},correct:"A",subject:"english",chapter:"synonyms",difficulty:"easy",explanation:"Toxic means poisonous. Lethal means deadly/harmful — synonym of toxic.",trick:"Toxic=poison=deadly=Lethal. Licit=legal, Laudatory=praising, Lanky=tall+thin. Only Lethal matches."},
{qNum:81,text:"Select the word which means the same as the group of words: 'Unit of weight for precious stones'",options:{A:"Pure",B:"Accurate",C:"Reliable",D:"Carat"},correct:"D",subject:"english",chapter:"one-word",difficulty:"easy",explanation:"Carat is the standard unit of weight for precious stones like diamonds.",trick:"Carat = precious stone weight unit. 1 carat = 0.2 grams. Diamonds measured in carats."},
{qNum:82,text:"Select the option that can be used as a one-word substitute: 'She is proficient in speaking many languages.'",options:{A:"Heterolinguistic",B:"Bilingual",C:"Multilingual",D:"Monolithic"},correct:"C",subject:"english",chapter:"one-word",difficulty:"easy",explanation:"Multilingual = fluent in many languages. Bilingual=two, Monolithic=one solid structure.",trick:"Multi=many, Lingual=language. Multilingual = many languages. Bi=2, Mono=1, Multi=many"},
{qNum:83,text:"Select the option that expresses the given sentence in passive voice: 'Ishika saw the tiger in the forest.'",options:{A:"The tiger saw by Ishika in the forest",B:"The tiger sees Ishika in the forest",C:"The tiger was seen by Ishika in the forest",D:"The tiger was seen by the forest in Ishika"},correct:"C",subject:"english",chapter:"error-spotting",difficulty:"easy",explanation:"Active 'saw' → Passive 'was seen'. Tiger becomes subject. Agent Ishika introduced with 'by'.",trick:"Saw → was seen. Tiger (object) becomes subject. 'by Ishika' added. Simple passive formula!"},
{qNum:84,text:"Select one-word substitute: 'A person who likes to argue about anything'",options:{A:"Veracious",B:"Reticent",C:"Contentious",D:"Coward"},correct:"C",subject:"english",chapter:"one-word",difficulty:"medium",explanation:"Contentious = fond of arguing or disputing. Veracious=truthful, Reticent=silent.",trick:"Contentious person loves controversy. Content from Latin contentio (dispute). Contentious = argumentative."},
{qNum:85,text:"Select the most appropriate option to substitute the underlined segment: '...the story is conveyed to the reader using uninterrupted art in a traditional comics format.'",options:{A:"sedimental art in a traditional",B:"longitudinal art in a traditional",C:"existential art in a traditional",D:"sequential art in a traditional"},correct:"D",subject:"english",chapter:"sentence-improvement",difficulty:"medium",explanation:"Sequential art is the correct term for storytelling through images in comics format.",trick:"Comics = Sequential art. Sequence = order = panels following each other. Sequential is the technical term."},
{qNum:86,text:"Identify the segment with grammatical error: 'My brother performed/extremely good/in the class test/held yesterday.'",options:{A:"held yesterday",B:"extremely good",C:"in the class test",D:"My brother performed"},correct:"B",subject:"english",chapter:"error-spotting",difficulty:"easy",explanation:"'Good' is adjective but modifies a verb (performed), so adverb 'well' should be used. 'Extremely well' is correct.",trick:"Performed = verb. Need adverb to modify it. Good = adjective (wrong). Well = adverb (correct)."},
{qNum:87,text:"Select the INCORRECTLY spelt word.",options:{A:"Bureaucracy",B:"Embarrass",C:"Connoisseur",D:"Relevent"},correct:"D",subject:"english",chapter:"error-spotting",difficulty:"easy",explanation:"'Relevent' is incorrect. The correct spelling is 'Relevant'.",trick:"Relevant = REL-E-VANT. Has 'a' before 'nt'. Common mistake: writing 'e' instead of 'a'."},
{qNum:88,text:"Select most appropriate synonym to replace underlined word: 'No altruistic act is truly sincere.'",options:{A:"phenomenal",B:"phonotypical",C:"philanthropic",D:"phantasmal"},correct:"C",subject:"english",chapter:"synonyms",difficulty:"medium",explanation:"Altruistic means selflessly concerned for others. Philanthropic (charitable/humanitarian) is its synonym.",trick:"Altruistic = caring for others = Philanthropic. Phil = love, Anthrop = human. Same meaning!"},
{qNum:89,text:"Select the most appropriate synonym of the given word: Innuendo",options:{A:"Crude",B:"Prose",C:"Ragged",D:"Insinuation"},correct:"D",subject:"english",chapter:"synonyms",difficulty:"medium",explanation:"Innuendo means an indirect or subtle hint. Insinuation is its synonym (indirect suggestion).",trick:"Innuendo = Insinuation = indirect hint. Both suggest something without saying it directly."},
{qNum:90,text:"Select the most appropriate option to fill in the blank: 'Vinod had a ___ escape in the car accident.'",options:{A:"comfortable",B:"full",C:"narrow",D:"wide"},correct:"C",subject:"english",chapter:"idioms",difficulty:"easy",explanation:"'Narrow escape' is the correct fixed phrase/idiom meaning to barely avoid danger.",trick:"Narrow escape = fixed idiom. Barely escaped. Cannot substitute with wide/full/comfortable."},
{qNum:91,text:"Select the one-word substitute: 'A short interesting story about a real person or event'",options:{A:"Anecdote",B:"Sketch",C:"Poem",D:"Narrative"},correct:"A",subject:"english",chapter:"one-word",difficulty:"easy",explanation:"Anecdote = a short, interesting story about a real person or event.",trick:"Anecdote = short real story. Often used to illustrate a point in speech or writing."},
{qNum:92,text:"Select the most appropriate synonym of the word in bold: '...not give him any excuse to harass us further.'",options:{A:"betray",B:"intimidate",C:"relish",D:"soothe"},correct:"B",subject:"english",chapter:"synonyms",difficulty:"medium",explanation:"Harass means to intimidate or bother repeatedly. Intimidate is its closest synonym.",trick:"Harass = bother repeatedly = intimidate. Both involve making someone uncomfortable."},
{qNum:93,text:"Select the most appropriate meaning of the given idiom: 'To have bigger fish to fry'",options:{A:"To have bigger things to take care of than the menial task at hand",B:"To take calculated risks",C:"To know different kinds of fishing techniques",D:"To have an interest in cooking"},correct:"A",subject:"english",chapter:"idioms",difficulty:"easy",explanation:"'Bigger fish to fry' means having more important matters to deal with than the current trivial one.",trick:"Bigger fish = more important matter. I have bigger fish to fry = I have more important things to do."},
{qNum:94,text:"Identify the INCORRECTLY spelt word: 'After the recapture (A) of Tololing and the adjacent features, evacting (B) the enemy from this well-fortified (C) position became a priority.(D)'",options:{A:"B",B:"D",C:"C",D:"A"},correct:"A",subject:"english",chapter:"error-spotting",difficulty:"medium",explanation:"'Evacting' is incorrectly spelled. The correct spelling is 'Evacuating'.",trick:"Evacuating = E-VAC-U-ATING. Not 'evacting'. EVACuate → EVACuating. The 'u' is missing."},
{qNum:95,text:"Select the most appropriate option to substitute the underlined segment: 'She has been studying for two o'clock.'",options:{A:"study from two o'clock",B:"studying since two o'clock",C:"studying two o'clock",D:"study for two o'clock"},correct:"B",subject:"english",chapter:"error-spotting",difficulty:"easy",explanation:"'Since' is used for a specific point in time. 'For' is used for duration. 'Since two o'clock' is correct.",trick:"Since = specific time point. For = duration. Has been studying SINCE two o'clock ✓"},

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function updateProgress(done, total) {
  const pct = Math.round((done/total)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `Uploading: ${done}/${total} questions (${pct}%)`;
}

window.startUpload = async function() {
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Uploading...';
  clearLog();

  log('🔐 Signing in to Firebase...');
  try {
    await signInWithEmailAndPassword(auth, 'nirala01@gmail.com', prompt('Enter your Firebase password:'));
    log('✅ Signed in successfully!', 'success');
  } catch(e) {
    log('❌ Sign-in failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '⬆️ Upload All 100 Questions to Firebase';
    return;
  }

  const db_col = collection(db, 'questions');
  let success = 0, failed = 0;

  log(`\n📚 Starting upload of ${QUESTIONS.length} questions...\n`);

  for (let i = 0; i < QUESTIONS.length; i++) {
    const q = QUESTIONS[i];
    try {
      await addDoc(db_col, {
        exam: 'ssc-cgl',
        tier: 'tier-1',
        year: '2024',
        shift: 'Shift-1',
        date: '9 Sep 2024',
        type: 'pyq',
        qNum: q.qNum,
        text: q.text,
        options: q.options,
        correct: q.correct,
        subject: q.subject,
        chapter: q.chapter,
        difficulty: q.difficulty,
        explanation: q.explanation,
        trick: q.trick,
        createdAt: serverTimestamp()
      });
      success++;
      updateProgress(i+1, QUESTIONS.length);
      log(`✅ Q${q.qNum} [${q.subject}] — ${q.text.substring(0,50)}...`);
    } catch(e) {
      failed++;
      log(`❌ Q${q.qNum} FAILED: ${e.message}`, 'error');
    }

    // Small delay to avoid rate limiting
    if ((i+1) % 10 === 0) await new Promise(r => setTimeout(r, 300));
  }

  log(`\n${'='.repeat(50)}`);
  log(`🎉 UPLOAD COMPLETE!`, 'success');
  log(`✅ Successfully uploaded: ${success} questions`, 'success');
  if(failed > 0) log(`❌ Failed: ${failed} questions`, 'error');
  log(`📊 Database now has CGL 2024 Shift-1 questions ready!`, 'success');

  document.getElementById('progressText').textContent = `✅ Done! ${success} questions uploaded successfully`;
  btn.textContent = `✅ Upload Complete! (${success}/100)`;
  btn.style.background = '#0a8a0a';
};
</script>
