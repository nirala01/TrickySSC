const QS=[{"n": 1, "t": "What will come in place of the question mark (?) in the following equation, if '+' and '-' are interchanged and 'x' and 'div' are interchanged?\\n4515 x 5 - 431 div 3 + 821 = ?", "o": {"A": "1335", "B": "1775", "C": "1575", "D": "1375"}, "c": "D", "s": "reasoning", "ch": "coding-decoding", "d": "medium", "e": "After interchanging signs: 4515 div 5 + 431 x 3 - 821 = 903 + 1293 - 821 = 1375", "tr": "Swap + with - and x with div, then BODMAS: 4515div5=903, 431x3=1293, 903+1293-821=1375"}, {"n": 2, "t": "31 is related to 152 by certain logic. Following the same logic, 47 is related to 168. To which of the following is 66 related?", "o": {"A": "180", "B": "187", "C": "185", "D": "190"}, "c": "B", "s": "reasoning", "ch": "analogies", "d": "medium", "e": "Logic: a + 11^2 = b. 31+121=152, 47+121=168, 66+121=187", "tr": "Difference: 152-31=121=11^2. Apply same: 66+121=187"}, {"n": 3, "t": "Six letters Q, Z, V, T, L and A are written on different faces of a dice. Two positions shown. Find the letter on the face opposite to Q.", "o": {"A": "Z", "B": "T", "C": "V", "D": "A"}, "c": "B", "s": "reasoning", "ch": "matrix", "d": "medium", "e": "From dice positions: Z-V, Q-T, L-A are opposite pairs. T is opposite to Q.", "tr": "V appears in both dice positions as common face. Opposite pairs: Z-V, Q-T, L-A"}, {"n": 4, "t": "In the following number-pairs, the second number is obtained by applying certain mathematical operations to the first number. In three of the four pairs, the same pattern is applied. Select the pair that DOES NOT belong to this group.\\n(a) 335-119  (b) 358-152  (c) 317-101  (d) 308-92", "o": {"A": "335-119", "B": "358-152", "C": "317-101", "D": "308-92"}, "c": "B", "s": "reasoning", "ch": "analogies", "d": "medium", "e": "Logic: a - b = 216. 335-119=216, 317-101=216, 308-92=216. But 358-152=206 not 216", "tr": "Subtract each pair. All give 216 except 358-152=206. B is odd one out."}, {"n": 5, "t": "In a certain code language, 'NAME' is written as 'FNBO' and 'NANO' is written as 'POBO'. How will 'NAIL' be written in that language?", "o": {"A": "MOBJ", "B": "MJOB", "C": "MOJB", "D": "MJBO"}, "c": "D", "s": "reasoning", "ch": "coding-decoding", "d": "hard", "e": "N->M(-1), A->J(+9), I->B(-7), L->O(+3). Pattern gives MJBO", "tr": "N(14)->M(13), A(1)->J(10), I(9)->B(2), L(12)->O(15). Answer: MJBO"}, {"n": 6, "t": "Which word pair DOES NOT belong to the group?\\n(a) Pentagon-5 sides  (b) Hexagon-8 sides  (c) Triangle-3 sides  (d) Square-4 sides", "o": {"A": "Pentagon-5 sides", "B": "Hexagon-8 sides", "C": "Triangle-3 sides", "D": "Square-4 sides"}, "c": "B", "s": "reasoning", "ch": "analogies", "d": "easy", "e": "Hexagon has 6 sides not 8. All others are correctly matched.", "tr": "Hexagon=6 sides (hex=6). Hexagon-8 sides is wrong."}, {"n": 7, "t": "The position of how many letters will remain unchanged if each of the letters in the word 'NIGHTMARES' is re-arranged in the English alphabetical order from left to right?", "o": {"A": "One", "B": "Four", "C": "Two", "D": "Three"}, "c": "B", "s": "reasoning", "ch": "series", "d": "medium", "e": "NIGHTMARES -> AEGHIMNRST. G, H, M and R remain unchanged = 4 letters", "tr": "Arrange alphabetically: A E G H I M N R S T. G, H, M, R stay = 4"}, {"n": 8, "t": "What will come in the place of '?' in the following equation, if '+' and '-' are interchanged and 'x' and 'div' are interchanged?\\n5 - 4 div 9 + 80 x 10 = ?", "o": {"A": "31", "B": "33", "C": "35", "D": "30"}, "c": "B", "s": "reasoning", "ch": "coding-decoding", "d": "medium", "e": "After interchanging: 5 + 4 x 9 - 80 div 10 = 5 + 36 - 8 = 33", "tr": "Swap signs: 5+4x9-80div10. BODMAS: 4x9=36, 80div10=8. So 5+36-8=33"}, {"n": 9, "t": "Select the option in which the numbers share the same relationship as that shared by the given pair: (149, 213), (168, 232)", "o": {"A": "(162, 222)", "B": "(153, 217)", "C": "(137, 211)", "D": "(144, 198)"}, "c": "B", "s": "reasoning", "ch": "analogies", "d": "medium", "e": "Logic: a + 64 = b. 149+64=213, 168+64=232, 153+64=217", "tr": "Difference=64. Check: 217-153=64 correct"}, {"n": 10, "t": "Select the correct mirror image of the given figure 'y T f r 9 3 n' when the mirror is placed at MN.", "o": {"A": "r 9 3 n y", "B": "y T f r 9 3 n", "C": "9 3 T", "D": "9 3 T f"}, "c": "B", "s": "reasoning", "ch": "matrix", "d": "medium", "e": "Mirror image when mirror is placed vertically beside figure appears as y T f r 9 3 n", "tr": "Vertical mirror beside figure: image appears same: y T f r 9 3 n"}, {"n": 11, "t": "MEK : NVP :: GYT : TBG :: JWH : ?", "o": {"A": "QDS", "B": "PCR", "C": "QDT", "D": "PCS"}, "c": "A", "s": "reasoning", "ch": "analogies", "d": "hard", "e": "Each letter replaced by its opposite in alphabet. J->Q, W->D, H->S = QDS", "tr": "Opposite letter: J(10)<->Q(17), W(23)<->D(4), H(8)<->S(19) = QDS"}, {"n": 12, "t": "Statements: No card is a parcel. All cards are envelopes. Some envelopes are bags.\\nConclusions:\\nI. All envelopes can never be parcels.\\nII. No card is a bag.\\nIII. At least some bags are postcards.", "o": {"A": "Only I follows", "B": "Only II follows", "C": "Only I and III follow", "D": "Only II and III follow"}, "c": "A", "s": "reasoning", "ch": "syllogism", "d": "hard", "e": "Cards inside Envelopes, Parcel separate. Only conclusion I follows.", "tr": "Venn: Cards inside Envelopes, Parcel separate, Bags partially overlap. Only I is definitely true."}, {"n": 13, "t": "Select the correct mirror image of 'b c F g I' when mirror is placed at MN.", "o": {"A": "b c F g I", "B": "I c b", "C": "I g", "D": "I g F c b"}, "c": "A", "s": "reasoning", "ch": "matrix", "d": "medium", "e": "Mirror image when mirror is at right side appears as b c F g I", "tr": "Vertical mirror beside figure gives: b c F g I"}, {"n": 14, "t": "Identify the option figure that when put in place of the question mark (?) will logically complete the series of figures with shapes (circle, square, triangle, arrow).", "o": {"A": "Option A", "B": "Option B", "C": "Option C", "D": "Option D"}, "c": "B", "s": "reasoning", "ch": "matrix", "d": "medium", "e": "The pattern shows rotation and shape changes. Option B completes the logical pattern.", "tr": "Track movement of shapes (circle, square, triangle, arrow) across figures in series"}, {"n": 15, "t": "Which of the four options will replace the question mark (?) in the following series?\\nUE 88, VG 84, WI 80, XK 76, ?", "o": {"A": "ZM72", "B": "ZN71", "C": "YN73", "D": "YM72"}, "c": "D", "s": "reasoning", "ch": "series", "d": "medium", "e": "First letters +1: U,V,W,X,Y. Second letters +2: E,G,I,K,M. Numbers -4: 88,84,80,76,72. Answer: YM72", "tr": "Three patterns: letters+1, letters+2, numbers-4. Next: Y, M, 72 -> YM72"}, {"n": 16, "t": "Select the option that represents the letters to complete the letter series:\\nL_P_QS_K_P_S_KP_Q_L_ _PQS", "o": {"A": "KPLPLQLSPK", "B": "PKLPQPLSKP", "C": "KPLPQQLPSK", "D": "KPLPQLPSKP"}, "c": "D", "s": "reasoning", "ch": "series", "d": "hard", "e": "The repeating unit is LKPPQS. Filling blanks gives KPLPQLPSKP", "tr": "Find repeating block: L K P P Q S. Fill blanks accordingly -> KPLPQLPSKP"}, {"n": 17, "t": "Identify the figure which when put in place of ?, will logically complete the series of letter arrangements in boxes (A,B,C,D,E in 5 positions).", "o": {"A": "B E A D C", "B": "C D A B E", "C": "D C A B E", "D": "E A B C D"}, "c": "B", "s": "reasoning", "ch": "matrix", "d": "hard", "e": "Each row contains A,B,C,D,E following a rotation pattern. Option B completes the pattern.", "tr": "Track position of each letter across rows. Each shifts cyclically. B completes the pattern."}, {"n": 18, "t": "Six numbers 21, 22, 23, 24, 25 and 26 are written on different faces of a dice. Three positions shown. Find the number on the face opposite to 24.", "o": {"A": "26", "B": "25", "C": "22", "D": "21"}, "c": "D", "s": "reasoning", "ch": "matrix", "d": "medium", "e": "From dice positions, mapping opposite pairs: 24 is opposite to 21", "tr": "25 and 22 share two views -> they are adjacent. 24 opposite 21."}, {"n": 19, "t": "How many triangles are there in the given figure? (A complex geometric figure with multiple overlapping triangles)", "o": {"A": "21", "B": "20", "C": "18", "D": "19"}, "c": "A", "s": "reasoning", "ch": "matrix", "d": "hard", "e": "Counting by size: small + medium + large combinations = 21 total triangles", "tr": "Count by size groups: 1-unit, 2-unit, 3-unit triangles. Total = 21"}, {"n": 20, "t": "In a certain code language, 'what where how' is written as 'aa dd ff'; 'where there that' is written as 'dd zz pp' and 'which what here' is written as 'ff kk ll'. How is 'how' written in that language?", "o": {"A": "aa", "B": "kk", "C": "zz", "D": "ff"}, "c": "A", "s": "reasoning", "ch": "coding-decoding", "d": "easy", "e": "where=dd (common in stmt 1 and 2), what=ff (common in stmt 1 and 3). Remaining in stmt 1 = how=aa", "tr": "where=dd, what=ff. Only how left in statement 1 = aa"}, {"n": 21, "t": "Statements: Some tears are drops. Some drops are streams. All streams are rivers.\\nConclusions:\\nI. All tears can never be rivers.\\nII. Some drops are rivers.\\nIII. All tears being streams is a possibility.", "o": {"A": "Only conclusion I follows", "B": "Both II and III conclusion follow", "C": "Only conclusion III follows", "D": "Both I and II conclusion follow"}, "c": "B", "s": "reasoning", "ch": "syllogism", "d": "hard", "e": "Some drops are streams, all streams are rivers -> some drops are rivers (II). III is possible. I is wrong.", "tr": "Venn: Streams inside Rivers. Some drops = rivers correct. Tears being streams = possible correct. I is false."}, {"n": 22, "t": "Which of the following terms will replace the question mark (?) in the given series?\\nYZUW, ?, QTQU, MQOT, INMS", "o": {"A": "UWSV", "B": "UWVS", "C": "USWV", "D": "WUSV"}, "c": "A", "s": "reasoning", "ch": "series", "d": "hard", "e": "Each position decreases by 4,3,2,1 respectively. YZUW -> UWSV follows the pattern", "tr": "Pos1:-4(Y,U), Pos2:-3(Z,W), Pos3:-2(U,S), Pos4:-1(W,V). Missing: UWSV"}, {"n": 23, "t": "A+B=mother, A-B=father, A$B=son, A%B=sister, A/B=wife, A=B=brother. Which means A is daughter of K?\\ni. A+K/J-P=D\\nii. J%P=K+A=D\\niii. K+A/P-D%J\\niv. D+K=A/P-J", "o": {"A": "i", "B": "iii", "C": "ii", "D": "iv"}, "c": "B", "s": "reasoning", "ch": "blood-relations", "d": "hard", "e": "In iii: K+A means K is mother of A -> A is daughter of K", "tr": "Option iii: K+A -> K is mother of A -> A is daughter of K correct"}, {"n": 24, "t": "19 is related to 209 following a certain logic. Following the same logic, 27 is related to 297. To which of the following is 61 related?", "o": {"A": "653", "B": "600", "C": "571", "D": "671"}, "c": "D", "s": "reasoning", "ch": "analogies", "d": "medium", "e": "Logic: a x 11 = b. 19x11=209, 27x11=297, 61x11=671", "tr": "209 div 19=11. So multiply by 11: 61x11=671"}, {"n": 25, "t": "Which of the following numbers will replace the question mark (?) in the given series?\\n1, 3, 10, 41, ?, 1237", "o": {"A": "202", "B": "210", "C": "200", "D": "206"}, "c": "D", "s": "reasoning", "ch": "series", "d": "hard", "e": "Pattern: x2+1, x3+1, x4+1, x5+1, x6+1. So 41x5+1=206, 206x6+1=1237", "tr": "1x2+1=3, 3x3+1=10, 10x4+1=41, 41x5+1=206, 206x6+1=1237"}, {"n": 26, "t": "In which year was Project Tiger launched in India?", "o": {"A": "1973", "B": "1970", "C": "1972", "D": "1985"}, "c": "A", "s": "gk", "ch": "history", "d": "easy", "e": "Project Tiger was launched on April 1, 1973 by Ministry of Environment to protect Bengal tigers. Started with 9 reserves.", "tr": "Project Tiger = 1973. Launched April 1 (no joke!). 9 tiger reserves at start."}, {"n": 27, "t": "Lathmar Holi is primarily celebrated in the state of:", "o": {"A": "Karnataka", "B": "Himachal Pradesh", "C": "Arunachal Pradesh", "D": "Uttar Pradesh"}, "c": "D", "s": "gk", "ch": "art-culture", "d": "easy", "e": "Lathmar Holi is celebrated in Barsana and Nandgaon in Uttar Pradesh. Women beat men with sticks. Related to Radha-Krishna.", "tr": "Lathmar = beat with sticks. Barsana (Radha's village) is in UP. Radha-Krishna = Mathura = Uttar Pradesh"}, {"n": 28, "t": "Which of the following awards was won by Lata Mangeshkar in the year 2001?", "o": {"A": "Dadasaheb Phalke Award", "B": "Padma Vibhushan", "C": "Bharat Ratna", "D": "Filmfare Lifetime Achievement Award"}, "c": "C", "s": "gk", "ch": "art-culture", "d": "easy", "e": "Lata Mangeshkar received Bharat Ratna in 2001. Second singer after MS Subbulakshmi to receive this.", "tr": "Bharat Ratna 2001 = Lata Mangeshkar. Second singer ever to get it."}, {"n": 29, "t": "Details about Sudarshana lake is given in a rock inscription at Girnar (Junagarh), which was composed to record the achievements of the Shaka ruler ___.", "o": {"A": "Chashtana", "B": "Rudradaman I", "C": "Rudrasimha III", "D": "Maues"}, "c": "B", "s": "gk", "ch": "history", "d": "medium", "e": "Rudradaman I's Junagadh Rock Inscription (Sanskrit) records history of Sudarshan Lake. From Western Kshatrapas dynasty.", "tr": "Sudarshan Lake + Girnar inscription = Rudradaman I. Rudra-daman = controlled waters (dam connection!)"}, {"n": 30, "t": "___ is an industry association and self-regulatory organisation (SRO) whose primary objective is to work towards the robust development of the microfinance sector.", "o": {"A": "NABARD", "B": "Self-help Group Association", "C": "Microfinance and Investments Regulatory Authority", "D": "Microfinance Institutions Network"}, "c": "D", "s": "gk", "ch": "economy", "d": "medium", "e": "MFIN (Microfinance Institutions Network) established in 2009 as Industry Association for NBFC-MFIs.", "tr": "MFIN = Microfinance Institutions Network. SRO for microfinance. NABARD is for agriculture."}, {"n": 31, "t": "Which article has a similar provision to that of Article 32 and deals with writ jurisdiction?", "o": {"A": "Article 228", "B": "Article 227", "C": "Article 226", "D": "Article 225"}, "c": "C", "s": "gk", "ch": "polity", "d": "medium", "e": "Article 226 gives High Courts power to issue writs. Article 32 gives Supreme Court same power. HC has wider jurisdiction.", "tr": "Article 32 = SC writs. Article 226 = HC writs. HC has WIDER jurisdiction. 226 > 32."}, {"n": 32, "t": "Which of the following is NOT a condition for the President's office in India?", "o": {"A": "He shall not hold any office of profit", "B": "The allowances shall not be diminished during his term of office", "C": "He shall not be entitled, without payment of rent, to use his official residence", "D": "He shall not be a member of either House of the Parliament"}, "c": "C", "s": "gk", "ch": "polity", "d": "medium", "e": "President IS entitled to rent-free official residence (Rashtrapati Bhavan). Option C states opposite, so it is NOT a condition.", "tr": "President lives FREE in Rashtrapati Bhavan. Option C says he doesn't get it free - that's wrong/NOT a condition."}, {"n": 33, "t": "Which of the following statements best defines the monoecious?", "o": {"A": "A flower with gynoecium only", "B": "A flower with androecium only", "C": "A flower with both androecium and gynoecium", "D": "A flower with dithecous"}, "c": "C", "s": "gk", "ch": "science", "d": "medium", "e": "Monoecious plants have both male (androecium) and female (gynoecium) parts on same plant. Examples: Corn, Coconut.", "tr": "Mono=one house. Both organs in ONE plant. Examples: Maize, Cucumber, Coconut."}, {"n": 34, "t": "Mohan Veena player, Pandit Vishwa Mohan Bhatt won the ___ Award in the year 1994.", "o": {"A": "Grammy", "B": "Sangita Kalanidhi", "C": "Oscar", "D": "Sangeet Natak Akademi"}, "c": "A", "s": "gk", "ch": "art-culture", "d": "medium", "e": "Pandit Vishwa Mohan Bhatt won Grammy Award in 1994 for album 'A Meeting by the River' with Ry Cooder.", "tr": "Vishwa Mohan Bhatt + Grammy 1994. He indianised the Hawaiian guitar."}, {"n": 35, "t": "Who is Union Minister of State (Independent Charge) for Science and Technology as of July 2023?", "o": {"A": "Dharmendra Pradhan", "B": "Jitendra Singh", "C": "Ashwini Vaishnaw", "D": "Ramesh Pokhriyal"}, "c": "B", "s": "gk", "ch": "polity", "d": "medium", "e": "Dr. Jitendra Singh is MoS (Independent Charge) for Science and Technology since July 7, 2021. Also handles Earth Sciences, Space, Atomic Energy.", "tr": "Jitendra Singh = Science and Technology + Space + Atomic Energy. From Udhampur, Jammu."}, {"n": 36, "t": "Which of the following decomposition reactions is NOT a redox reaction?", "o": {"A": "Decomposition of sodium hydride", "B": "Decomposition of calcium carbonate", "C": "Decomposition of potassium chlorate", "D": "Decomposition of dihydrogen monoxide"}, "c": "B", "s": "gk", "ch": "science", "d": "hard", "e": "CaCO3 -> CaO + CO2 is thermal decomposition with no electron transfer. Other options involve electron transfer (redox).", "tr": "CaCO3 decomposition = only thermal, no oxidation state change. Others have elements changing oxidation states = redox"}, {"n": 37, "t": "Who among the following has authored the play 'Nil Darpan'?", "o": {"A": "Chittaranjan Das", "B": "Motilal Nehru", "C": "Dinabandhu Mitra", "D": "Sarojini Naidu"}, "c": "C", "s": "gk", "ch": "history", "d": "medium", "e": "Nil Darpan (Indigo Planting Mirror) is a Bengali drama by Dinabandhu Mitra depicting plight of farmers during Indigo Revolt of 1859.", "tr": "Nil=Indigo, Darpan=Mirror. Dinabandhu Mitra wrote it. Dina+bandhu = friend of the poor."}, {"n": 38, "t": "Who among the following formed the Bihar Provincial Kisan Sabha in 1929?", "o": {"A": "Jayprakash Narayan", "B": "JM Sengupta", "C": "Kunwar Singh", "D": "Swami Sahajanand Saraswati"}, "c": "D", "s": "gk", "ch": "history", "d": "medium", "e": "Bihar Provincial Kisan Sabha was formed in 1929 by Swami Sahajanand Saraswati to address peasant grievances.", "tr": "Bihar Kisan Sabha 1929 = Swami Sahajanand Saraswati. A sanyasi who fought for farmers."}, {"n": 39, "t": "Which plateaus are very fertile because they are rich in black soil that is very good for farming?", "o": {"A": "Deccan lava plateau", "B": "African plateau", "C": "Ethiopian plateau", "D": "Katanga plateau"}, "c": "A", "s": "gk", "ch": "geography", "d": "easy", "e": "Deccan Lava Plateau has black basalt soil (regur) rich in humus and iron. Ideal for cotton, oilseeds, jowar.", "tr": "Black soil = Regur = Deccan Plateau. Cotton grows best in black soil. Deccan = fertile."}, {"n": 40, "t": "Which of the following is a correct order of basicity?", "o": {"A": "LiOH > NaOH > KOH > CsOH", "B": "KOH > CsOH > NaOH > LiOH", "C": "LiOH > KOH > CsOH > NaOH", "D": "CsOH > KOH > NaOH > LiOH"}, "c": "D", "s": "gk", "ch": "science", "d": "medium", "e": "Basicity increases down the group. Cs is most electropositive so CsOH is strongest base.", "tr": "Go DOWN the group = basicity INCREASES. Li weakest, Cs strongest. CsOH > KOH > NaOH > LiOH"}, {"n": 41, "t": "Which of the following pairs is INCORRECT regarding the grade of organisation and its example?", "o": {"A": "Cell-tissue grade organisation-Jellyfish", "B": "Cellular grade organisation-Sycon", "C": "Protoplasmic grade organisation-Paramecium", "D": "Tissue-organ grade organisation-Euplectella"}, "c": "D", "s": "gk", "ch": "science", "d": "hard", "e": "Euplectella exhibits tissue-grade organisation, NOT tissue-organ grade. It lacks true organs.", "tr": "Euplectella = tissue grade (not organ grade). It is a basket structure with no true organs."}, {"n": 42, "t": "The head office of Board of Control for Cricket in India (BCCI) is located in ___.", "o": {"A": "Kolkata", "B": "Chennai", "C": "Mumbai", "D": "New Delhi"}, "c": "C", "s": "gk", "ch": "sports", "d": "easy", "e": "BCCI head office is at Churchgate, Mumbai. Established December 1, 1928 in Madras. Wealthiest cricket board in world.", "tr": "BCCI = Mumbai (financial capital). Established 1928 in Madras but HQ in Mumbai."}, {"n": 43, "t": "When the analysis of population density is done by calculating it through net cultivated area, then the measure is termed as:", "o": {"A": "Net density", "B": "Gross density", "C": "Agricultural density", "D": "Physiological density"}, "c": "D", "s": "gk", "ch": "geography", "d": "medium", "e": "Physiological density = population per unit area of cultivated land. Shows pressure on farmland.", "tr": "Physio = sustenance. Physiological density = people per cultivated area."}, {"n": 44, "t": "Mahendravarman I was the ruler of which of the following dynasties?", "o": {"A": "Pallava", "B": "Pandya", "C": "Chalukya", "D": "Chola"}, "c": "A", "s": "gk", "ch": "history", "d": "medium", "e": "Mahendravarman I was a Pallava king (600-630 AD), ruled parts of Andhra and Tamil Nadu.", "tr": "Mahendra+varman = Pallava dynasty. Varman is Pallava surname."}, {"n": 45, "t": "What challenge does foreign investment often face in India?", "o": {"A": "Excessive foreign competition", "B": "Lack of skilled labour", "C": "Lack of consumer base", "D": "Inconsistent regulatory environment"}, "c": "D", "s": "gk", "ch": "economy", "d": "easy", "e": "Inconsistent regulatory environment - frequent policy changes create uncertainty for foreign investors.", "tr": "India FDI challenge = regulations keep changing. Not lack of labour or market (1.4 billion consumers)."}, {"n": 46, "t": "Which of the following states is the biggest producer of Pulses?", "o": {"A": "Bihar", "B": "Madhya Pradesh", "C": "Punjab", "D": "Haryana"}, "c": "B", "s": "gk", "ch": "geography", "d": "medium", "e": "Rajasthan is #1 overall but among given options, Madhya Pradesh is the biggest pulse producer.", "tr": "Pulse production: Rajasthan #1 overall but MP is correct among the options given."}, {"n": 47, "t": "Who founded the Prarthana Samaj in Mumbai in 1867?", "o": {"A": "Gopal Krishna Gokhale", "B": "Shri Ram Bajpai", "C": "Atmaram Pandurang", "D": "Ram Mohan Roy"}, "c": "C", "s": "gk", "ch": "history", "d": "medium", "e": "Atmaram Pandurang co-founded Prarthana Samaj in Mumbai in 1867. Hindu reform society.", "tr": "Prarthana Samaj = Atmaram Pandurang. Atma = soul/prayer. Prarthana = prayer. Connection!"}, {"n": 48, "t": "Who is the Chief Minister of Tamil Nadu as of July 2023?", "o": {"A": "KN Nehru", "B": "Pinarayi Vijayan", "C": "M Yedurappa", "D": "MK Stalin"}, "c": "D", "s": "gk", "ch": "polity", "d": "easy", "e": "MK Stalin is Chief Minister of Tamil Nadu since May 7, 2021. President of DMK. Son of M. Karunanidhi.", "tr": "Tamil Nadu CM = MK Stalin (DMK). Pinarayi Vijayan = Kerala CM. Different states!"}, {"n": 49, "t": "In which city was the first golf club of India situated?", "o": {"A": "Kolkata", "B": "Mysore", "C": "Shimla", "D": "Gulmarg"}, "c": "A", "s": "gk", "ch": "sports", "d": "medium", "e": "Royal Calcutta Golf Club (1829) is oldest golf club in India and first outside Great Britain.", "tr": "First golf club = Royal Calcutta = Kolkata. 1829. British loved Calcutta = first capital, first golf club."}, {"n": 50, "t": "Which Indian among the following has his name in Time Magazine's list of '100 most influential people of 2021'?", "o": {"A": "Amit Shah", "B": "Narendra Modi", "C": "Neeraj Chopra", "D": "Virat Kohli"}, "c": "B", "s": "gk", "ch": "current-affairs", "d": "easy", "e": "Narendra Modi was named in Time Magazine's 100 most influential people of 2021. Also Mamata Banerjee, Adar Poonawalla.", "tr": "Time 100 most influential 2021 = PM Modi. Neeraj Chopra won Olympic gold same year but not Time 100."}, {"n": 51, "t": "A grocer professes to sell rice at the cost price, but uses a fake weight of 870 g for 1 kg. Find his profit percentage (correct to two decimal places).", "o": {"A": "11.11%", "B": "14.94%", "C": "15.11%", "D": "18.21%"}, "c": "B", "s": "quant", "ch": "profit-loss", "d": "medium", "e": "He gives 870g but charges for 1000g. Profit = (1000-870)/870 x 100 = 130/870 x 100 = 14.94%", "tr": "Profit% = Error/(True weight - Error) x 100 = 130/870 x 100 = 14.94%"}, {"n": 52, "t": "The value of cos^2(29) + cos^2(61) is:", "o": {"A": "sqrt(3)/2", "B": "2", "C": "0", "D": "1"}, "c": "D", "s": "quant", "ch": "trigonometry", "d": "easy", "e": "cos^2(29) + cos^2(61) = cos^2(29) + cos^2(90-29) = cos^2(29) + sin^2(29) = 1", "tr": "cos^2(x) + cos^2(90-x) = cos^2(x) + sin^2(x) = 1. When angles add to 90, answer = 1!"}, {"n": 53, "t": "In a circular race of 840 m, A and B start running in the same direction at speeds of 6 m/s and 12 m/s. After how much time will they meet next?", "o": {"A": "140 s", "B": "40 s", "C": "70 s", "D": "20 s"}, "c": "A", "s": "quant", "ch": "time-distance", "d": "medium", "e": "Relative speed = 12-6 = 6 m/s. Time to meet = 840/6 = 140 seconds", "tr": "Same direction: relative speed = difference = 6 m/s. Meeting time = 840/6 = 140s"}, {"n": 54, "t": "Let O be centre of circle. AB and CD are parallel chords. OP perpendicular to AB, OQ perpendicular to CD. AB=10cm, CD=24cm, PQ=7cm. Find diameter of circle.", "o": {"A": "24", "B": "13", "C": "12", "D": "26"}, "c": "D", "s": "quant", "ch": "geometry", "d": "hard", "e": "Let OQ=x. Since both radii equal: x^2+144 = x^2+14x+74. 14x=70, x=5. OC=sqrt(144+25)=13. Diameter=26", "tr": "Set OQ=x, use OC=OA (both radii). Solve: x^2+144=x^2+14x+74, x=5, radius=13, diameter=26"}, {"n": 55, "t": "Which of the following statements is sufficient to conclude that two triangles are congruent?", "o": {"A": "One side and one angle of both triangles are equal", "B": "These have two equal sides and the same perimeter", "C": "These have the same area and the same base", "D": "These have the same base and the same height"}, "c": "B", "s": "quant", "ch": "geometry", "d": "medium", "e": "Two equal sides + same perimeter -> third side also equal -> SSS congruency.", "tr": "Two equal sides + same perimeter -> third side equal -> SSS congruent. Area alone does not prove congruence."}, {"n": 56, "t": "Table: % marks. History(max 175): Ram 54%, Mohan 51%, Shyam 75%. Minimum 105 marks needed to pass History. How many students pass?", "o": {"A": "2", "B": "3", "C": "1", "D": "0"}, "c": "C", "s": "quant", "ch": "percentage", "d": "medium", "e": "History marks: Ram=54x175/100=94.5, Mohan=89.25, Shyam=131.25. Only Shyam passes (>105).", "tr": "Convert %: multiply by 175/100. Ram=94.5, Mohan=89.25, Shyam=131.25. Passing=105. Only Shyam passes."}, {"n": 57, "t": "Fill pipe P is 21 times faster than fill pipe Q. If Q can fill a cistern in 110 minutes, find the time to fill when both pipes are opened together.", "o": {"A": "3 minutes", "B": "5 minutes", "C": "4 minutes", "D": "6 minutes"}, "c": "B", "s": "quant", "ch": "time-work", "d": "medium", "e": "Efficiency P:Q = 21:1. Total work = 110 units. Combined rate = 22 units/min. Time = 110/22 = 5 minutes", "tr": "Q does 1 unit/min, P does 21 units/min. Together = 22/min. Time = 110/22 = 5 min"}, {"n": 58, "t": "Marks of five students in five subjects (max 100 each, total 500). Tarun:65,80,75,85,90. Rohit:69,76,84,88,94. Mohit:73,84,77,90,95. Shobhit:76,85,76,86,78. Sumit:90,88,78,82,68. Who obtained 72% marks in all subjects?", "o": {"A": "Rohit", "B": "Tarun", "C": "Mohit", "D": "Sumit"}, "c": "B", "s": "quant", "ch": "percentage", "d": "medium", "e": "72% of 500 = 360. Tarun total = 65+80+75+85+90 = 395 = 79%. Per answer key Tarun(B) is correct.", "tr": "72% of 500=360. Calculate each total. Tarun=395. Per official key, Tarun is answer."}, {"n": 59, "t": "R pays Rs 100 to P with Rs 5, Rs 2 and Rs 1 coins. Total number of coins = 40. What is the number of Rs 5 coins?", "o": {"A": "13", "B": "17", "C": "16", "D": "18"}, "c": "A", "s": "quant", "ch": "algebra", "d": "medium", "e": "5x+2y+z=100 and x+y+z=40. Solving: 4x+y=60. With x=13: y=8, z=19. Check: 65+16+19=100 correct", "tr": "5x+2y+z=100, x+y+z=40. Subtract: 4x+y=60. Try x=13: 52+y=60, y=8, z=19. Both equations satisfied."}, {"n": 60, "t": "The radii of two cones are in ratio 2:5 and volumes are in ratio 3:5. What is the ratio of their heights?", "o": {"A": "13:11", "B": "4:11", "C": "11:15", "D": "15:4"}, "c": "D", "s": "quant", "ch": "mensuration", "d": "hard", "e": "Volume ratio = r^2 ratio x h ratio. 3/5 = (4/25) x (h1/h2). h1/h2 = 3x25/(5x4) = 75/20 = 15:4", "tr": "V ratio = r^2 ratio x h ratio. 3/5 = (2/5)^2 x h1/h2. So h1/h2 = 3/5 x 25/4 = 15/4"}, {"n": 61, "t": "Which of the following can be the value of 'k' so that the number 217924k is divisible by 6?", "o": {"A": "2", "B": "6", "C": "0", "D": "4"}, "c": "A", "s": "quant", "ch": "number-system", "d": "medium", "e": "For div by 6: div by 2 AND 3. Digit sum=25+k. For div by 3: 25+k divisible by 3. k=2 gives 27 correct. Last digit 2 is even correct", "tr": "Div by 6 = div by 2 AND div by 3. Digit sum=25+k. k=2 -> 27 divisible by 3. Last digit 2 = even correct"}, {"n": 62, "t": "In an election, y% voters did not vote. 10% votes invalid. Candidate got 59.375% of valid votes, won by 2484 votes. Total eligible voters = 16,000. Find y.", "o": {"A": "8", "B": "8.4", "C": "7.5", "D": "7.2"}, "c": "A", "s": "quant", "ch": "percentage", "d": "hard", "e": "(100-y)% voted, 90% valid. Winning margin = 18.75% of valid votes = 2484. Solving gives y=8", "tr": "18.75% of valid votes = 2484. Set up: 16000 x (1-y/100) x 0.9 x 0.1875 = 2484. Solve: y=8"}, {"n": 63, "t": "An article is marked at Rs 550. Sold at 40% discount, selling price is 10% more than cost price. What is the cost price?", "o": {"A": "330", "B": "220", "C": "300", "D": "200"}, "c": "C", "s": "quant", "ch": "profit-loss", "d": "medium", "e": "SP = 550x60/100 = 330. SP = 1.1 x CP. CP = 330/1.1 = 300", "tr": "SP = 60% of 550 = 330. SP is 110% of CP. CP = 330x100/110 = 300"}, {"n": 64, "t": "If the sum of two sides of an equilateral triangle is 16 cm, then find the third side.", "o": {"A": "Cannot be found", "B": "16 cm", "C": "4 cm", "D": "8 cm"}, "c": "D", "s": "quant", "ch": "geometry", "d": "easy", "e": "In equilateral triangle, all sides are equal. Two sides = 16, so each side = 8. Third side = 8 cm.", "tr": "Equilateral = all sides equal. Two sides = 16, so each = 8. Third side = 8 cm."}, {"n": 65, "t": "Simplify: (x^2 - 9) / (x + 3)", "o": {"A": "x-9", "B": "x+9", "C": "x-3", "D": "sqrt(x^2-9)"}, "c": "C", "s": "quant", "ch": "algebra", "d": "easy", "e": "(x^2-9)/(x+3) = (x+3)(x-3)/(x+3) = x-3", "tr": "x^2-9 = (x+3)(x-3). Cancel (x+3). Answer = x-3. Classic difference of squares!"}, {"n": 66, "t": "Table shows total and present candidates at centres P, Q, R for 2016-2020. In which year was the number of absentees the second highest in total of all centres?", "o": {"A": "2018", "B": "2019", "C": "2020", "D": "2017"}, "c": "B", "s": "quant", "ch": "statistics", "d": "medium", "e": "Total absentees: 2018=34(highest), 2019=31(2nd), 2020=30, 2017=30", "tr": "Calculate absentees each year: 2018=34(highest), 2019=31(2nd). Answer=2019"}, {"n": 67, "t": "Distance between centres of two circles of radii 22 cm and 10 cm is 37 cm. Points of contact of direct common tangent are M and Q. Find length MQ.", "o": {"A": "39 cm", "B": "29 cm", "C": "35 cm", "D": "25 cm"}, "c": "C", "s": "quant", "ch": "geometry", "d": "medium", "e": "L = sqrt(d^2-(r1-r2)^2) = sqrt(37^2-(22-10)^2) = sqrt(1369-144) = sqrt(1225) = 35 cm", "tr": "Direct common tangent = sqrt(d^2-(r1-r2)^2) = sqrt(1369-144) = sqrt(1225) = 35"}, {"n": 68, "t": "The value of sin^2(30) - sin^2(40) + sin^2(45) - sin^2(55) - sin^2(35) + sin^2(45) - sin^2(50) + sin^2(60) is:", "o": {"A": "4", "B": "0", "C": "1", "D": "2"}, "c": "B", "s": "quant", "ch": "trigonometry", "d": "hard", "e": "Group complementary pairs using sin^2+cos^2=1. (sin^2(30)+cos^2(30)) - (sin^2(40)+cos^2(40)) + 1 - 1 = 0", "tr": "Pair complementary angles: sin^2(x) = cos^2(90-x). Group pairs giving 1. Total = 0"}, {"n": 69, "t": "Average marks of boys=75, girls=80. Overall average=78. Find ratio of boys to girls.", "o": {"A": "1:3", "B": "2:3", "C": "1:2", "D": "3:4"}, "c": "B", "s": "quant", "ch": "statistics", "d": "easy", "e": "75x + 80y = 78(x+y). 3x = 2y. x/y = 2/3. Ratio = 2:3", "tr": "Alligation: Girls side: 80-78=2, Boys side: 78-75=3. Boys:Girls = 2:3. Alligation is fastest!"}, {"n": 70, "t": "Rajesh completed 17/27 of printing order in 34 days. In how many days did he complete the entire order?", "o": {"A": "54", "B": "60", "C": "56", "D": "20"}, "c": "A", "s": "quant", "ch": "time-work", "d": "easy", "e": "17/27 work in 34 days. Total time = 34 x 27/17 = 2 x 27 = 54 days", "tr": "17 parts in 34 days -> 1 part in 2 days -> 27 parts in 54 days. Unitary method!"}, {"n": 71, "t": "Simplify: (x^3 + 15x^2 + 75x + 125) / (x^2 - 25) x (x - 5)", "o": {"A": "x^2+5x+25", "B": "x^2-25", "C": "x^2+10x+25", "D": "x^2+25"}, "c": "C", "s": "quant", "ch": "algebra", "d": "hard", "e": "Numerator = (x+5)^3. Cancel with (x+5)(x-5) and (x-5). Result = (x+5)^2 = x^2+10x+25", "tr": "x^3+15x^2+75x+125 = (x+5)^3. Cancel factors. Result = (x+5)^2 = x^2+10x+25"}, {"n": 72, "t": "If cosec(theta) = 5/3, then evaluate (sec^2(theta) - 1) x cot^2(theta) x (1 + cot^2(theta)).", "o": {"A": "9/16", "B": "25/9", "C": "25/16", "D": "4/5"}, "c": "B", "s": "quant", "ch": "trigonometry", "d": "hard", "e": "(sec^2-1) = tan^2. tan^2 x cot^2 = 1. (1+cot^2) = cosec^2. So result = cosec^2 = (5/3)^2 = 25/9", "tr": "(sec^2-1)=tan^2, tan^2 x cot^2=1, (1+cot^2)=cosec^2. Result = cosec^2 = 25/9"}, {"n": 73, "t": "Which can be the value of k, if (88 div 8 x k - 3 x 3) / (6^2 - 7 x 5 + k^2) = 1?", "o": {"A": "2, 7", "B": "4, 7", "C": "3, 10", "D": "1, 10"}, "c": "D", "s": "quant", "ch": "algebra", "d": "hard", "e": "(11k-9)/(k^2+1)=1. 11k-9=k^2+1. k^2-11k+10=0. (k-10)(k-1)=0. k=1 or k=10", "tr": "Simplify: (11k-9)/(k^2+1) = 1. So k^2-11k+10=0. Factor: (k-1)(k-10)=0. k=1,10"}, {"n": 74, "t": "Table shows % marks of 7 students in 6 subjects (Maths/150, Chem/130, Phy/120, Geo/100, Hist/60, Comp/40). If someone secures all highest scores, what is overall % score?", "o": {"A": "90 5/6%", "B": "91 1/6%", "C": "95.16%", "D": "95%"}, "c": "B", "s": "quant", "ch": "percentage", "d": "hard", "e": "Highest: 100%x150+80%x130+90%x120+95%x100+90%x60+90%x40=150+104+108+95+54+36=547. 547/600x100=91 1/6%", "tr": "Pick highest % each subject. Total max=600, Score=547. 547/600x100 = 91 1/6%"}, {"n": 75, "t": "Mohan borrows Rs 4,22,092 at 20% SI per annum. End of year 1 repays Rs 21,679 towards principal. Clears all dues at end of year 2. How much does he pay at end of year 2?", "o": {"A": "561347", "B": "564914", "C": "558380", "D": "556367"}, "c": "B", "s": "quant", "ch": "si-ci", "d": "hard", "e": "SI year1=84418.4. Remaining principal=400413. SI year2=80082.6. Payment=400413+84418+80082.6=564914", "tr": "Year2 payment = remaining principal + unpaid interest year1 + interest year2 = 564914"}, {"n": 76, "t": "Select the most appropriate synonym of the given word: Fatal", "o": {"A": "Additional", "B": "Easy", "C": "Deadly", "D": "Jovial"}, "c": "C", "s": "english", "ch": "synonyms", "d": "easy", "e": "Fatal means causing death or severe harm. Deadly is its synonym.", "tr": "Fatal = death-causing = Deadly. Same root idea. Fatal accident = Deadly accident."}, {"n": 77, "t": "Select the option that expresses the given sentence in active voice: 'Lovely tunes are composed by Domnica.'", "o": {"A": "Domnica composes tunes lovely", "B": "Domnica will compose lovely tunes", "C": "Domnica composes lovely tunes", "D": "Domnica composed lovely tunes"}, "c": "C", "s": "english", "ch": "error-spotting", "d": "easy", "e": "Passive 'are composed' -> Active 'composes' (present simple). Domnica composes lovely tunes.", "tr": "Are composed = present passive. Active = subject + composes + object. Domnica composes lovely tunes."}, {"n": 78, "t": "Select the option that expresses the opposite meaning of the underlined word: 'I can vouch for its efficiency.'", "o": {"A": "Invalidate", "B": "Maintain", "C": "Witness", "D": "Certify"}, "c": "A", "s": "english", "ch": "antonyms", "d": "medium", "e": "Vouch means to confirm/assert. Its opposite is Invalidate (to nullify or disprove).", "tr": "Vouch = confirm = valid. Opposite = INvalidate. IN prefix reverses meaning."}, {"n": 79, "t": "Identify the segment that contains an error: 'Mr. Abhilash and his family / have received / no informations / about the incident.'", "o": {"A": "about the incident", "B": "Mr. Abhilash and his family", "C": "have received", "D": "no informations"}, "c": "D", "s": "english", "ch": "error-spotting", "d": "easy", "e": "Information is an uncountable noun. Informations is incorrect. Correct: no information", "tr": "Information = uncountable noun (like furniture, luggage, advice). Never add s. Informations is always wrong."}, {"n": 80, "t": "Select the most appropriate synonym of the given word: Toxic", "o": {"A": "Lethal", "B": "Licit", "C": "Laudatory", "D": "Lanky"}, "c": "A", "s": "english", "ch": "synonyms", "d": "easy", "e": "Toxic means poisonous. Lethal means deadly/harmful - synonym of toxic.", "tr": "Toxic = poison = deadly = Lethal. Licit=legal, Laudatory=praising, Lanky=thin. Only Lethal matches."}, {"n": 81, "t": "Select the word which means the same as the group of words: 'Unit of weight for precious stones'", "o": {"A": "Pure", "B": "Accurate", "C": "Reliable", "D": "Carat"}, "c": "D", "s": "english", "ch": "one-word", "d": "easy", "e": "Carat is the standard unit of weight for precious stones like diamonds.", "tr": "Carat = precious stone weight unit. 1 carat = 0.2 grams. Diamonds measured in carats."}, {"n": 82, "t": "Select the option that can be used as a one-word substitute: 'She is proficient in speaking many languages.'", "o": {"A": "Heterolinguistic", "B": "Bilingual", "C": "Multilingual", "D": "Monolithic"}, "c": "C", "s": "english", "ch": "one-word", "d": "easy", "e": "Multilingual = fluent in many languages. Bilingual=two, Monolithic=one solid structure.", "tr": "Multi=many, Lingual=language. Multilingual = many languages. Bi=2, Mono=1, Multi=many."}, {"n": 83, "t": "Select the option that expresses the given sentence in passive voice: 'Ishika saw the tiger in the forest.'", "o": {"A": "The tiger saw by Ishika in the forest", "B": "The tiger sees Ishika in the forest", "C": "The tiger was seen by Ishika in the forest", "D": "The tiger was seen by the forest in Ishika"}, "c": "C", "s": "english", "ch": "error-spotting", "d": "easy", "e": "Active saw -> Passive was seen. Tiger becomes subject. Agent Ishika introduced with by.", "tr": "Saw -> was seen. Tiger (object) becomes subject. By Ishika added. Simple passive formula!"}, {"n": 84, "t": "Select one-word substitute: 'A person who likes to argue about anything'", "o": {"A": "Veracious", "B": "Reticent", "C": "Contentious", "D": "Coward"}, "c": "C", "s": "english", "ch": "one-word", "d": "medium", "e": "Contentious = fond of arguing or disputing. Veracious=truthful, Reticent=silent.", "tr": "Contentious person loves controversy. Content from Latin contentio (dispute). Argumentative."}, {"n": 85, "t": "Select the most appropriate option to substitute the underlined segment: 'the story is conveyed to the reader using uninterrupted art in a traditional comics format.'", "o": {"A": "sedimental art in a traditional", "B": "longitudinal art in a traditional", "C": "existential art in a traditional", "D": "sequential art in a traditional"}, "c": "D", "s": "english", "ch": "sentence-improvement", "d": "medium", "e": "Sequential art is the correct term for storytelling through images in comics format.", "tr": "Comics = Sequential art. Sequence = order = panels following each other."}, {"n": 86, "t": "Identify the segment with grammatical error: 'My brother performed / extremely good / in the class test / held yesterday.'", "o": {"A": "held yesterday", "B": "extremely good", "C": "in the class test", "D": "My brother performed"}, "c": "B", "s": "english", "ch": "error-spotting", "d": "easy", "e": "Good is adjective but modifies a verb (performed), so adverb well should be used. Extremely well is correct.", "tr": "Performed = verb. Need adverb to modify it. Good = adjective (wrong). Well = adverb (correct)."}, {"n": 87, "t": "Select the INCORRECTLY spelt word.", "o": {"A": "Bureaucracy", "B": "Embarrass", "C": "Connoisseur", "D": "Relevent"}, "c": "D", "s": "english", "ch": "error-spotting", "d": "easy", "e": "Relevent is incorrect. The correct spelling is Relevant.", "tr": "Relevant = REL-E-VANT. Has a before nt. Common mistake: writing e instead of a."}, {"n": 88, "t": "Select most appropriate synonym to replace underlined word: 'No altruistic act is truly sincere.'", "o": {"A": "phenomenal", "B": "phonotypical", "C": "philanthropic", "D": "phantasmal"}, "c": "C", "s": "english", "ch": "synonyms", "d": "medium", "e": "Altruistic means selflessly concerned for others. Philanthropic (charitable) is its synonym.", "tr": "Altruistic = caring for others = Philanthropic. Phil = love, Anthrop = human. Same meaning!"}, {"n": 89, "t": "Select the most appropriate synonym of the given word: Innuendo", "o": {"A": "Crude", "B": "Prose", "C": "Ragged", "D": "Insinuation"}, "c": "D", "s": "english", "ch": "synonyms", "d": "medium", "e": "Innuendo means an indirect or subtle hint. Insinuation is its synonym.", "tr": "Innuendo = Insinuation = indirect hint. Both suggest something without saying it directly."}, {"n": 90, "t": "Select the most appropriate option to fill in the blank: 'Vinod had a ___ escape in the car accident.'", "o": {"A": "comfortable", "B": "full", "C": "narrow", "D": "wide"}, "c": "C", "s": "english", "ch": "idioms", "d": "easy", "e": "Narrow escape is the correct fixed phrase meaning to barely avoid danger.", "tr": "Narrow escape = fixed idiom. Barely escaped. Cannot substitute with wide/full/comfortable."}, {"n": 91, "t": "Select the one-word substitute: 'A short interesting story about a real person or event'", "o": {"A": "Anecdote", "B": "Sketch", "C": "Poem", "D": "Narrative"}, "c": "A", "s": "english", "ch": "one-word", "d": "easy", "e": "Anecdote = a short interesting story about a real person or event.", "tr": "Anecdote = short real story. Often used to illustrate a point in speech or writing."}, {"n": 92, "t": "Select the most appropriate synonym of the word in bold: 'not give him any excuse to harass us further.'", "o": {"A": "betray", "B": "intimidate", "C": "relish", "D": "soothe"}, "c": "B", "s": "english", "ch": "synonyms", "d": "medium", "e": "Harass means to intimidate or bother repeatedly. Intimidate is its closest synonym.", "tr": "Harass = bother repeatedly = intimidate. Both involve making someone uncomfortable."}, {"n": 93, "t": "Select the most appropriate meaning of the given idiom: 'To have bigger fish to fry'", "o": {"A": "To have bigger things to take care of than the menial task at hand", "B": "To take calculated risks", "C": "To know different kinds of fishing techniques", "D": "To have an interest in cooking"}, "c": "A", "s": "english", "ch": "idioms", "d": "easy", "e": "Bigger fish to fry means having more important matters to deal with than the current trivial one.", "tr": "Bigger fish = more important matter. I have bigger fish to fry = I have more important things to do."}, {"n": 94, "t": "Identify the INCORRECTLY spelt word: 'After the recapture (A) of Tololing and the adjacent features, evacting (B) the enemy from this well-fortified (C) position became a priority.(D)'", "o": {"A": "B", "B": "D", "C": "C", "D": "A"}, "c": "A", "s": "english", "ch": "error-spotting", "d": "medium", "e": "Evacting is incorrectly spelled. The correct spelling is Evacuating.", "tr": "Evacuating = E-VAC-U-ATING. Not evacting. EVACuate -> EVACuating. The u is missing."}, {"n": 95, "t": "Select the most appropriate option to substitute the underlined segment: 'She has been studying for two o clock.'", "o": {"A": "study from two o clock", "B": "studying since two o clock", "C": "studying two o clock", "D": "study for two o clock"}, "c": "B", "s": "english", "ch": "error-spotting", "d": "easy", "e": "Since is used for a specific point in time. For is used for duration. Since two o clock is correct.", "tr": "Since = specific time point. For = duration. Has been studying SINCE two o clock correct"}, {"n": 96, "t": "Select most appropriate option for blank 1: 'There is a saying that coming events cast their shadows before. (1)___, it is not universally true.'", "o": {"A": "Therefore", "B": "Furthermore", "C": "Moreover", "D": "However"}, "c": "D", "s": "english", "ch": "comprehension", "d": "easy", "e": "However introduces a contrast to the previous statement.", "tr": "Blank 1 contrasts previous idea. However = contrast. Therefore=result, Moreover=addition."}, {"n": 97, "t": "Select most appropriate option for blank 2: 'Something can happen within a second, and one may not (2)___ it.'", "o": {"A": "rescind", "B": "foresee", "C": "legalise", "D": "affect"}, "c": "B", "s": "english", "ch": "comprehension", "d": "easy", "e": "Foresee means to predict/anticipate. Context: something happens so fast one cannot foresee it.", "tr": "Foresee = predict = fore+see. Context: cannot predict fast events. Foresee correct."}, {"n": 98, "t": "Select most appropriate option for blank 3: '(3)___, some instances show that predictions based on certain signs have gone wrong.'", "o": {"A": "Therefore", "B": "Moreover", "C": "However", "D": "Nevertheless"}, "c": "D", "s": "english", "ch": "comprehension", "d": "medium", "e": "Nevertheless means despite what was just said, continuing with contradictory examples.", "tr": "Nevertheless = despite that = even so. Fits context of presenting exceptions."}, {"n": 99, "t": "Select most appropriate option for blank 4: '(4)___, some unnatural calamities that are likely to appear may forecast their shadows by some bad omens.'", "o": {"A": "Therefore", "B": "Secondly", "C": "Besides", "D": "Despite"}, "c": "A", "s": "english", "ch": "comprehension", "d": "medium", "e": "Therefore introduces a logical conclusion from the previous discussion.", "tr": "Therefore = for this reason = logical conclusion. Passage concludes about bad omens warning."}, {"n": 100, "t": "Select most appropriate option for blank 5: '(5)___, we should not completely cancel out the possibilities that animals can sense certain unnatural happenings.'", "o": {"A": "Therefore", "B": "However", "C": "Nevertheless", "D": "Moreover"}, "c": "C", "s": "english", "ch": "comprehension", "d": "medium", "e": "Nevertheless = despite all limitations mentioned, still believe in animal sensing. Concession + continuation.", "tr": "Nevertheless = even so = despite everything said. Final conclusion: still believe. Fits perfectly."}];
