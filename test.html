<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrickySSC Test</title>

<style>
body{font-family:sans-serif;background:#f3f4f6;margin:0}
.top{background:#fff;padding:10px 20px;display:flex;justify-content:space-between}
.timer{color:#ff6b00;font-size:22px;font-weight:bold}
.container{display:flex}
.left{flex:1;padding:20px}
.right{width:260px;background:#fff;padding:10px}
.question{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
.option{padding:10px;border:1px solid #ddd;margin:5px 0;border-radius:6px;cursor:pointer}
.option:hover{background:#fef3f2}
.selected{background:#ffedd5;border-color:#ff6b00}
.btn{padding:10px 20px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.next{background:#ff6b00;color:#fff}
.prev{background:#e5e7eb}
.submit{background:#111827;color:#fff}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.qbox{padding:8px;background:#e5e7eb;text-align:center;border-radius:5px;cursor:pointer}
.answered{background:#22c55e;color:#fff}
.review{background:#f59e0b;color:#fff}
.error{color:red;font-weight:bold}
</style>

</head>
<body>

<div class="top">
  <div id="title">Loading Test...</div>
  <div class="timer" id="timer">60:00</div>
</div>

<div class="container">
  <div class="left">
    <div id="qNum"></div>
    <div class="question" id="question">Loading...</div>
    <div id="options"></div>

    <button class="btn prev" onclick="prevQ()">Prev</button>
    <button class="btn next" onclick="nextQ()">Next</button>
    <button class="btn" onclick="markReview()">Mark</button>
    <button class="btn submit" onclick="submitTest()">Submit</button>
  </div>

  <div class="right">
    <div id="grid" class="grid"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const exam = params.get("exam");
const year = params.get("year");
const shift = params.get("shift");

console.log("Params:", exam, year, shift);

const PROJECT = "trickyssc-17bb3";
const APIKEY = "YOUR_API_KEY"; // 🔴 PUT YOUR KEY

let questions = [];
let current = 0;
let answers = {};
let review = {};

async function loadQuestions(){

  const url = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents:runQuery?key=${APIKEY}`;

  // Try STRING year first
  let docs = await runQuery(year, false);

  // If empty → try INTEGER
  if(docs.length === 0 && !isNaN(year)){
    console.log("Retry with integer year...");
    docs = await runQuery(parseInt(year), true);
  }

  console.log("Fetched Docs:", docs);

  if(docs.length === 0){
    document.getElementById("question").innerHTML = "<span class='error'>❌ No questions found</span>";
    return;
  }

  questions = docs.slice(0,100).map(d=>{
    const f = d.document.fields;
    return {
      q: f.text?.stringValue || "No Question",
      A: f.option_A?.stringValue || "",
      B: f.option_B?.stringValue || "",
      C: f.option_C?.stringValue || "",
      D: f.option_D?.stringValue || "",
      ans: f.correct?.stringValue || ""
    }
  });

  render();
  createGrid();
}

async function runQuery(yearValue, isInt){

  const yearField = isInt
    ? {integerValue: String(yearValue)}
    : {stringValue: String(yearValue)};

  const body = {
    structuredQuery:{
      from:[{collectionId:"questions"}],
      where:{
        compositeFilter:{
          op:"AND",
          filters:[
            {fieldFilter:{field:{fieldPath:"exam"},op:"EQUAL",value:{stringValue:exam}}},
            {fieldFilter:{field:{fieldPath:"year"},op:"EQUAL",value:yearField}},
            {fieldFilter:{field:{fieldPath:"shift"},op:"EQUAL",value:{stringValue:shift}}}
          ]
        }
      },
      limit:100
    }
  };

  const res = await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });

  return await res.json();
}

function render(){
  if(!questions.length) return;

  const q = questions[current];
  document.getElementById("qNum").innerText = `Question ${current+1}`;
  document.getElementById("question").innerText = q.q;

  const opts = ["A","B","C","D"];
  document.getElementById("options").innerHTML = opts.map(o=>`
    <div class="option ${answers[current]==o?'selected':''}" onclick="select('${o}')">
      ${o}. ${q[o]}
    </div>
  `).join("");
}

function select(opt){
  answers[current] = opt;
  updateGrid();
  render();
}

function nextQ(){
  if(current < questions.length-1){
    current++;
    render();
  }
}

function prevQ(){
  if(current > 0){
    current--;
    render();
  }
}

function markReview(){
  review[current] = true;
  updateGrid();
}

function createGrid(){
  let html="";
  for(let i=0;i<questions.length;i++){
    html += `<div class="qbox" id="q${i}" onclick="jump(${i})">${i+1}</div>`;
  }
  document.getElementById("grid").innerHTML = html;
}

function updateGrid(){
  for(let i=0;i<questions.length;i++){
    let el = document.getElementById("q"+i);
    if(!el) continue;

    el.classList.remove("answered","review");

    if(answers[i]) el.classList.add("answered");
    if(review[i]) el.classList.add("review");
  }
}

function jump(i){
  current = i;
  render();
}

function submitTest(){
  let score=0;

  questions.forEach((q,i)=>{
    if(answers[i] === q.ans) score++;
  });

  alert(`Score: ${score}/${questions.length}`);
}

//// TIMER
let time = 60*60;

setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;

  document.getElementById("timer").innerText =
    `${m}:${s<10?"0":""}${s}`;

  time--;

  if(time<=0) submitTest();
},1000);

loadQuestions();
</script>

</body>
</html>
