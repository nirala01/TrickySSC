<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrickySSC Test v3</title>
</head>
<body style="background:#FF6B00;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;font-family:Arial;">
<div id="status" style="font-size:2rem;color:white;text-align:center;padding:2rem;">
  ⚡ Step 1: HTML OK<br>
  <span style="font-size:1rem;" id="msg">Loading Firebase...</span>
</div>

<script>
document.getElementById('msg').textContent = 'Step 2: Basic JS OK';
</script>

<script type="module">
document.getElementById('msg').textContent = 'Step 3: Module JS OK';

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
document.getElementById('msg').textContent = 'Step 4: Firebase imported OK';

const app = initializeApp({
  apiKey:"AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA",
  authDomain:"trickyssc-17bb3.firebaseapp.com",
  projectId:"trickyssc-17bb3"
});
document.getElementById('msg').textContent = 'Step 5: Firebase app OK';

import {getAuth, onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
const auth = getAuth(app);
document.getElementById('msg').textContent = 'Step 6: Auth imported OK';

onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById('msg').textContent = 'Step 7: Logged in as ' + (user.displayName || user.email || user.uid);
  } else {
    document.getElementById('msg').textContent = 'Step 7: Not logged in — redirecting to login.html in 2s';
    setTimeout(()=>{ window.location.href='login.html'; }, 2000);
  }
});
</script>
</body>
</html>
