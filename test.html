<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>TrickySSC — Test Engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23FF6B00'/><text x='16' y='22' text-anchor='middle' font-size='20'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --orange:       #FF6B00;
  --orange-light: #FF8C38;
  --orange-dim:   rgba(255,107,0,0.08);
  --orange-glow:  rgba(255,107,0,0.25);
  --bg:           #F0F4F8;
  --surface:      #FFFFFF;
  --border:       #E2E8F0;
  --border-light: #F1F5F9;
  --text-main:    #1E293B;
  --text-mid:     #475569;
  --text-muted:   #94A3B8;
  --green:        #22C55E;
  --green-bg:     #F0FDF4;
  --red:          #EF4444;
  --red-bg:       #FEF2F2;
  --yellow:       #EAB308;
  --yellow-bg:    #FEF9C3;
  --indigo:       #6366F1;
  --indigo-bg:    #EEF2FF;
  --blue:         #3B82F6;
  --blue-bg:      #EFF6FF;
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.05);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.08);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text-main);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   LOADER SCREEN
═══════════════════════════════════════════ */
#loaderScreen {
  position: fixed; inset: 0; z-index: 1000;
  background: linear-gradient(135deg, #FF6B00 0%, #FF9240 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; gap: 12px;
  transition: opacity 0.4s ease;
}
#loaderScreen.fade-out { opacity: 0; pointer-events: none; }
.loader-icon { font-size: 2.8rem; animation: loader-pulse 1.4s ease-in-out infinite; }
@keyframes loader-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.loader-brand {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.8rem; font-weight: 700; letter-spacing: 0.5px;
}
.loader-bar-wrap {
  width: 200px; height: 5px;
  background: rgba(255,255,255,0.25);
  border-radius: 5px; overflow: hidden; margin-top: 4px;
}
.loader-bar {
  height: 100%; width: 0%;
  background: #fff; border-radius: 5px;
  transition: width 0.4s ease;
}
.loader-msg { font-size: 0.85rem; opacity: 0.85; min-height: 1.2em; text-align: center; }
.loader-error-box {
  display: none;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 16px; padding: 1.25rem 1.5rem;
  text-align: center; max-width: 320px;
  font-size: 0.9rem; line-height: 1.6;
}
.loader-error-box .err-btns {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 1rem; flex-wrap: wrap;
}
.loader-error-box .err-btn {
  display: inline-block;
  background: #fff; color: #FF6B00;
  font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem;
  padding: 0.5rem 1.2rem; border-radius: 8px;
  text-decoration: none; cursor: pointer; border: none;
}
.loader-error-box .err-btn.secondary { background: rgba(255,255,255,0.2); color: #fff; }

/* ═══════════════════════════════════════════
   TEST SCREEN LAYOUT
═══════════════════════════════════════════ */
#testScreen {
  display: none; flex-direction: column;
  height: 100vh; overflow: hidden; background: var(--bg);
}
#testScreen.visible { display: flex; }

/* ── TOPBAR ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 var(--border), 0 2px 12px rgba(0,0,0,0.05);
  height: 56px; display: flex; align-items: center;
  padding: 0 24px; gap: 12px;
  flex-shrink: 0; z-index: 10; position: relative;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-dot {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: #fff;
  box-shadow: 0 2px 8px var(--orange-glow);
}
.exam-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px; font-weight: 700; color: var(--text-main);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px;
}
.exam-sub { font-size: 10.5px; color: var(--text-muted); font-weight: 500; }
.topbar-center { flex: 1; display: flex; justify-content: center; }
.timer-pill {
  display: flex; align-items: center; gap: 7px;
  background: #FFF7F0; border: 1.5px solid #FFD4AD;
  border-radius: 10px; padding: 5px 16px; transition: all 0.3s;
}
.timer-pill.urgent { border-color: #FCA5A5; background: #FEF2F2; }
.timer-icon { font-size: 13px; }
.timer-display {
  font-family: 'Rajdhani', sans-serif;
  font-size: 24px; font-weight: 700;
  color: var(--orange); letter-spacing: 1.5px;
  min-width: 64px; text-align: center; transition: color 0.3s;
}
.timer-display.urgent { color: var(--red); }
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.grid-toggle-btn {
  display: none; align-items: center; gap: 5px;
  background: var(--text-main); color: #fff; border: none;
  border-radius: 8px; padding: 6px 11px;
  font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.logout-btn {
  background: transparent; border: 1.5px solid var(--border);
  color: var(--text-mid); padding: 5px 14px; border-radius: 8px;
  cursor: pointer; font-size: 12px; font-weight: 600;
  font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.15s;
}
.logout-btn:hover { border-color: var(--text-mid); color: var(--text-main); }

/* ── SECTION TAB BAR ── */
#sectionBar {
  display: none; background: var(--surface);
  border-bottom: 1px solid var(--border-light);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; flex-shrink: 0;
}
#sectionBar::-webkit-scrollbar { display: none; }
.sec-tab {
  display: inline-flex; flex-direction: column; align-items: center;
  padding: 9px 16px 7px; cursor: pointer; flex-shrink: 0;
  border-bottom: 3px solid transparent;
  font-size: 11.5px; font-weight: 600; color: var(--text-muted);
  white-space: nowrap; gap: 3px; transition: all 0.15s; user-select: none;
}
.sec-tab:hover { color: var(--orange); background: var(--orange-dim); }
.sec-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.sec-tab-count {
  font-size: 10px; font-weight: 700;
  background: var(--border-light); color: var(--text-muted);
  border-radius: 20px; padding: 1px 7px; transition: all 0.15s;
}
.sec-tab.active .sec-tab-count { background: #FFF3E8; color: var(--orange); }
.sec-tab-prog { height: 2px; width: 100%; background: var(--border); border-radius: 2px; overflow: hidden; }
.sec-tab-prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

/* ── MAIN AREA ── */
.main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── QUESTION PANEL ── */
.q-panel {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  display: flex; flex-direction: column; align-items: stretch; background: var(--bg);
}
.q-panel::-webkit-scrollbar { width: 4px; }
.q-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.q-inner { width: 100%; max-width: 860px; margin: 0 auto; }

/* Q Number row */
.q-num-row { display: flex; align-items: center; margin-bottom: 16px; }
.q-num-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 7px 18px;
  font-size: 13px; font-weight: 700; color: var(--text-mid);
  letter-spacing: 0.04em; text-transform: uppercase; box-shadow: var(--shadow-sm);
}
.q-num-accent { color: var(--orange); font-size: 19px; line-height: 1; }

/* Question card */
.q-card {
  background: var(--surface); border-radius: 16px;
  padding: 22px 24px; margin-bottom: 16px;
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.q-text { font-size: 15.5px; font-weight: 500; color: var(--text-main); line-height: 1.8; }
.q-instruction {
  display: block; font-size: 14.5px; font-weight: 500;
  color: var(--text-mid); margin-bottom: 12px; line-height: 1.7;
}
.q-sentence {
  display: block; font-size: 15.5px; font-weight: 600;
  color: var(--text-main); line-height: 1.8;
  padding: 11px 16px; background: #F8FAFC;
  border-left: 3px solid var(--orange); border-radius: 0 8px 8px 0;
}
.q-img-wrap { margin-top: 14px; text-align: center; }
.q-img { max-width: 100%; max-height: 280px; border-radius: 10px; border: 1px solid var(--border); object-fit: contain; background: #F8FAFC; }

/* Options */
.options-wrap { display: flex; flex-direction: column; gap: 9px; }
.option {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 13px 18px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--surface);
  cursor: pointer; font-size: 14.5px; user-select: none;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s;
  box-shadow: var(--shadow-sm);
}
.option:hover {
  border-color: var(--orange-light); background: var(--orange-dim);
  transform: translateY(-1px); box-shadow: 0 3px 10px var(--orange-glow);
}
.option.selected  { border-color: var(--orange); background: #FFF7F0; box-shadow: 0 0 0 3px var(--orange-glow); }
.option.correct   { border-color: var(--green); background: var(--green-bg); box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
.option.wrong     { border-color: var(--red); background: var(--red-bg); box-shadow: 0 0 0 3px rgba(239,68,68,0.06); }
.option.correct-also { border-color: var(--green); background: var(--green-bg); }

.opt-label {
  width: 30px; height: 30px; min-width: 30px; border-radius: 8px;
  background: var(--border-light); display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--text-mid); transition: all 0.15s; flex-shrink: 0;
}
.option:hover      .opt-label { background: #FFE8D6; color: var(--orange); }
.option.selected   .opt-label { background: var(--orange); color: #fff; }
.option.correct    .opt-label { background: var(--green); color: #fff; }
.option.wrong      .opt-label { background: var(--red); color: #fff; }
.option.correct-also .opt-label { background: var(--green); color: #fff; }
.opt-body { flex: 1; min-width: 0; line-height: 1.65; color: var(--text-mid); font-size: 14.5px; }
.option.correct    .opt-body { color: #15803D; font-weight: 600; }
.option.wrong      .opt-body { color: #DC2626; }
.option.correct-also .opt-body { color: #15803D; }

/* Nav buttons */
.nav-btns {
  display: flex; align-items: center; gap: 10px;
  margin-top: 24px; padding-bottom: 12px; flex-wrap: wrap;
}
.nav-btn {
  padding: 10px 24px; border: none; border-radius: 10px;
  cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px; font-weight: 700;
  transition: all 0.15s; white-space: nowrap;
}
.nav-btn:hover { transform: translateY(-1px); }
.btn-prev   { background: var(--blue-bg); color: var(--blue); border: 1.5px solid #BFDBFE; }
.btn-prev:hover { background: #DBEAFE; }
.btn-next   { background: linear-gradient(135deg, var(--orange), var(--orange-light)); color: #fff; box-shadow: 0 3px 12px var(--orange-glow); }
.btn-submit { background: var(--text-main); color: #fff; box-shadow: 0 3px 12px rgba(30,41,59,0.18); }
.btn-mark   {
  background: #FFFBEB; color: #D97706;
  border: 1.5px solid #FDE68A; padding: 10px 16px; margin-left: auto;
}
.btn-mark:hover { background: #FEF3C7; }
.btn-mark.marked { background: var(--indigo-bg); color: var(--indigo); border-color: #C7D2FE; }

/* ── DESKTOP SIDEBAR ── */
.sidebar {
  width: 264px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto; display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.sb-progress { padding: 12px 14px 10px; }
.sb-progress-label {
  display: flex; justify-content: space-between;
  font-size: 10.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 5px;
}
.sb-progress-bar { height: 4px; background: var(--border-light); border-radius: 4px; overflow: hidden; }
.sb-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--orange), var(--orange-light));
  border-radius: 4px; transition: width 0.4s ease;
}

.sb-section { padding: 8px 14px; }
.sb-label {
  font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 7px;
}
.legend { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-mid); font-weight: 500; }
.legend-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }

.q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
.q-dot {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--border); background: var(--surface);
  cursor: pointer; font-size: 11px; font-weight: 600; border-radius: 7px;
  transition: all 0.12s; color: var(--text-mid); font-family: 'Plus Jakarta Sans', sans-serif;
}
.q-dot:hover              { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
.q-dot.answered           { background: var(--green); color: #fff; border-color: var(--green); }
.q-dot.answered:hover     { background: #16A34A; }
.q-dot.current            { border-color: var(--orange); font-weight: 700; color: var(--orange); background: #FFF3E8; box-shadow: 0 0 0 2px var(--orange-glow); }
.q-dot.skipped            { background: var(--yellow-bg); border-color: var(--yellow); color: #713F12; }
.q-dot.marked             { background: var(--indigo-bg); border-color: var(--indigo); color: #4338CA; }

.sb-submit { padding: 8px 14px 14px; margin-top: auto; }
.sb-submit-btn {
  width: 100%; padding: 11px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, #1E293B, #334155);
  color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px; font-weight: 700; cursor: pointer; transition: all 0.15s;
}
.sb-submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* ── MOBILE DRAWER ── */
#drawerOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,0.5); z-index: 200; backdrop-filter: blur(2px);
}
#drawer {
  display: none; position: fixed; right: 0; top: 0; bottom: 0;
  width: 275px; background: var(--surface); z-index: 201;
  overflow-y: auto; box-shadow: -8px 0 32px rgba(0,0,0,0.12);
}
.drawer-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 14px; border-bottom: 1px solid var(--border-light);
  font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; color: var(--text-main);
  background: var(--surface); position: sticky; top: 0; z-index: 1;
}
.drawer-close {
  background: var(--border-light); border: none; border-radius: 8px;
  width: 28px; height: 28px; cursor: pointer; font-size: 15px;
  color: var(--text-mid); display: flex; align-items: center; justify-content: center;
}
.drawer-body { padding: 12px; }
#drawerGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }

/* ═══════════════════════════════════════════
   RESULT SCREEN
═══════════════════════════════════════════ */
#resultScreen {
  display: none; min-height: 100vh; background: var(--bg); padding: 28px 16px;
}
#resultScreen.visible { display: block; }
.result-wrap { max-width: 820px; margin: 0 auto; }

.result-hero {
  background: var(--surface); border-radius: 20px;
  padding: 32px 28px; text-align: center;
  border: 1px solid var(--border); box-shadow: var(--shadow-md); margin-bottom: 20px;
}
.result-exam-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px; font-weight: 700; color: var(--text-mid); margin-bottom: 10px;
}
.score-circle {
  display: inline-flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 130px; height: 130px; border-radius: 50%;
  border: 5px solid var(--orange); background: #FFF7F0;
  margin: 0 auto 16px; box-shadow: 0 0 0 8px rgba(255,107,0,0.06);
}
.score-pct {
  font-family: 'Rajdhani', sans-serif;
  font-size: 40px; font-weight: 700; color: var(--orange); line-height: 1;
}
.score-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }

.result-stats { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.r-stat { background: var(--border-light); border-radius: 16px; padding: 14px 18px; text-align: center; min-width: 90px; }
.r-stat-val { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; }
.r-stat-lbl { font-size: 10.5px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 3px; }

.result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.ra-btn {
  padding: 10px 24px; border-radius: 10px; border: none;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13.5px;
  font-weight: 700; cursor: pointer; transition: all 0.15s;
  text-decoration: none; display: inline-block;
}
.ra-btn.primary { background: linear-gradient(135deg, var(--orange), var(--orange-light)); color: #fff; box-shadow: 0 3px 12px var(--orange-glow); }
.ra-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
.ra-btn.secondary { background: var(--border-light); color: var(--text-main); border: 1.5px solid var(--border); }
#saveStatus { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

.review-list { margin-top: 20px; }
.review-item {
  background: var(--surface); border-radius: 16px;
  padding: 16px; margin-bottom: 10px;
  border: 1px solid var(--border); border-left: 4px solid var(--border); box-shadow: var(--shadow-sm);
}
.review-item.correct { border-left-color: var(--green); }
.review-item.wrong   { border-left-color: var(--red); }
.review-item.skip    { border-left-color: var(--yellow); }
.review-q-text { font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 10px; line-height: 1.6; }
.review-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.review-opt {
  padding: 8px 10px; border-radius: 8px; font-size: 12.5px;
  border: 1.5px solid var(--border); background: #F9FAFB; color: var(--text-mid);
}
.review-opt.is-correct { border-color: var(--green); background: var(--green-bg); color: #15803D; font-weight: 600; }
.review-opt.is-wrong   { border-color: var(--red); background: var(--red-bg); color: #DC2626; }
.review-verdict {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 11px; border-radius: 8px;
  font-size: 12.5px; font-weight: 600; margin-bottom: 6px;
}
.review-expand-btn {
  background: none; border: none; cursor: pointer;
  font-size: 12px; color: var(--orange); font-weight: 700;
  padding: 4px 0; display: flex; align-items: center; gap: 4px;
}
.review-solution { display: none; margin-top: 6px; }
.review-solution.open { display: block; }
.sol-block { border-radius: 8px; overflow: hidden; margin-bottom: 6px; }
.sol-header { padding: 6px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.sol-body { padding: 9px 12px; font-size: 13px; line-height: 1.85; }

/* ═══════════════════════════════════════════
   MOBILE ≤ 640px
═══════════════════════════════════════════ */
@media (max-width: 640px) {
  .topbar { padding: 0 12px; height: 50px; gap: 8px; }
  .brand-dot { width: 28px; height: 28px; font-size: 13px; border-radius: 8px; }
  .exam-title { font-size: 13px; max-width: 130px; }
  .exam-sub { display: none; }
  .topbar-center { flex: 0 0 auto; }
  .timer-display { font-size: 20px; }
  .timer-icon { display: none; }
  .timer-pill { padding: 4px 10px; }

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getAuth, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

/* ── Firebase init ── */
const app = initializeApp({
  apiKey:            'AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA',
  authDomain:        'trickyssc-17bb3.firebaseapp.com',
  projectId:         'trickyssc-17bb3',
  storageBucket:     'trickyssc-17bb3.firebasestorage.app',
  messagingSenderId: '450627057220',
  appId:             '1:450627057220:web:366267bf437d94f20c6e11',
});
const db   = getFirestore(app);
const auth = getAuth(app);

/* ══════════════════════════════════════════
   URL PARAMS — parsed once, never mutated
══════════════════════════════════════════ */
const params = new URLSearchParams(location.search);
const P = {
  exam:    params.get('exam')    || '',
  year:    params.get('year')    || '',
  lang:    params.get('lang')    || '',
  shift:   params.get('shift')   || '',
  heldOn:  params.get('heldOn')  || '',
  tier:    params.get('tier')    || '',
  mockId:  params.get('mockId')  || '',
  mockNum: params.get('mockNum') || '',
  sskey:   params.get('sskey')   || '',
  nocache: params.get('nocache') === '1',
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let questions    = [];   // sorted, plain objects
let answers      = {};   // { idx: 'A'|'B'|'C'|'D' }
let marked       = {};   // { idx: true }
let currentQ     = 0;
let timeLeft     = 3600;
let timerInt     = null;
let currentUser  = null;
let sections     = [];
let isSubmitting = false;
let lastSave     = null; // { attemptId, payload }

/* ══════════════════════════════════════════
   LOADER UI HELPERS
══════════════════════════════════════════ */
const $ = id => document.getElementById(id);
function setBar(pct) { $('loaderBar').style.width = pct + '%'; }
function setMsg(msg) { $('loaderMsg').textContent  = msg; }
function showError(msg) {
  $('loaderErrorMsg').textContent = msg;
  $('loaderError').style.display  = 'block';
  $('loaderMsg').style.display    = 'none';
  setBar(100);
  $('loaderBar').style.background = 'rgba(255,255,255,0.35)';
}
function hideLoader() {
  const el = $('loaderScreen');
  el.classList.add('fade-out');
  setTimeout(() => el.style.display = 'none', 400);
}

/* ══════════════════════════════════════════
   AUTH — start test as soon as we know the user
══════════════════════════════════════════ */
let testStarted = false;

function getStoredUser() {
  try { const u = JSON.parse(localStorage.getItem('tssc_user') || 'null'); return (u && u.uid) ? u : null; }
  catch { return null; }
}

async function beginTest(user) {
  if (testStarted) return;
  testStarted = true;
  currentUser = user;
  await loadQuestions();
}

// Immediate path — stored user skips Firebase auth round-trip
const storedUser = getStoredUser();
if (storedUser) {
  setMsg('Loading questions…');
  beginTest({ uid: storedUser.uid, displayName: storedUser.name || 'Student' });
}

// Firebase auth runs in parallel
onAuthStateChanged(auth, user => {
  if (testStarted) return;
  if (user) {
    const ex = getStoredUser() || {};
    localStorage.setItem('tssc_user', JSON.stringify({ ...ex, uid: user.uid, name: user.displayName || ex.name || 'Student' }));
    beginTest({ uid: user.uid, displayName: user.displayName || 'Student' });
  } else if (!storedUser) {
    localStorage.setItem('loginReturnTo', location.href);
    location.href = 'login.html';
  }
});

// Fallback after 5s
setTimeout(() => {
  if (testStarted) return;
  $('loaderScreen').innerHTML = `
    <div style="text-align:center;padding:2rem;max-width:300px;">
      <div style="font-size:2.5rem;margin-bottom:.8rem;">⚡</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem;">TrickySSC</div>
      <div style="font-size:.85rem;opacity:.9;margin-bottom:1.5rem;line-height:1.6;">Session expired.<br>Please log in to continue.</div>
      <a href="login.html" onclick="localStorage.setItem('loginReturnTo',location.href)"
        style="display:inline-block;background:#fff;color:#FF6B00;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;padding:.65rem 2rem;border-radius:10px;text-decoration:none;margin-bottom:1rem;">
        🔐 Login to Continue
      </a><br>
      <a href="javascript:location.reload()" style="font-size:.8rem;opacity:.7;color:#fff;">↺ Retry</a>
    </div>`;
}, 5000);

/* ══════════════════════════════════════════
   FIRESTORE REST  (no SDK dependency for reads)
══════════════════════════════════════════ */
const REST_BASE = `https://firestore.googleapis.com/v1/projects/trickyssc-17bb3/databases/(default)/documents`;
const REST_KEY  = 'AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA';

function parseField(v) {
  if (!v) return '';
  if (v.stringValue  !== undefined) return v.stringValue;
  if (v.integerValue !== undefined) return v.integerValue;
  if (v.booleanValue !== undefined) return v.booleanValue;
  if (v.doubleValue  !== undefined) return v.doubleValue;
  if (v.nullValue    !== undefined) return null;
  if (v.arrayValue   !== undefined) return (v.arrayValue.values || []).map(parseField);
  if (v.mapValue     !== undefined) {
    const m = {};
    for (const [k, fv] of Object.entries(v.mapValue.fields || {})) m[k] = parseField(fv);
    return m;
  }
  return '';
}

function parseRestDocs(json) {
  return (json || [])
    .filter(r => r.document && r.document.fields)
    .map(r => {
      const obj = { _id: r.document.name.split('/').pop() };
      for (const [k, v] of Object.entries(r.document.fields)) obj[k] = parseField(v);
      return obj;
    });
}

async function restQuery(examVal, yearVal) {
  const url  = `${REST_BASE}:runQuery?key=${REST_KEY}`;
  const mkBody = yField => ({ structuredQuery: { from: [{ collectionId: 'questions' }], where: { compositeFilter: { op: 'AND', filters: [
    { fieldFilter: { field: { fieldPath: 'exam' }, op: 'EQUAL', value: { stringValue: examVal } } },
    { fieldFilter: { field: { fieldPath: 'year' }, op: 'EQUAL', value: yField } },
  ] } } } });

  const yStr = String(yearVal);
  const yNum = parseInt(yearVal);

  let res  = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(mkBody({ stringValue: yStr })) });
  let docs = parseRestDocs(await res.json());

  if (docs.length === 0 && !isNaN(yNum)) {
    setMsg('Trying alternate format…');
    res  = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(mkBody({ integerValue: String(yNum) })) });
    docs = parseRestDocs(await res.json());
  }
  return docs;
}

/* ══════════════════════════════════════════
   CACHE — keyed by exam+year, 7-day TTL
══════════════════════════════════════════ */
const CACHE_VER = 'v4';
const CACHE_TTL = 7 * 24 * 60 * 60 * 1000;
const cacheKey  = (!P.mockId && P.exam && (P.year || P.mockNum))
  ? `tssc__${CACHE_VER}__${P.exam}|${P.year || P.mockNum}`
  : null;

function readCache() {
  if (!cacheKey || P.nocache) return null;
  try {
    const obj = JSON.parse(localStorage.getItem(cacheKey) || 'null');
    if (!obj) return null;
    if (Date.now() - obj.ts > CACHE_TTL) { localStorage.removeItem(cacheKey); return null; }
    return obj.data;
  } catch { return null; }
}
function writeCache(docs) {
  if (!cacheKey || !docs.length) return;
  try {
    const s = JSON.stringify({ ts: Date.now(), data: docs });
    if (s.length < 4 * 1024 * 1024) localStorage.setItem(cacheKey, s);
  } catch {}
}

/* ══════════════════════════════════════════
   JS FILTER — 3-level fallback
══════════════════════════════════════════ */
function filterDocs(all, lang, shift, heldOn) {
  // Level 1: strict match (missing doc field = wildcard)
  let out = all.filter(q => {
    const dl = (q.language || '').trim();
    if (lang  && dl && dl !== lang)                                                    return false;
    if (shift  && shift.trim()  && q.shift  && q.shift.trim()  && q.shift  !== shift)  return false;
    if (heldOn && heldOn.trim() && q.heldOn && q.heldOn.trim() && q.heldOn !== heldOn) return false;
    return true;
  });
  if (out.length > 0) return out;

  // Level 2: language only
  out = all.filter(q => {
    const dl = (q.language || '').trim();
    return !lang || !dl || dl === lang;
  });
  if (out.length > 0) return out;

  // Level 3: no filter — return everything
  return all;
}

/* ══════════════════════════════════════════
   TEXT / FORMAT HELPERS
══════════════════════════════════════════ */
function applyBR(s) { return s ? String(s).split('[BR]').join('<br>') : ''; }

function formatQText(raw) {
  if (!raw) return '';
  const text = applyBR(raw);
  if (text.includes('||')) {
    const [instr, ...rest] = text.split('||');
    return `<span class="q-instruction">${instr.trim()}</span><span class="q-sentence">${rest.join('').trim()}</span>`;
  }
  return text;
}

function formatSolution(raw) {
  if (!raw) return '';
  let t = applyBR(raw);
  t = t.replace(/\. Step /g, '.<br>Step ');
  t = t.replace(/([a-z0-9%₹])\. ([A-Z0-9₹])/g, '$1.<br>$2');
  t = t.replace(/ → /g, ' →<br>');
  t = t.replace(/∴/g, '<br>∴ ');
  t = t.replace(/∵/g, '<br>∵ ');
  return t;
}

function expandBR(arr) {
  const fields = ['text','question','explanation','trick','concept','option_A','option_B','option_C','option_D'];
  arr.forEach(q => fields.forEach(f => {
    if (typeof q[f] === 'string') q[f] = q[f].split('[BR]').join('<br>');
  }));
}

function getOptText(q, l) { return (q.options && q.options[l]) || q['option'+l] || q['option_'+l] || ''; }
function getOptImg(q, l)  { return (q.optionImages && q.optionImages[l]) || ''; }

/* ══════════════════════════════════════════
   EXAM TITLE BUILDER
══════════════════════════════════════════ */
const EXAM_NAMES  = { 'ssc-cgl':'SSC CGL','ssc-chsl':'SSC CHSL','ssc-mts':'SSC MTS','ssc-cpo':'SSC CPO','ssc-gd':'SSC GD','ssc-je':'SSC JE','ssc-jht':'SSC JHT' };
const TIER_LABELS = { 'tier1':'Tier I','tier-1':'Tier I','tier2':'Tier II','tier-2':'Tier II','paper1':'Paper I','paper2':'Paper II' };

function buildTitle() {
  const exam = EXAM_NAMES[P.exam] || P.exam.toUpperCase().replace(/-/g, ' ');
  const tier = P.tier ? (TIER_LABELS[P.tier.toLowerCase()] || P.tier) : '';
  const lang = P.lang === 'hi' ? '🇮🇳 Hindi' : P.lang === 'en' ? '🇬🇧 English' : '';
  if (P.mockNum && !P.year) return exam + ' — Mock ' + P.mockNum;
  const parts = [exam];
  if (tier)   parts.push(tier);
  if (P.year && parseInt(P.year) > 100) parts.push(P.year);
  if (P.shift) parts.push(P.shift);
  if (lang)   parts.push(lang);
  return parts.join(' · ');
}

/* ══════════════════════════════════════════
   LOAD QUESTIONS — clean flow with no hacks
══════════════════════════════════════════ */
async function loadQuestions() {
  try {
    setBar(10);

    /* ── FAST PATH: loader.html pre-fetched, stored under sskey ── */
    if (P.sskey) {
      setMsg('Reading questions…');
      const raw = sessionStorage.getItem(P.sskey) || localStorage.getItem(P.sskey);

      if (raw) {
        let qs = null;
        try { qs = JSON.parse(raw); } catch {}

        if (Array.isArray(qs) && qs.length > 0) {
          // Immediately clean up storage keys
          ['', '_meta'].forEach(suffix => {
            try { sessionStorage.removeItem(P.sskey + suffix); } catch {}
            try { localStorage.removeItem(P.sskey + suffix); } catch {}
          });

          setBar(85); setMsg(`${qs.length} questions found…`);

          // Sort and store
          qs.sort((a, b) => (parseInt(a.qNum) || 0) - (parseInt(b.qNum) || 0));
          questions = qs;
          showTest();
          return; // ← done, no Firestore needed
        }
      }

      // sskey in URL but not in storage: user refreshed after redirect
      // Re-run through loader.html so it re-fetches
      if (P.exam || P.mockId || P.mockNum) {
        const qs = location.search.replace(/[?&]sskey=[^&]*/g, '').replace(/^&/, '?');
        location.replace('loader.html' + qs);
        return;
      }
    }

    /* ── If no sskey, go through loader.html for fresh fetch ── */
    if (!P.sskey && (P.exam || P.mockId || P.mockNum)) {
      location.replace('loader.html' + location.search);
      return;
    }

    /* ── DIRECT FETCH fallback (accessed directly with exam+year params) ── */
    setBar(20); setMsg('Fetching questions…');

    let allDocs = [];

    // Try cache first
    const cached = readCache();
    if (cached && cached.length > 0) {
      setBar(60); setMsg(`${cached.length} questions from cache…`);
      allDocs = cached;
    } else {
      if (P.mockId) {
        setMsg('Loading mock test…');
        const snap = await getDoc(doc(db, 'mock_tests', P.mockId));
        if (!snap.exists()) { showError('Mock test not found.'); return; }
        const md = snap.data();
        const mYear = String(md.yearValue || md.seriesNum || md.year || '');
        if (!mYear) { showError('Mock test missing year/series field.'); return; }
        allDocs = await restQuery(md.exam || P.exam, mYear);
      } else if (P.year) {
        allDocs = await restQuery(P.exam, P.year);
      } else if (P.mockNum) {
        allDocs = await restQuery(P.exam, P.mockNum);
      } else {
        showError('No exam or year specified. Please go back and select a paper.');
        return;
      }
      if (!P.mockId) writeCache(allDocs);
    }

    setBar(70); setMsg(`${allDocs.length} questions fetched…`);

    if (allDocs.length === 0) {
      showError('No questions found for this paper yet.\nCheck back soon — we upload regularly!');
      return;
    }

    // Filter + sort + expand
    setMsg('Applying filters…');
    let filtered = filterDocs(allDocs, P.lang, P.shift, P.heldOn);
    if (filtered.length === 0) {
      showError(`Questions found (${allDocs.length}) but none match this paper filter.\nPlease go back and retry.`);
      return;
    }
    expandBR(filtered);
    filtered.sort((a, b) => (parseInt(a.qNum) || 0) - (parseInt(b.qNum) || 0));
    questions = filtered;

    setBar(95); setMsg(`${questions.length} questions ready…`);
    showTest();

  } catch (e) {
    console.error('[TrickySSC] loadQuestions:', e);
    showError('Error: ' + e.message + '\n\nCheck your internet connection and retry.');
  }
}

/* ══════════════════════════════════════════
   SHOW TEST SCREEN  — single, clean entry point
══════════════════════════════════════════ */
function showTest() {
  // Populate header
  $('examTitle').textContent = buildTitle();
  const uName = (currentUser && currentUser.displayName) || (getStoredUser() || {}).name || 'Student';
  $('examSub').textContent = uName;

  // Build sections & Q-grid
  buildSections();
  buildSectionBar();
  buildGrid();

  // Start timer
  currentQ = 0;
  if (!timerInt) startTimer();

  // Transition: hide loader → show test
  hideLoader();
  $('testScreen').classList.add('visible');

  // Render Q1 only AFTER the browser has fully painted the test layout.
  // Double rAF guarantees we're in the next frame after layout & paint.
  requestAnimationFrame(() => requestAnimationFrame(() => renderQ()));
}

/* ══════════════════════════════════════════
   RENDER QUESTION
══════════════════════════════════════════ */
function renderQ() {
  const q   = questions[currentQ];
  const idx = currentQ;

  $('qNumCurrent').textContent = idx + 1;
  $('qNumTotal').textContent   = questions.length;

  // Text
  $('qText').innerHTML = formatQText(q.text || q.question || '');

  // Image
  const imgWrap = $('qImgWrap');
  const imgEl   = $('qImg');
  if (q.imageUrl) { imgEl.src = q.imageUrl; imgWrap.style.display = 'block'; }
  else            { imgEl.src = ''; imgWrap.style.display = 'none'; }

  // Options
  $('optionsWrap').innerHTML = ['A','B','C','D'].map(l => {
    const txt  = getOptText(q, l);
    const img  = getOptImg(q, l);
    const sel  = answers[idx] === l ? 'selected' : '';
    const iTag = img ? `<img src="${img}" style="max-width:100%;max-height:${txt?'90px':'160px'};border-radius:6px;object-fit:contain;display:block;margin-top:${txt?'7px':'0'};" onerror="this.style.display='none'">` : '';
    return `<div class="option ${sel}" onclick="selectOpt('${l}')">
      <span class="opt-label">${l}</span>
      <div class="opt-body">${txt}${iTag}</div>
    </div>`;
  }).join('');

  // Mark button
  const mb = $('markBtn');
  if (mb) mb.classList.toggle('marked', !!marked[idx]);

  updateGrid();
  updateProgress();
  updateSectionBar();
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
window.selectOpt  = l => { answers[currentQ] = l; renderQ(); };
window.nextQ      = () => { if (currentQ < questions.length - 1) { currentQ++; renderQ(); } };
window.prevQ      = () => { if (currentQ > 0) { currentQ--; renderQ(); } };
window.goQ        = i => { currentQ = i; renderQ(); closeDrawer(); };
window.toggleMark = () => { marked[currentQ] = !marked[currentQ]; renderQ(); };

/* ══════════════════════════════════════════
   SECTIONS
══════════════════════════════════════════ */
const SUBJECT_SHORT = {
  'General Intelligence & Reasoning':'Reasoning','General Intelligence and Reasoning':'Reasoning',
  'Quantitative Aptitude':'Quant','General Awareness':'Gen. Awareness',
  'English Language':'English','English':'English',
  'reasoning':'Reasoning','quant':'Quant','gk':'Gen. Awareness','english':'English',
};

function buildSections() {
  sections = [];
  let prev = null;
  questions.forEach((q, i) => {
    const s = q.subject || q.section || '';
    if (s !== prev) {
      if (prev !== null) sections[sections.length - 1].to = i - 1;
      sections.push({ name: s, label: SUBJECT_SHORT[s] || s || ('Part ' + (sections.length + 1)), from: i, to: questions.length - 1 });
      prev = s;
    }
  });
  if (!sections.length && questions.length) sections = [{ name:'', label:'All Questions', from:0, to:questions.length-1 }];
}

function activeSec() { return Math.max(0, sections.findIndex(s => currentQ >= s.from && currentQ <= s.to)); }

function buildSectionBar() {
  const bar = $('sectionBar');
  if (sections.length <= 1) { if (bar) bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  updateSectionBar();
}

function updateSectionBar() {
  const bar = $('sectionBar');
  if (!bar || sections.length <= 1) return;
  const act = activeSec();
  bar.innerHTML = sections.map((s, i) => {
    const total = s.to - s.from + 1;
    const ans   = Array.from({ length: total }, (_, j) => answers[s.from + j]).filter(Boolean).length;
    const pct   = total > 0 ? Math.round(ans / total * 100) : 0;
    return `<div class="sec-tab${i === act ? ' active' : ''}" onclick="jumpSection(${i})">
      ${s.label}
      <span class="sec-tab-count">${ans}/${total}</span>
      <div class="sec-tab-prog"><div class="sec-tab-prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  const el = bar.querySelector('.sec-tab.active');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

window.jumpSection = idx => {
  if (idx < 0 || idx >= sections.length) return;
  const s = sections[idx];
  let t = s.from;
  for (let i = s.from; i <= s.to; i++) { if (!answers[i]) { t = i; break; } }
  currentQ = t; renderQ(); closeDrawer();
};

/* ══════════════════════════════════════════
   Q-DOT GRID
══════════════════════════════════════════ */
function dotClass(i) {
  let c = 'q-dot';
  if (marked[i])   c += ' marked';
  else if (answers[i]) c += ' answered';
  if (i === currentQ)  c += ' current';
  return c;
}

function buildGrid() {
  const buildFlat = prefix => questions.map((_, i) =>
    `<div class="${dotClass(i)}" id="${prefix}${i}" onclick="${prefix === 'sd' ? 'goQsb' : 'goQ'}(${i})">${i + 1}</div>`
  ).join('');

  const buildGrouped = prefix => sections.map(s =>
    `<div style="margin-bottom:10px;">
       <div class="sb-label" style="margin-bottom:5px;">${s.label}</div>
       <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;">
         ${Array.from({ length: s.to - s.from + 1 }, (_, j) => {
           const i = s.from + j;
           return `<div class="${dotClass(i)}" id="${prefix}${i}" onclick="${prefix === 'sd' ? 'goQsb' : 'goQ'}(${i})">${i + 1}</div>`;
         }).join('')}
       </div>
     </div>`
  ).join('');

  const sbGrid = $('sbGrid');
  if (sbGrid) sbGrid.innerHTML = sections.length > 1 ? buildGrouped('sd') : buildFlat('sd');

  const dGrid = $('drawerGrid');
  if (dGrid) dGrid.innerHTML = sections.length > 1 ? buildGrouped('dd') : buildFlat('dd');
}

window.goQsb = i => { currentQ = i; renderQ(); }; // sidebar dot (no drawer close)

function updateGrid() {
  questions.forEach((_, i) => {
    const c = dotClass(i);
    let el;
    el = document.getElementById('sd' + i); if (el) el.className = c;
    el = document.getElementById('dd' + i); if (el) el.className = c;
  });
}

function updateProgress() {
  const ans = Object.keys(answers).length;
  const tot = questions.length;
  $('sbProgressText').textContent = `${ans} / ${tot}`;
  $('sbProgressFill').style.width = `${tot ? Math.round(ans / tot * 100) : 0}%`;
}

/* ══════════════════════════════════════════
   TIMER
══════════════════════════════════════════ */
function startTimer() {
  function tick() {
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    $('timerDisplay').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    const urgent = timeLeft <= 300;
    $('timerDisplay').classList.toggle('urgent', urgent);
    $('timerPill').classList.toggle('urgent', urgent);
    if (timeLeft <= 0) { clearInterval(timerInt); submitTest(); }
    timeLeft--;
  }
  tick(); // render immediately, no 1-second blank
  timerInt = setInterval(tick, 1000);
}

/* ══════════════════════════════════════════
   DRAWER
══════════════════════════════════════════ */
window.openDrawer  = () => { $('drawerOverlay').style.display = 'block'; $('drawer').style.display = 'block'; };
window.closeDrawer = () => { $('drawerOverlay').style.display = 'none';  $('drawer').style.display = 'none'; };

/* ══════════════════════════════════════════
   LOGOUT
══════════════════════════════════════════ */
window.doLogout = () => {
  localStorage.removeItem('tssc_user');
  signOut(auth).finally(() => { location.href = 'login.html'; });
};

/* ══════════════════════════════════════════
   SUBMIT + RESULT
══════════════════════════════════════════ */
window.confirmSubmit = () => {
  if (confirm('Submit the test? You cannot change answers after submission.')) submitTest();
};

async function submitTest() {
  if (isSubmitting) return;
  isSubmitting = true;
  clearInterval(timerInt);

  // Tally results
  let correct = 0, wrong = 0, skip = 0;
  questions.forEach((q, i) => {
    const a = answers[i];
    if (!a) skip++; else if (a === q.correct) correct++; else wrong++;
  });
  const marks = +(correct * 2 - wrong * 0.5).toFixed(1);
  const pct   = questions.length ? Math.round(correct / questions.length * 100) : 0;

  // Switch screens
  $('testScreen').classList.remove('visible');
  $('resultScreen').classList.add('visible');

  // Fill result card
  $('resultExamName').textContent = buildTitle();
  $('scorePct').textContent       = pct + '%';
  $('rCorrect').textContent       = correct;
  $('rWrong').textContent         = wrong;
  $('rSkip').textContent          = skip;
  $('rMarks').textContent         = marks;

  // Build review list
  buildReview();

  // Save to Firestore
  if (!currentUser || !currentUser.uid) {
    setSaveUI('error', '⚠️ Not logged in — result cannot be saved.');
    isSubmitting = false;
    return;
  }

  const attemptId = `${currentUser.uid}_${P.exam || 'exam'}_${P.year || 'na'}_${Date.now()}`;
  const payload = {
    uid: currentUser.uid,
    exam: P.exam, year: P.year,
    total: questions.length, correct, wrong, skip, marks, percentage: pct,
    answers, timestamp: serverTimestamp(),
    clientSubmittedAt: new Date().toISOString(),
  };
  lastSave = { attemptId, payload };

  try {
    await persistWithRetry(payload, attemptId);
    localStorage.removeItem('pending_' + attemptId);
    setSaveUI('saved', '✅ Result saved successfully.');
  } catch (e) {
    console.warn('[TrickySSC] save failed:', e);
    localStorage.setItem('pending_' + attemptId, JSON.stringify(lastSave));
    setSaveUI('error', '⚠️ Could not save. Check internet and tap Retry Save.');
  }
  isSubmitting = false;
}

async function persistAttempt(payload, attemptId) {
  await setDoc(doc(db, 'attempts', attemptId), payload, { merge: true });
  const uRef  = doc(db, 'users', payload.uid);
  const uSnap = await getDoc(uRef);
  const ud    = uSnap.exists() ? uSnap.data() : {};
  const prev  = parseInt(ud.totalTests) || 0;
  const pAvg  = parseFloat(ud.avgScore)  || 0;
  const newTot  = prev + 1;
  const newAvg  = parseFloat(((pAvg * prev + payload.percentage) / newTot).toFixed(1));
  const newBest = Math.max(parseFloat(ud.bestScore) || 0, payload.percentage);
  await setDoc(uRef, { totalTests: newTot, avgScore: newAvg, bestScore: newBest, lastActive: serverTimestamp() }, { merge: true });
}

async function persistWithRetry(payload, attemptId, tries = 3) {
  for (let i = 1; i <= tries; i++) {
    try { await persistAttempt(payload, attemptId); return; }
    catch (e) { if (i === tries) throw e; await new Promise(r => setTimeout(r, 600 * i)); }
  }
}

window.retrySave = async () => {
  if (!lastSave) return;
  setSaveUI('saving', '⏳ Retrying save…');
  try {
    await persistWithRetry(lastSave.payload, lastSave.attemptId);
    localStorage.removeItem('pending_' + lastSave.attemptId);
    setSaveUI('saved', '✅ Result saved successfully.');
  } catch { setSaveUI('error', '⚠️ Save failed again. Check internet and retry.'); }
};

function setSaveUI(state, msg) {
  const db = $('dashBtn'), rb = $('retryBtn'), st = $('saveStatus');
  if (!db) return;
  st.textContent = msg;
  if (state === 'saving') { db.disabled = true; db.textContent = 'Saving result…'; rb.style.display = 'none'; st.style.color = 'var(--text-muted)'; }
  else if (state === 'saved')  { db.disabled = false; db.textContent = 'Go to Dashboard'; rb.style.display = 'none'; st.style.color = 'var(--green)'; }
  else /* error */             { db.disabled = true; db.textContent = 'Dashboard'; rb.style.display = 'inline-block'; st.style.color = 'var(--red)'; }
}

/* ══════════════════════════════════════════
   REVIEW LIST
══════════════════════════════════════════ */
function buildReview() {
  $('reviewList').innerHTML = questions.map((q, i) => {
    const a      = answers[i];
    const status = !a ? 'skip' : a === q.correct ? 'correct' : 'wrong';
    const icons  = { correct:'✅', wrong:'❌', skip:'⏭️' };
    const vBg    = { correct:'#F0FDF4', wrong:'#FEF2F2', skip:'#FFFBEB' };
    const vClr   = { correct:'#15803D', wrong:'#DC2626', skip:'#B45309' };
    const vText  = {
      correct: 'Correct!',
      wrong:   `Wrong — you answered <b>${a}</b>, correct is <b>${q.correct}</b>`,
      skip:    'Skipped',
    };

    // Question text
    const rawText = q.text || q.question || '';
    let qHtml;
    if (applyBR(rawText).includes('||')) {
      const [instr, ...rest] = applyBR(rawText).split('||');
      qHtml = `<div style="font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:6px;line-height:1.6;">Q${i+1}. ${instr.trim()}</div>
               <div style="font-size:13.5px;font-weight:600;color:var(--text-main);padding:9px 13px;background:#F8FAFC;border-left:3px solid var(--orange);border-radius:0 6px 6px 0;margin-bottom:10px;line-height:1.7;">${rest.join('').trim()}</div>`;
    } else {
      qHtml = `<div class="review-q-text">Q${i+1}. ${applyBR(rawText)}</div>`;
    }

    // Options grid
    const optsHtml = `<div class="review-opts">${['A','B','C','D'].map(l => {
      const txt = getOptText(q, l);
      const img = getOptImg(q, l);
      const isC = l === q.correct;
      const isW = l === a && a !== q.correct;
      let cls   = 'review-opt';
      if (isC) cls += ' is-correct';
      if (isW) cls += ' is-wrong';
      const marker = isC ? ' ✅' : isW ? ' ✗' : '';
      const imgTag = img ? `<div style="margin-top:5px;"><img src="${img}" style="max-width:100%;max-height:90px;border-radius:5px;object-fit:contain;" onerror="this.style.display='none'"></div>` : '';
      return `<div class="${cls}"><b>${l})</b> ${txt}${marker}${imgTag}</div>`;
    }).join('')}</div>`;

    // Verdict
    const verdictHtml = `<div class="review-verdict" style="background:${vBg[status]};color:${vClr[status]};">
      ${icons[status]} ${vText[status]}
    </div>`;

    // Expandable solution
    const hasSol = q.explanation || q.solutionImage || q.trick || q.concept;
    const solHtml = hasSol ? `
      <button class="review-expand-btn" onclick="toggleSol(this)">💡 View Solution ▼</button>
      <div class="review-solution">
        ${q.explanation || q.solutionImage ? `
          <div class="sol-block">
            <div class="sol-header" style="background:#DCFCE7;color:#15803D;">💡 Step-by-Step Solution</div>
            <div class="sol-body" style="background:var(--green-bg);color:#374151;">
              ${formatSolution(q.explanation || '')}
              ${q.solutionImage ? `<img src="${q.solutionImage}" style="max-width:100%;border-radius:6px;margin-top:8px;display:block;object-fit:contain;" onerror="this.style.display='none'">` : ''}
            </div>
          </div>` : ''}
        ${q.trick ? `
          <div class="sol-block">
            <div class="sol-header" style="background:#DBEAFE;color:#1D4ED8;">⚡ Quick Trick</div>
            <div class="sol-body" style="background:var(--blue-bg);color:#1E40AF;">${formatSolution(q.trick)}</div>
          </div>` : ''}
        ${q.concept ? `
          <div class="sol-block">
            <div class="sol-header" style="background:#FED7AA;color:#C2410C;">🧠 Concept</div>
            <div class="sol-body" style="background:#FFF7ED;color:#7C2D12;">${formatSolution(q.concept)}</div>
          </div>` : ''}
      </div>` : '';

    // Q image
    const qImgHtml = q.imageUrl
      ? `<div style="text-align:center;margin:8px 0;"><img src="${q.imageUrl}" style="max-width:100%;max-height:220px;border-radius:8px;border:1px solid var(--border);object-fit:contain;background:#F9FAFB;" onerror="this.style.display='none'"></div>`
      : '';

    return `<div class="review-item ${status}">${qHtml}${qImgHtml}${optsHtml}${verdictHtml}${solHtml}</div>`;
  }).join('');
}

window.toggleSol = btn => {
  const sol  = btn.nextElementSibling;
  const open = sol.classList.toggle('open');
  btn.textContent = open ? '💡 Hide Solution ▲' : '💡 View Solution ▼';
};
</script>
