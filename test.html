<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TrickySSC Test Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Noto Sans',sans-serif;background:#F1F5F9;}
#loader{position:fixed;inset:0;background:#FF6B00;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;font-weight:700;font-size:22px;z-index:1000;}
#testScreen{display:none;height:100vh;flex-direction:column;}
.topbar{background:#1F2937;color:white;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;gap:10px;flex-wrap:wrap;}
.topbar-left{display:flex;flex-direction:column;}
.exam-title{font-family:'Rajdhani';font-size:16px;font-weight:700;color:#FF6B00;}
.user-name{font-size:12px;color:#9CA3AF;}
.timer{font-family:'Rajdhani';font-size:24px;font-weight:700;color:#FF6B00;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.main{flex:1;display:flex;overflow:hidden;}
.questionPanel{flex:1;padding:24px;overflow:auto;}
.qNum{font-size:13px;color:#6B7280;margin-bottom:8px;}
.qText{font-size:16px;font-weight:500;color:#1F2937;line-height:1.6;margin-bottom:20px;}
.option{border:2px solid #E5E7EB;padding:12px 16px;border-radius:8px;margin-bottom:10px;cursor:pointer;font-size:14px;transition:all 0.15s;}
.option:hover{border-color:#FF6B00;}
.option.selected{border-color:#FF6B00;background:#FFF3E8;}
.option.correct{border-color:#16A34A;background:#F0FDF4;color:#15803D;}
.option.wrong{border-color:#DC2626;background:#FEF2F2;color:#DC2626;}
.nav-btns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-family:'Rajdhani';font-size:15px;font-weight:700;}
.btn-prev{background:#E5E7EB;color:#374151;}
.btn-next{background:#FF6B00;color:white;}
.btn-submit{background:#1F2937;color:white;}
.sidebar{width:200px;border-left:1px solid #E5E7EB;padding:12px;overflow:auto;background:white;}
.sidebar h4{font-family:'Rajdhani';font-size:14px;color:#6B7280;margin-bottom:10px;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.dot{padding:6px;text-align:center;border:1px solid #E5E7EB;background:white;cursor:pointer;font-size:12px;border-radius:4px;}
.dot.answered{background:#16A34A;color:white;border-color:#16A34A;}
.dot.current{border-color:#FF6B00;font-weight:700;}
#resultScreen{display:none;padding:30px;max-width:700px;margin:auto;}
.result-card{background:white;border-radius:16px;padding:30px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:20px;}
.score-big{font-family:'Rajdhani';font-size:64px;font-weight:700;color:#FF6B00;}
.score-label{font-size:14px;color:#6B7280;margin-top:-10px;}
.stats{display:flex;gap:20px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.stat{background:#F8FAFC;border-radius:10px;padding:12px 20px;text-align:center;}
.stat-val{font-family:'Rajdhani';font-size:28px;font-weight:700;}
.stat-lbl{font-size:12px;color:#6B7280;}
.review-item{background:white;border-radius:10px;padding:16px;margin-bottom:12px;border-left:4px solid #E5E7EB;}
.review-item.correct{border-left-color:#16A34A;}
.review-item.wrong{border-left-color:#DC2626;}
.review-item.skip{border-left-color:#F59E0B;}
.review-q{font-size:14px;font-weight:500;color:#1F2937;margin-bottom:8px;}
.review-ans{font-size:13px;color:#6B7280;}
.logout-btn{background:transparent;border:1px solid #6B7280;color:#9CA3AF;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
</style>
</head>
<body>

<div id="loader">⚡ TrickySSC<br><span style="font-size:14px;font-weight:400;margin-top:8px;">Loading...</span></div>

<div id="testScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="exam-title" id="examTitle">SSC Test</div>
      <div class="user-name" id="userName"></div>
    </div>
    <div class="timer" id="timer">60:00</div>
    <div class="topbar-right">
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="main">
    <div class="questionPanel">
      <div class="qNum" id="qNum"></div>
      <div id="qImgWrap" style="display:none;margin-bottom:14px;text-align:center;">
        <img id="qImg" style="max-width:100%;max-height:260px;border-radius:10px;border:1px solid #E5E7EB;object-fit:contain;background:#F9FAFB;" alt="Question figure">
      </div>
      <div class="qText" id="qText"></div>
      <div id="options"></div>
      <div class="nav-btns">
        <button class="btn btn-prev" onclick="prevQ()">← Prev</button>
        <button class="btn btn-next" onclick="nextQ()">Next →</button>
        <button class="btn btn-submit" onclick="confirmSubmit()">Submit Test</button>
      </div>
    </div>
    <div class="sidebar">
      <h4>Questions</h4>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<div id="resultScreen">
  <div class="result-card">
    <div style="font-family:'Rajdhani';font-size:20px;font-weight:700;color:#1F2937;margin-bottom:10px;" id="resultExamName"></div>
    <div class="score-big" id="scorePct"></div>
    <div class="score-label">Score</div>
    <div class="stats">
      <div class="stat"><div class="stat-val" style="color:#16A34A" id="statCorrect">0</div><div class="stat-lbl">Correct</div></div>
      <div class="stat"><div class="stat-val" style="color:#DC2626" id="statWrong">0</div><div class="stat-lbl">Wrong</div></div>
      <div class="stat"><div class="stat-val" style="color:#F59E0B" id="statSkip">0</div><div class="stat-lbl">Skipped</div></div>
      <div class="stat"><div class="stat-val" id="statMarks">0</div><div class="stat-lbl">Marks</div></div>
    </div>
    <button class="btn btn-next" id="goDashboardBtn" style="margin-top:20px;" onclick="window.location='https://trickyssc.com/dashboard.html'" disabled>Saving result...</button>
    <div id="saveStatus" style="margin-top:10px;font-size:12px;color:#6B7280;">⏳ Saving your result...</div>
    <button class="btn btn-submit" id="retrySaveBtn" style="margin-top:10px;display:none;" onclick="retrySaveResult()">Retry Save</button>
  </div>
  <div id="review"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,query,where,getDocs,doc,getDoc,setDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app=initializeApp({apiKey:"AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA",authDomain:"trickyssc-17bb3.firebaseapp.com",projectId:"trickyssc-17bb3",storageBucket:"trickyssc-17bb3.firebasestorage.app",messagingSenderId:"450627057220",appId:"1:450627057220:web:366267bf437d94f20c6e11"});
const db=getFirestore(app);
const auth=getAuth(app);

let questions=[],answers={},currentQ=0,timeLeft=3600,timerInterval,currentUser=null;
let isSubmitting=false,lastResultPayload=null;
const params=new URLSearchParams(window.location.search);
const exam=params.get('exam');
const year=params.get('year');

// Wait for Firebase auth to restore session before deciding to redirect
let authResolved = false;
const authTimeout = setTimeout(async()=>{
  if(authResolved) return;
  // Firebase took too long — use localStorage fallback
  const stored = localStorage.getItem('tssc_user');
  if(stored){
    try{
      const mu=JSON.parse(stored);
      if(mu.uid){currentUser={uid:mu.uid,displayName:mu.name||'Student'};await loadTest();return;}
    }catch(e){}
  }
  localStorage.setItem('loginReturnTo',window.location.href);
  window.location.href='login.html';
}, 3000); // wait 3 seconds for Firebase

onAuthStateChanged(auth,async user=>{
  authResolved = true;
  clearTimeout(authTimeout);
  if(!user){
    const stored=localStorage.getItem('tssc_user');
    if(stored){
      try{
        const mu=JSON.parse(stored);
        if(mu.uid){currentUser={uid:mu.uid,displayName:mu.name||'Student'};await loadTest();return;}
      }catch(e){}
    }
    localStorage.setItem('loginReturnTo',window.location.href);
    window.location.href='login.html';
    return;
  }
  currentUser=user;
  // Always sync Firebase uid to localStorage so dashboard matches
  const existingStored = localStorage.getItem('tssc_user');
  const existingData = existingStored ? JSON.parse(existingStored) : {};
  localStorage.setItem('tssc_user',JSON.stringify({
    ...existingData,
    uid:user.uid,
    name:user.displayName||existingData.name||'Student'
  }));
  await loadTest();
});

async function loadTest(){
  try{
    let q=query(collection(db,'questions'),where('exam','==',exam));
    if(year) q=query(collection(db,'questions'),where('exam','==',exam),where('year','==',year));
    const snap=await getDocs(q);
    snap.forEach(d=>questions.push({id:d.id,...d.data()}));
    questions.sort((a,b)=>(a.qNum||0)-(b.qNum||0));
    if(questions.length===0){
      document.getElementById('loader').innerHTML=`
  <div style="text-align:center;padding:2rem;">
    <div style="font-size:3rem;margin-bottom:1rem;">🚀</div>
    <div style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">Coming Soon!</div>
    <div style="font-size:1rem;font-weight:400;opacity:0.9;margin-bottom:1.5rem;">We're adding questions for this paper.<br>Check back soon!</div>
    <a href="javascript:history.back()" style="background:white;color:#FF6B00;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;padding:0.6rem 1.5rem;border-radius:10px;text-decoration:none;">← Go Back</a>
  </div>
`;
      return;
    }
    document.getElementById('examTitle').textContent=(exam||'').toUpperCase().replace('-',' ')+(year?' '+year:'');
    document.getElementById('userName').textContent=currentUser.displayName||'Student';
    document.getElementById('loader').style.display='none';
    document.getElementById('testScreen').style.display='flex';
    buildGrid();renderQ();startTimer();
  }catch(e){
    document.getElementById('loader').innerHTML='❌ Error loading: '+e.message+'<br><a href="javascript:history.back()" style="color:white;font-size:14px;">← Go Back</a>';
  }
}

function renderQ(){
  const q=questions[currentQ];
  document.getElementById('qNum').textContent='Question '+(currentQ+1)+' of '+questions.length;
  document.getElementById('qText').textContent=q.text||q.question||'';
  // Show/hide question image
  const imgWrap=document.getElementById('qImgWrap');
  const imgEl=document.getElementById('qImg');
  if(q.imageUrl){
    imgEl.src=q.imageUrl;
    imgWrap.style.display='block';
  } else {
    imgWrap.style.display='none';
    imgEl.src='';
  }
  const opts=['A','B','C','D'];
  document.getElementById('options').innerHTML=opts.map(o=>`<div class="option ${answers[currentQ]===o?'selected':''}" onclick="selectOpt('${o}')">${o}) ${q.options?q.options[o]:q['option'+o]||''}</div>`).join('');
  updateGrid();
}

window.selectOpt=o=>{answers[currentQ]=o;renderQ();};
window.nextQ=()=>{if(currentQ<questions.length-1){currentQ++;renderQ();}};
window.prevQ=()=>{if(currentQ>0){currentQ--;renderQ();}};
window.goQ=i=>{currentQ=i;renderQ();};

function buildGrid(){
  document.getElementById('grid').innerHTML=questions.map((_,i)=>`<div class="dot" id="dot${i}" onclick="goQ(${i})">${i+1}</div>`).join('');
}

function updateGrid(){
  questions.forEach((_,i)=>{
    const el=document.getElementById('dot'+i);
    if(!el)return;
    el.className='dot'+(answers[i]?' answered':'')+(i===currentQ?' current':'');
  });
}

function startTimer(){
  timerInterval=setInterval(()=>{
    timeLeft--;
    const m=Math.floor(timeLeft/60),s=timeLeft%60;
    document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    if(timeLeft<=0){clearInterval(timerInterval);submitTest();}
  },1000);
}


function setSaveUi(state,msg){
  const goBtn=document.getElementById('goDashboardBtn');
  const saveStatus=document.getElementById('saveStatus');
  const retryBtn=document.getElementById('retrySaveBtn');
  if(!goBtn||!saveStatus||!retryBtn)return;
  saveStatus.textContent=msg||'';
  if(state==='saving'){
    goBtn.disabled=true;
    goBtn.textContent='Saving result...';
    retryBtn.style.display='none';
    saveStatus.style.color='#6B7280';
  }else if(state==='saved'){
    goBtn.disabled=false;
    goBtn.textContent='Go to Dashboard';
    retryBtn.style.display='none';
    saveStatus.style.color='#16A34A';
  }else if(state==='error'){
    goBtn.disabled=true;
    goBtn.textContent='Save required before dashboard';
    retryBtn.style.display='inline-block';
    saveStatus.style.color='#DC2626';
  }
}

async function persistAttempt(payload, attemptId){
  await setDoc(doc(db,'attempts',attemptId),payload,{merge:true});

  const userRef = doc(db,'users',payload.uid);
  const userSnap = await getDoc(userRef);
  if(userSnap.exists()){
    const ud = userSnap.data();
    const prevTotal = parseInt(ud.totalTests)||0;
    const prevAvg = parseFloat(ud.avgScore)||0;
    const prevBest = parseFloat(ud.bestScore)||0;
    const newTotal = prevTotal + 1;
    const newAvg = parseFloat(((prevAvg * prevTotal + payload.percentage) / newTotal).toFixed(1));
    const newBest = Math.max(prevBest, payload.percentage);
    await setDoc(userRef,{totalTests:newTotal, avgScore:newAvg, bestScore:newBest, lastActive:serverTimestamp()},{merge:true});
  } else {
    await setDoc(userRef,{uid:payload.uid, totalTests:1, avgScore:payload.percentage, bestScore:payload.percentage, lastActive:serverTimestamp()},{merge:true});
  }
}

async function persistWithRetry(payload, attemptId, retries=3){
  let lastErr;
  for(let i=1;i<=retries;i++){
    try{
      await persistAttempt(payload,attemptId);
      return;
    }catch(e){
      lastErr=e;
      await new Promise(r=>setTimeout(r,600*i));
    }
  }
  throw lastErr;
}

window.retrySaveResult=async()=>{
  if(!lastResultPayload){
    setSaveUi('error','⚠️ Nothing to retry. Please submit the test again.');
    return;
  }
  setSaveUi('saving','⏳ Retrying save...');
  try{
    await persistWithRetry(lastResultPayload.payload,lastResultPayload.attemptId,3);
    localStorage.removeItem('pending_attempt_'+lastResultPayload.attemptId);
    setSaveUi('saved','✅ Result saved successfully.');
  }catch(e){
    console.warn('Retry save failed:',e);
    localStorage.setItem('pending_attempt_'+lastResultPayload.attemptId,JSON.stringify(lastResultPayload));
    setSaveUi('error','⚠️ Save failed again. Check your internet and tap Retry Save.');
  }
};
window.confirmSubmit=()=>{
  if(confirm('Submit test? You cannot change answers after submission.')) submitTest();
};

window.submitTest=async()=>{
  if(isSubmitting)return;
  isSubmitting=true;
  clearInterval(timerInterval);
  setSaveUi('saving','⏳ Saving your result...');

  let correct=0,wrong=0,skip=0;
  questions.forEach((q,i)=>{
    const a=answers[i];
    if(!a) skip++;
    else if(a===q.correct) correct++;
    else wrong++;
  });
  const marks=(correct*2 - wrong*0.5).toFixed(1);
  const pct=Math.round((correct/questions.length)*100);
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  document.getElementById('resultExamName').textContent=(exam||'').toUpperCase().replace('-',' ')+(year?' '+year:'');
  document.getElementById('scorePct').textContent=pct+'%';
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statWrong').textContent=wrong;
  document.getElementById('statSkip').textContent=skip;
  document.getElementById('statMarks').textContent=marks;
  // Review
  document.getElementById('review').innerHTML=questions.map((q,i)=>{
    const a=answers[i];
    const status=!a?'skip':a===q.correct?'correct':'wrong';
    return`<div class="review-item ${status}">
      <div class="review-q">${i+1}. ${q.text||q.question||''}</div>
      ${q.imageUrl?`<div style="margin:6px 0;"><img src="${q.imageUrl}" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid #E5E7EB;object-fit:contain;background:#F9FAFB;" onerror="this.style.display='none'" alt="Question figure"></div>`:''}
      <div class="review-ans">Your answer: <b>${a||'Skipped'}</b> &nbsp;|&nbsp; Correct: <b>${q.correct||'?'}</b></div>
      ${q.explanation?`<div style="font-size:12px;color:#374151;margin-top:6px;padding:8px 10px;background:#F0FDF4;border-left:3px solid #16A34A;border-radius:4px;">💡 <b>Solution:</b> ${q.explanation}</div>`:''}
      ${q.trick?`<div style="font-size:12px;color:#1D4ED8;margin-top:5px;padding:8px 10px;background:#EFF6FF;border-left:3px solid #3B82F6;border-radius:4px;">⚡ <b>Trick:</b> ${q.trick}</div>`:''}
    </div>`;
  }).join('');

  if(!currentUser||!currentUser.uid){
    setSaveUi('error','⚠️ Not logged in. Result cannot be saved. Please login and retry.');
    isSubmitting=false;
    return;
  }

  const attemptId=`${currentUser.uid}_${exam||'exam'}_${year||'na'}_${Date.now()}`;
  const payload={
    uid:currentUser.uid,
    exam,
    year:year||'',
    total:questions.length,
    correct,
    wrong,
    skip,
    marks:parseFloat(marks),
    percentage:pct,
    answers,
    timestamp:serverTimestamp(),
    clientSubmittedAt:new Date().toISOString()
  };
  lastResultPayload={attemptId,payload};

  try{
    await persistWithRetry(payload,attemptId,3);
    localStorage.removeItem('pending_attempt_'+attemptId);
    setSaveUi('saved','✅ Result saved successfully.');
  }catch(e){
    console.warn('Save attempt failed:',e);
    localStorage.setItem('pending_attempt_'+attemptId,JSON.stringify(lastResultPayload));
    setSaveUi('error','⚠️ Could not save your result. Check internet and tap Retry Save.');
  }

  isSubmitting=false;
};

window.doLogout=()=>{
  localStorage.removeItem('tssc_user');
  signOut(auth).finally(()=>window.location.href='login.html');
};
</script>
</body>
</html>
