<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrickySSC — Test Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Noto Sans',sans-serif;
margin:0;
background:#F0F2F5;
}

#initLoader{
position:fixed;
inset:0;
background:#FF6B00;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
font-weight:700;
z-index:100;
}

#testScreen{display:none;height:100vh;flex-direction:column;}

.topbar{
background:#1F2937;
color:white;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.timer{
font-family:'Rajdhani';
font-size:24px;
font-weight:700;
}

.qPanel{
flex:1;
overflow:auto;
padding:30px;
}

.opt{
border:2px solid #ddd;
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.opt.selected{
border-color:#FF6B00;
background:#FFF3E8;
}

.sidebar{
width:200px;
border-left:1px solid #ddd;
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.dot{
background:white;
border:1px solid #ccc;
padding:6px;
text-align:center;
cursor:pointer;
}

.dot.answered{
background:#16A34A;
color:white;
}

.result{
display:none;
padding:40px;
max-width:800px;
margin:auto;
}

</style>
</head>

<body>

<div id="initLoader">
⚡ TrickySSC<br>
Loading Test...
</div>

<div id="testScreen">

<div class="topbar">
<div id="examName">SSC Test</div>
<div class="timer" id="timer">60:00</div>
</div>

<div style="display:flex;height:100%">

<div class="qPanel">

<div id="qText"></div>

<div id="options"></div>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitTest()">Submit</button>

</div>

<div class="sidebar">
<div class="grid" id="grid"></div>
</div>

</div>

</div>


<div class="result" id="result">

<h1 id="score"></h1>

<div id="review"></div>

</div>


<script type="module">

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,query,where,getDocs,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig={
apiKey:"AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA",
authDomain:"trickyssc-17bb3.firebaseapp.com",
projectId:"trickyssc-17bb3",
storageBucket:"trickyssc-17bb3.firebasestorage.app",
messagingSenderId:"450627057220",
appId:"1:450627057220:web:366267bf437d94f20c6e11"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);


let questions=[];
let answers={};
let currentQ=0;
let timer=3600;
let timerInterval=null;

const urlParams=new URLSearchParams(window.location.search);
const exam=urlParams.get("exam");
const year=urlParams.get("year");


onAuthStateChanged(auth,async user=>{

if(!user){
window.location="login.html";
return;
}

await loadTest(user);

});


async function loadTest(user){

document.getElementById("initLoader").style.display="flex";

let q=query(collection(db,"questions"),where("exam","==",exam));

if(year){
q=query(collection(db,"questions"),where("exam","==",exam),where("year","==",year));
}

const snap=await getDocs(q);

snap.forEach(d=>{
questions.push({id:d.id,...d.data()})
});

questions.sort((a,b)=>a.qNum-b.qNum);

document.getElementById("initLoader").style.display="none";
document.getElementById("testScreen").style.display="flex";

buildGrid();

renderQ();

startTimer();

}


function renderQ(){

const q=questions[currentQ];

document.getElementById("qText").innerText=(currentQ+1)+". "+q.text;

const opts=["A","B","C","D"];

document.getElementById("options").innerHTML=opts.map(o=>`

<div class="opt ${answers[currentQ]==o?"selected":""}" onclick="selectOpt('${o}')">

${o}) ${q.options[o]||""}

</div>

`).join("");

updateGrid();

}


window.selectOpt=(o)=>{

answers[currentQ]=o;

renderQ();

};


window.nextQ=()=>{

if(currentQ<questions.length-1){
currentQ++;
renderQ();
}

};

window.prevQ=()=>{

if(currentQ>0){
currentQ--;
renderQ();
}

};

function buildGrid(){

document.getElementById("grid").innerHTML=questions.map((_,i)=>`

<div class="dot" id="dot${i}" onclick="goQ(${i})">${i+1}</div>

`).join("");

}

window.goQ=(i)=>{

currentQ=i;
renderQ();

};


function updateGrid(){

questions.forEach((_,i)=>{

const dot=document.getElementById("dot"+i);

dot.className="dot"+(answers[i]?" answered":"");

});

}


function startTimer(){

timerInterval=setInterval(()=>{

timer--;

const m=Math.floor(timer/60);
const s=timer%60;

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

if(timer<=0){

clearInterval(timerInterval);

submitTest();

}

},1000);

}


window.submitTest=async()=>{

clearInterval(timerInterval);

let correct=0;
let wrong=0;

questions.forEach((q,i)=>{

const a=answers[i];

if(a===q.correct)correct++;
else if(a)wrong++;

});

const score=Math.round(correct/questions.length*100);

document.getElementById("testScreen").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText="Score: "+score+"%";

try{

await addDoc(collection(db,"attempts"),{

exam,
total:questions.length,
correct,
wrong,
answers,
timestamp:serverTimestamp()

});

}catch(e){
console.log(e);
}

};

</script>

</body>
</html>
