<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>TrickySSC Test Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Noto Sans',sans-serif;
background:#F1F5F9;
}

#loader{
position:fixed;
inset:0;
background:#FF6B00;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:700;
font-size:22px;
z-index:1000;
}

#testScreen{
display:none;
height:100vh;
flex-direction:column;
}

.topbar{
background:#1F2937;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
}

.timer{
font-family:'Rajdhani';
font-size:24px;
font-weight:700;
}

.main{
flex:1;
display:flex;
}

.questionPanel{
flex:1;
padding:30px;
overflow:auto;
}

.option{
border:2px solid #ddd;
padding:12px;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
}

.option.selected{
border-color:#FF6B00;
background:#FFF3E8;
}

.sidebar{
width:200px;
border-left:1px solid #ddd;
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.dot{
padding:6px;
text-align:center;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.dot.answered{
background:#16A34A;
color:white;
}

#resultScreen{
display:none;
padding:40px;
max-width:800px;
margin:auto;
}

</style>

</head>

<body>

<div id="loader">
⚡ TrickySSC<br>
Loading Test...
</div>

<div id="testScreen">

<div class="topbar">
<div id="examName">SSC Test</div>
<div class="timer" id="timer">60:00</div>
</div>

<div class="main">

<div class="questionPanel">

<h3 id="qText"></h3>

<div id="options"></div>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitTest()">Submit</button>

</div>

<div class="sidebar">

<div class="grid" id="grid"></div>

</div>

</div>

</div>


<div id="resultScreen">

<h1 id="score"></h1>

<div id="review"></div>

</div>


<script type="module">

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,query,where,getDocs,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA",
authDomain:"trickyssc-17bb3.firebaseapp.com",
projectId:"trickyssc-17bb3",
storageBucket:"trickyssc-17bb3.firebasestorage.app",
messagingSenderId:"450627057220",
appId:"1:450627057220:web:366267bf437d94f20c6e11"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let questions=[];
let answers={};
let currentQ=0;
let timeLeft=3600;
let timerInterval;

const params=new URLSearchParams(window.location.search);
const exam=params.get("exam");
const year=params.get("year");

onAuthStateChanged(auth,async user=>{

if(!user){

localStorage.setItem("loginReturnTo",window.location.href);
window.location="login.html";
return;

}

await loadTest(user);

});

async function loadTest(user){

let q=query(collection(db,"questions"),where("exam","==",exam));

if(year){
q=query(collection(db,"questions"),where("exam","==",exam),where("year","==",year));
}

const snap=await getDocs(q);

snap.forEach(d=>{
questions.push({id:d.id,...d.data()});
});

questions.sort((a,b)=>(a.qNum||0)-(b.qNum||0));

document.getElementById("loader").style.display="none";
document.getElementById("testScreen").style.display="flex";

buildGrid();
renderQ();
startTimer();

}

function renderQ(){

const q=questions[currentQ];

document.getElementById("qText").innerText=(currentQ+1)+". "+q.text;

const opts=["A","B","C","D"];

document.getElementById("options").innerHTML=opts.map(o=>`

<div class="option ${answers[currentQ]==o?"selected":""}" onclick="selectOpt('${o}')">

${o}) ${q.options[o]||""}

</div>

`).join("");

updateGrid();

}

window.selectOpt=(o)=>{

answers[currentQ]=o;
renderQ();

};

window.nextQ=()=>{

if(currentQ<questions.length-1){
currentQ++;
renderQ();
}

};

window.prevQ=()=>{

if(currentQ>0){
currentQ--;
renderQ();
}

};

function buildGrid(){

document.getElementById("grid").innerHTML=questions.map((_,i)=>`

<div class="dot" id="dot${i}" onclick="goQ(${i})">${i+1}</div>

`).join("");

}

window.goQ=(i)=>{

currentQ=i;
renderQ();

};

function updateGrid(){

questions.forEach((_,i)=>{

const el=document.getElementById("dot"+i);

el.className="dot"+(answers[i]?" answered":"");

});

}

function startTimer(){

timerInterval=setInterval(()=>{

timeLeft--;

const m=Math.floor(timeLeft/60);
const s=timeLeft%60;

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

if(timeLeft<=0){

clearInterval(timerInterval);
submitTest();

}

},1000);

}

window.submitTest=async()=>{

clearInterval(timerInterval);

let correct=0;
let wrong=0;

questions.forEach((q,i)=>{

const a=answers[i];

if(a===q.correct)correct++;
else if(a)wrong++;

});

const percent=Math.round((correct/questions.length)*100);

document.getElementById("testScreen").style.display="none";
document.getElementById("resultScreen").style.display="block";

document.getElementById("score").innerText="Score: "+percent+"%";

await addDoc(collection(db,"attempts"),{

exam,
total:questions.length,
correct,
wrong,
answers,
timestamp:serverTimestamp()

});

};

</script>

</body>
</html>
