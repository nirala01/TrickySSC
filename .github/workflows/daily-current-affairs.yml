name: Daily Current Affairs Update

on:
  schedule:
    # 0:30 UTC = 6:00 AM IST every day
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  fetch-current-affairs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Current Affairs via Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node fetch-ca.js

      - name: Commit and push updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CA Bot"
          git add current-affairs-data.json
          git diff --staged --quiet || git commit -m "🗞️ Daily CA update - $(date +'%d %b %Y')"
          git push
