name: Daily Current Affairs Update

on:
  schedule:
    # 6:00 AM IST = 0:30 UTC
    - cron: '30 0 * * *'
    # 7:00 AM IST = 1:30 UTC (backup if 6 AM skipped)
    - cron: '30 1 * * *'
    # 8:00 PM IST = 14:30 UTC (evening update)
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  fetch-current-affairs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Current Affairs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node fetch-ca.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CA Bot"
          git add current-affairs-data.json ca-archive/
          git diff --staged --quiet || git commit -m "🗞️ CA update - $(date +'%d %b %Y %H:%M UTC')"
          git push
