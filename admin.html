<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrickySSC Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#0F172A;
color:#E2E8F0;
margin:0;
}

.topbar{
background:linear-gradient(135deg,#FF6B00,#FF8C38);
padding:14px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tabs{
display:flex;
gap:8px;
margin:20px;
}

.tab{
padding:10px 18px;
background:#1E293B;
border:none;
color:#94A3B8;
border-radius:6px;
cursor:pointer;
}

.tab.active{
background:#FF6B00;
color:#fff;
}

.card{
background:#1E293B;
padding:20px;
border-radius:12px;
margin:20px;
border:1px solid #334155;
}

select,input,textarea{
width:100%;
background:#0F172A;
border:1px solid #334155;
color:#E2E8F0;
padding:8px;
border-radius:6px;
}

.btn{
padding:10px 16px;
background:#FF6B00;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<h2>⚡ TrickySSC Admin</h2>
</div>

<div class="card">

<h3>Add Question</h3>

<label>Exam</label>
<select id="qExam">
<option value="ssc-cgl">SSC CGL</option>
<option value="ssc-chsl">SSC CHSL</option>
<option value="ssc-mts">SSC MTS</option>
<option value="ssc-gd">SSC GD</option>
<option value="ssc-cpo">SSC CPO</option>
<option value="ssc-jht">SSC JHT</option>
<option value="ssc-je">SSC JE</option>
</select>

<label>Tier / Session</label>
<select id="qTier"></select>

<label>Subject</label>
<select id="qSubject"></select>

<label>Year</label>
<select id="qYear">
<option>2025</option>
<option>2024</option>
<option>2023</option>
<option>2022</option>
<option>2021</option>
</select>

<label>Question</label>
<textarea id="qText"></textarea>

<label>Option A</label>
<input id="optA">

<label>Option B</label>
<input id="optB">

<label>Option C</label>
<input id="optC">

<label>Option D</label>
<input id="optD">

<label>Correct</label>
<select id="correct">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<br><br>

<button class="btn" onclick="saveQuestion()">Save Question</button>

</div>

<div class="card">

<h3>Export Database</h3>

<button class="btn" onclick="exportCSV()">
Download Questions CSV
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA",
authDomain:"trickyssc-17bb3.firebaseapp.com",
projectId:"trickyssc-17bb3",
storageBucket:"trickyssc-17bb3.firebasestorage.app",
messagingSenderId:"450627057220",
appId:"1:450627057220:web:366267bf437d94f20c6e11"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ===== Tier Mapping =====

const examTiers = {

"ssc-cgl":["Tier I","Tier II"],
"ssc-chsl":["Tier I","Tier II"],
"ssc-mts":["Session 1","Session 2"],
"ssc-gd":["CBT"],
"ssc-cpo":["Paper I","Paper II"],
"ssc-je":["Paper I (CBT)","Paper II (Descriptive)"],
"ssc-jht":["Paper I (CBT)","Paper II (Descriptive)"]

};


// ===== Subject Mapping =====

const examSubjects = {

"ssc-cgl":[
"All",
"General Intelligence & Reasoning",
"Quantitative Aptitude",
"English Comprehension",
"General Awareness"
],

"ssc-chsl":[
"All",
"General Intelligence",
"Quantitative Aptitude",
"English Language",
"General Awareness"
],

"ssc-mts":[
"All",
"Numerical Aptitude",
"Reasoning Ability",
"English Language",
"General Awareness"
],

"ssc-gd":[
"All",
"General Intelligence & Reasoning",
"General Knowledge & General Awareness",
"Elementary Mathematics",
"English / Hindi"
],

"ssc-cpo":[
"All",
"General Intelligence & Reasoning",
"General Knowledge & General Awareness",
"Quantitative Aptitude",
"English Comprehension"
],

"ssc-je":[
"All",
"General Intelligence & Reasoning",
"General Awareness",
"Civil Engineering",
"Mechanical Engineering",
"Electrical Engineering"
],

"ssc-jht":[
"All",
"General Hindi",
"General English",
"Translation (Hindi → English)",
"Translation (English → Hindi)"
]

};




// ===== Update Tier Dropdown =====

function updateTier(){

const exam=document.getElementById("qExam").value;
const tier=document.getElementById("qTier");

tier.innerHTML="";

examTiers[exam].forEach(t=>{

let opt=document.createElement("option");
opt.textContent=t;
opt.value=t;
tier.appendChild(opt);

});

}



// ===== Update Subject Dropdown =====

function updateSubject(){

const exam=document.getElementById("qExam").value;
const subject=document.getElementById("qSubject");

subject.innerHTML="";

examSubjects[exam].forEach(s=>{

let opt=document.createElement("option");
opt.textContent=s;
opt.value=s;
subject.appendChild(opt);

});

}



document.getElementById("qExam").addEventListener("change",()=>{

updateTier();
updateSubject();

});

updateTier();
updateSubject();




// ===== Save Question =====

window.saveQuestion=async()=>{

await addDoc(collection(db,"questions"),{

exam:document.getElementById("qExam").value,
tier:document.getElementById("qTier").value,
subject:document.getElementById("qSubject").value,
year:document.getElementById("qYear").value,

text:document.getElementById("qText").value,

options:{
A:document.getElementById("optA").value,
B:document.getElementById("optB").value,
C:document.getElementById("optC").value,
D:document.getElementById("optD").value
},

correct:document.getElementById("correct").value,

createdAt:new Date()

});

alert("Question saved");

};




// ===== Export CSV =====

window.exportCSV=async()=>{

const snap=await getDocs(collection(db,"questions"));

let rows=[];

rows.push([
"Exam","Tier","Year","Subject",
"Question","A","B","C","D","Correct"
]);

snap.forEach(doc=>{

const q=doc.data();

rows.push([
q.exam,
q.tier,
q.year,
q.subject,
q.text,
q.options?.A,
q.options?.B,
q.options?.C,
q.options?.D,
q.correct
]);

});

let csv=rows.map(r=>r.join(",")).join("\n");

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="trickyssc_questions.csv";

a.click();

};

</script>

</body>
</html>
