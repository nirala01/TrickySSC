<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shortcut Tricks — TrickySSC</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3MMDNVBJQN"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3MMDNVBJQN');</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F1F5F9;color:#1E293B;min-height:100vh;}
.topbar{background:linear-gradient(135deg,#FF6B00,#FF8C38);padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;position:sticky;top:0;z-index:300;}
.topbar-left{display:flex;align-items:center;gap:8px;}
.brand{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani';font-size:14px;font-weight:700;color:#fff;}
.topbar-brand{font-family:'Rajdhani';font-size:1rem;font-weight:700;color:#fff;}
.topbar-right{display:flex;align-items:center;gap:0.5rem;}
.back-btn{background:rgba(255,255,255,0.2);color:#fff;padding:0.28rem 0.75rem;border-radius:100px;font-size:0.75rem;font-weight:600;text-decoration:none;}
.menu-btn{display:none;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:0.28rem 0.65rem;font-size:1rem;cursor:pointer;}
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 50px);}
.sidebar{background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;position:sticky;top:50px;height:calc(100vh - 50px);overflow:hidden;z-index:100;}
.sidebar-header{background:linear-gradient(135deg,#FF6B00,#FF8C38);color:#fff;padding:0.85rem 1rem;font-family:'Rajdhani';font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sidebar-close{display:none;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;}
.sb-search{padding:0.6rem 0.85rem;border-bottom:1px solid #E2E8F0;flex-shrink:0;}
.sb-search input{width:100%;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:0.4rem 0.7rem;font-size:0.8rem;outline:none;font-family:'Plus Jakarta Sans';}
.sb-search input:focus{border-color:#FF6B00;}
.topic-list{overflow-y:auto;flex:1;}
.topic-list::-webkit-scrollbar{width:3px;}
.topic-list::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}
.grp-header{padding:0.45rem 1rem;background:#F8FAFC;border-bottom:1px solid #E2E8F0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1;}
.grp-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#475569;}
.grp-arrow{font-size:0.68rem;color:#94A3B8;transition:transform 0.2s;}
.grp.collapsed .grp-arrow{transform:rotate(-90deg);}
.grp.collapsed .grp-body{display:none;}
.te{display:flex;align-items:center;gap:0.5rem;padding:0.65rem 1rem;cursor:pointer;border-bottom:1px solid #F8FAFC;border-left:3px solid transparent;transition:all 0.12s;}
.te:hover{background:#FFF7ED;border-left-color:#FF6B00;}
.te.active{background:#FFF7ED;border-left-color:#FF6B00;}
.te.active .te-name{color:#FF6B00;font-weight:700;}
.te-name{font-size:0.82rem;font-weight:500;color:#374151;flex:1;}
.no-items{padding:2rem 1rem;text-align:center;color:#94A3B8;font-size:0.82rem;}
.content-panel{padding:1.25rem 1rem;min-width:0;}
.welcome{text-align:center;padding:4rem 1rem;}
.welcome-icon{font-size:3rem;margin-bottom:1rem;}
.welcome h2{font-family:'Rajdhani';font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;}
.welcome p{font-size:0.85rem;color:#64748B;max-width:360px;margin:0 auto;}
.ch-header{margin-bottom:1rem;}
.ch-title{font-family:'Rajdhani';font-size:1.4rem;font-weight:700;margin-bottom:0.4rem;}
.chips{display:flex;gap:0.4rem;flex-wrap:wrap;}
.chip{font-size:0.7rem;font-weight:700;padding:0.18rem 0.6rem;border-radius:100px;}
.c-exam{background:#FFF7ED;color:#C2410C;}
.c-subj{background:#EFF6FF;color:#1D4ED8;}
.card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:1rem 1.1rem;margin-bottom:0.85rem;}
.blk{border-radius:0 8px 8px 0;padding:0.5rem 0.75rem;margin-bottom:0.65rem;}
.blk-lbl{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;}
.formula-blk{background:#EFF6FF;border-left:3px solid #3B82F6;}
.formula-blk .blk-lbl{color:#1D4ED8;}
.formula-blk .blk-txt{font-size:0.85rem;color:#1E40AF;font-weight:600;line-height:1.7;}
.trick-blk{background:#FFF7ED;border-left:3px solid #FF6B00;}
.trick-blk .blk-lbl{color:#C2410C;}
.trick-blk .blk-txt{font-size:0.83rem;color:#92400E;line-height:1.7;}
.example-blk{background:#F0FDF4;border-left:3px solid #16A34A;}
.example-blk .blk-lbl{color:#15803D;}
.example-blk .blk-txt{font-size:0.82rem;color:#166534;line-height:1.7;}
.pyq-sec{margin-top:0.25rem;}
.pyq-hdr{font-family:'Rajdhani';font-size:1rem;font-weight:700;margin-bottom:0.65rem;display:flex;align-items:center;gap:0.5rem;}
.pyq-card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:0.85rem;margin-bottom:0.55rem;}
.pyq-meta{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.4rem;}
.pyq-tag{background:#F1F5F9;color:#64748B;padding:0.08rem 0.42rem;border-radius:100px;font-size:0.63rem;font-weight:600;}
.pyq-tag.yr{background:#FFF7ED;color:#C2410C;}
.pyq-q{font-size:0.84rem;font-weight:600;color:#1E293B;line-height:1.5;margin-bottom:0.5rem;}
.pyq-opts{display:grid;grid-template-columns:1fr 1fr;gap:0.25rem;}
.pyq-opt{font-size:0.75rem;padding:0.28rem 0.5rem;border-radius:6px;border:1px solid #E2E8F0;color:#64748B;background:#F8FAFC;}
.pyq-opt.correct{border-color:#16A34A;background:#F0FDF4;color:#15803D;font-weight:600;}
.sol-btn{background:none;border:1px solid #E2E8F0;border-radius:6px;padding:0.18rem 0.55rem;font-size:0.7rem;color:#64748B;cursor:pointer;margin-top:0.4rem;font-family:'Plus Jakarta Sans';}
.sol-btn:hover{border-color:#FF6B00;color:#FF6B00;}
.sol-txt{display:none;margin-top:0.45rem;background:#F8FAFC;border-radius:6px;padding:0.45rem 0.65rem;font-size:0.75rem;color:#475569;line-height:1.6;}
.sol-txt.show{display:block;}
.spinner{width:30px;height:30px;border:3px solid #E2E8F0;border-top-color:#FF6B00;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.center-box{text-align:center;padding:2rem 1rem;color:#94A3B8;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;}
.overlay.show{display:block;}
@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .menu-btn{display:block;}
  .sidebar{position:fixed;top:0;left:-280px;height:100vh;width:280px;transition:left 0.25s;z-index:250;}
  .sidebar.open{left:0;}
  .sidebar-close{display:block;}
  .content-panel{padding:1rem 0.85rem;}
  .pyq-opts{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><div class="brand">T</div><span class="topbar-brand">TrickySSC — Tricks</span></div>
  <div class="topbar-right">
    <a href="index.html" class="back-btn">← Home</a>
    <button class="menu-btn" onclick="toggleSB()">☰</button>
  </div>
</div>
<div class="overlay" id="overlay" onclick="toggleSB()"></div>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><span>⚡ Shortcut Tricks</span><button class="sidebar-close" onclick="toggleSB()">✕</button></div>
    <div class="sb-search"><input type="text" placeholder="Search chapters..." oninput="filterList(this.value)"></div>
    <div class="topic-list" id="topicList"><div class="no-items"><div class="spinner"></div>Loading...</div></div>
  </div>
  <div class="content-panel" id="contentPanel">
    <div class="welcome"><div class="welcome-icon">⚡</div><h2>Shortcut Tricks</h2><p>Select a chapter from the sidebar to view formulas, tricks and SSC PYQ questions.</p></div>
  </div>
</div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,limit,getDocs}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const db=getFirestore(initializeApp({apiKey:'AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA',authDomain:'trickyssc-17bb3.firebaseapp.com',projectId:'trickyssc-17bb3',storageBucket:'trickyssc-17bb3.firebasestorage.app',messagingSenderId:'450627057220',appId:'1:450627057220:web:366267bf437d94f20c6e11'}));
window._fetchPYQ=async(subject,chapterKey,n=5)=>{
  try{
    const q=chapterKey?query(collection(db,'questions'),where('subject','==',subject),where('chapter','==',chapterKey),limit(n)):query(collection(db,'questions'),where('subject','==',subject),limit(n));
    return(await getDocs(q)).docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){return[];}
};
window._dbReady=true;window.dispatchEvent(new Event('dbReady'));
</script>
<script>
const URL='https://raw.githubusercontent.com/nirala01/TrickySSC/main/tricks-data.json';
let data=[],activeId=null;
const examParam=new URLSearchParams(window.location.search).get('exam')||'';
window.addEventListener('DOMContentLoaded',async()=>{
  try{const r=await fetch(URL+'?v='+Date.now());if(r.ok)data=await r.json();}catch(e){}
  // Update page title if exam param set
  if(examParam){
    document.querySelector('.topbar-brand').textContent='TrickySSC — '+examParam+' Tricks';
  }
  renderSB();
  // Auto-load first topic if exam param set
  const filtered=examParam?data.filter(t=>t.exam===examParam||t.exam==='All SSC'):data;
  if(filtered.length)loadTopic(filtered[0].id);
});
function renderSB(f=''){
  const fl=f.toLowerCase();
  const items=data.filter(t=>{
    const examMatch=!examParam||(t.exam===examParam||t.exam==='All SSC');
    const textMatch=!fl||t.chapter.toLowerCase().includes(fl)||t.subject.toLowerCase().includes(fl);
    return examMatch&&textMatch;
  });
  const grps={};
  items.forEach(t=>{
    const k=t.exam+'|'+t.subject;
    if(!grps[k])grps[k]={exam:t.exam,subject:t.subject,items:[]};
    grps[k].items.push(t);
  });
  const list=document.getElementById('topicList');
  if(!Object.keys(grps).length){list.innerHTML='<div class="no-items">No chapters found</div>';return;}
  list.innerHTML=Object.entries(grps).map(([k,g])=>{
    const gid='g'+btoa(k).replace(/[^a-z0-9]/gi,'');
    return`<div class="grp" id="${gid}">
      <div class="grp-header" onclick="toggleGrp('${gid}')"><span class="grp-label">${g.exam} · ${g.subject}</span><span class="grp-arrow">▾</span></div>
      <div class="grp-body">${g.items.map(t=>`<div class="te ${activeId===t.id?'active':''}" data-id="${t.id}" onclick="loadTopic('${t.id}')">${t.icon||'⚡'} <span class="te-name">${t.chapter}</span></div>`).join('')}</div>
    </div>`;
  }).join('');
}
window.toggleGrp=id=>document.getElementById(id)?.classList.toggle('collapsed');
window.filterList=v=>renderSB(v);
async function loadTopic(id){
  activeId=id;closeSB();
  document.querySelectorAll('.te').forEach(e=>e.classList.toggle('active',e.dataset.id===id));
  const t=data.find(x=>x.id===id);if(!t)return;
  document.getElementById('contentPanel').innerHTML='<div class="center-box"><div class="spinner"></div></div>';
  const pyqs=window._dbReady?await window._fetchPYQ(t.subject,t.chapterKey,5):[];
  document.getElementById('contentPanel').innerHTML=`
    <div class="ch-header">
      <div class="ch-title">${t.icon||'⚡'} ${t.chapter}</div>
      <div class="chips"><span class="chip c-exam">${t.exam}</span><span class="chip c-subj">${t.subject}</span></div>
    </div>
    <div class="card">
      ${t.formula?`<div class="blk formula-blk"><div class="blk-lbl">📐 Shortcut Formula</div><div class="blk-txt">${esc(t.formula).replace(/\n/g,'<br>')}</div></div>`:''}
      ${t.trick?`<div class="blk trick-blk"><div class="blk-lbl">⚡ Trick</div><div class="blk-txt">${esc(t.trick).replace(/\n/g,'<br>')}</div></div>`:''}
      ${t.example?`<div class="blk example-blk"><div class="blk-lbl">✅ Example</div><div class="blk-txt">${esc(t.example).replace(/\n/g,'<br>')}</div></div>`:''}
    </div>
    ${pyqs.length?`<div class="pyq-sec"><div class="pyq-hdr">📄 SSC PYQ Questions<span style="font-size:0.75rem;color:#64748B;font-weight:400;margin-left:0.4rem;">${pyqs.length} from database</span></div>${pyqs.map((q,i)=>pyqCard(q,i)).join('')}</div>`:`<div class="center-box"><p style="font-size:0.82rem;">No PYQ questions in database for this chapter yet.</p></div>`}`;
}
function pyqCard(q,i){
  const opts=['A','B','C','D'].map(l=>{const txt=q.options?q.options[l]:q[`option_${l}`]||'';return`<div class="pyq-opt ${q.correct===l?'correct':''}">${l}. ${esc(txt)}</div>`;}).join('');
  const sol=(q.explanation||'').replace(/<[^>]+>/g,'').slice(0,400)||q.trick||'';
  return`<div class="pyq-card">
    <div class="pyq-meta">${q.year?`<span class="pyq-tag yr">${q.year}</span>`:''} ${q.shift?`<span class="pyq-tag">${q.shift}</span>`:''}</div>
    <div class="pyq-q">Q${q.qNum||i+1}. ${esc(q.text||'')}</div>
    <div class="pyq-opts">${opts}</div>
    ${sol?`<button class="sol-btn" onclick="var s=this.nextElementSibling;s.classList.toggle('show');this.textContent=s.classList.contains('show')?'🙈 Hide':'💡 Solution'">💡 Solution</button><div class="sol-txt">${esc(sol)}</div>`:''}
  </div>`;
}
window.toggleSB=()=>{const sb=document.getElementById('sidebar'),ov=document.getElementById('overlay');const o=sb.classList.toggle('open');ov.classList.toggle('show',o);document.body.style.overflow=o?'hidden':'';};
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');document.body.style.overflow='';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
