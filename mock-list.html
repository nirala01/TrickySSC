<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mock Tests — TrickySSC</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3MMDNVBJQN"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3MMDNVBJQN');</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F1F5F9;color:#1E293B;min-height:100vh;}
.topbar{background:linear-gradient(135deg,#FF6B00,#FF8C38);padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:8px;}
.brand{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani';font-size:14px;font-weight:700;color:#fff;}
.topbar-brand{font-family:'Rajdhani';font-size:1rem;font-weight:700;color:#fff;}
.back-btn{background:rgba(255,255,255,0.2);color:#fff;padding:0.28rem 0.75rem;border-radius:100px;font-size:0.75rem;font-weight:600;text-decoration:none;}
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.page-header{margin-bottom:1.5rem;}
.page-header h1{font-family:'Rajdhani';font-size:1.6rem;font-weight:700;margin-bottom:0.25rem;}
.page-header p{font-size:0.85rem;color:#64748B;}
.tier-tabs{display:flex;gap:0.4rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.tier-tab{background:#fff;border:1.5px solid #E2E8F0;color:#64748B;padding:0.4rem 1rem;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.tier-tab.active{background:#FF6B00;border-color:#FF6B00;color:#fff;}
.mock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.mock-card{background:#fff;border-radius:14px;border:1px solid #E2E8F0;padding:1.25rem;transition:all 0.2s;cursor:pointer;text-decoration:none;display:block;color:inherit;}
.mock-card:hover{box-shadow:0 6px 24px rgba(0,0,0,0.1);transform:translateY(-2px);border-color:#FF6B00;}
.mock-num{display:inline-flex;align-items:center;gap:0.35rem;background:#FFF7ED;color:#C2410C;border-radius:8px;padding:0.2rem 0.6rem;font-size:0.72rem;font-weight:700;margin-bottom:0.65rem;}
.mock-title{font-family:'Rajdhani';font-size:1.05rem;font-weight:700;color:#1E293B;margin-bottom:0.5rem;line-height:1.3;}
.mock-meta{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.85rem;}
.mock-tag{background:#F1F5F9;color:#64748B;border-radius:100px;padding:0.15rem 0.55rem;font-size:0.68rem;font-weight:600;}
.mock-footer{display:flex;align-items:center;justify-content:space-between;}
.start-link{background:linear-gradient(135deg,#FF6B00,#FF8C38);color:#fff;border-radius:8px;padding:0.45rem 1rem;font-size:0.8rem;font-weight:700;border:none;cursor:pointer;}
.free-tag{background:#F0FDF4;color:#15803D;border-radius:100px;padding:0.12rem 0.5rem;font-size:0.68rem;font-weight:700;}
.paid-tag{background:#FFF7ED;color:#C2410C;border-radius:100px;padding:0.12rem 0.5rem;font-size:0.68rem;font-weight:700;}
.empty-state{text-align:center;padding:3rem 1rem;color:#94A3B8;}
.empty-state h3{font-family:'Rajdhani';font-size:1.2rem;margin-bottom:0.5rem;color:#64748B;}
.empty-state p{font-size:0.85rem;line-height:1.6;}
.spinner{width:32px;height:32px;border:3px solid #E2E8F0;border-top-color:#FF6B00;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="brand">T</div>
    <span class="topbar-brand" id="pageTitle">Mock Tests</span>
  </div>
  <a href="index.html" class="back-btn">← Home</a>
</div>

<div class="page">
  <div class="page-header">
    <h1 id="headerTitle">🎯 Mock Test Series</h1>
    <p id="headerSub">Timer • Section-wise analysis • Detailed solutions</p>
  </div>

  <div class="tier-tabs" id="tierTabs"></div>
  <div id="mockGrid" class="mock-grid">
    <div style="grid-column:1/-1;text-align:center;padding:2.5rem;">
      <div class="spinner"></div>
      <p style="color:#94A3B8;font-size:0.85rem;">Loading mock tests...</p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey:'AIzaSyC4kjEYEZ6Zit9su9V5xpUhMd7vLhE90zA',
  authDomain:'trickyssc-17bb3.firebaseapp.com',
  projectId:'trickyssc-17bb3',
  storageBucket:'trickyssc-17bb3.firebasestorage.app',
  messagingSenderId:'450627057220',
  appId:'1:450627057220:web:366267bf437d94f20c6e11'
});
const db = getFirestore(app);

const params   = new URLSearchParams(window.location.search);
const exam     = params.get('exam') || 'ssc-cgl';
const examName = exam.toUpperCase().replace('-',' ');

// Update page titles
document.getElementById('pageTitle').textContent  = examName + ' Mocks';
document.getElementById('headerTitle').textContent = '🎯 ' + examName + ' Mock Tests';
document.getElementById('headerSub').textContent   = 'Full-length mock tests based on PYQ papers';
document.title = examName + ' Mock Tests — TrickySSC';

let allMocks = [];
let activeTier = 'all';

// Load mocks from Firestore
try {
  const snap = await getDocs(query(
    collection(db, 'mock_tests'),
    where('exam', '==', exam),
    where('isPublished', '==', true)
  ));

  allMocks = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a,b) => (a.seriesNum||99) - (b.seriesNum||99));

  // Build tier tabs
  const tiers = ['all', ...new Set(allMocks.map(m => m.tier).filter(Boolean))];
  const tabs  = document.getElementById('tierTabs');
  tabs.innerHTML = tiers.map(t => `
    <button class="tier-tab ${t==='all'?'active':''}" onclick="filterTier('${t}',this)">
      ${t === 'all' ? 'All' : t}
    </button>`).join('');

  renderMocks(allMocks);

} catch(e) {
  document.getElementById('mockGrid').innerHTML = `
    <div style="grid-column:1/-1;" class="empty-state">
      <h3>⚠️ Could not load</h3>
      <p>${e.message}</p>
    </div>`;
}

window.filterTier = (tier, btn) => {
  activeTier = tier;
  document.querySelectorAll('.tier-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const filtered = tier === 'all' ? allMocks : allMocks.filter(m => m.tier === tier);
  renderMocks(filtered);
};

function renderMocks(mocks) {
  const grid = document.getElementById('mockGrid');
  if (!mocks.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;" class="empty-state">
      <h3>📭 No Mock Tests Yet</h3>
      <p>Mock tests for ${examName} haven't been published yet.<br>Check back soon — new mocks are added regularly!</p>
    </div>`;
    return;
  }

  grid.innerHTML = mocks.map(m => {
    const url = `mock-test.html?exam=${encodeURIComponent(exam)}&series=${m.seriesNum}&tier=${encodeURIComponent(m.tier||'Tier I')}&mockId=${encodeURIComponent(m.mockId||'')}`;
    return `<a class="mock-card" href="${url}">
      <div class="mock-num">🎯 Mock #${m.seriesNum}</div>
      <div class="mock-title">${m.title || examName + ' Mock Test ' + m.seriesNum}</div>
      <div class="mock-meta">
        <span class="mock-tag">📋 ${m.totalQuestions || 100} Qs</span>
        <span class="mock-tag">⏱ ${m.duration || 60} min</span>
        <span class="mock-tag">📊 ${m.totalMarks || 200} marks</span>
        <span class="mock-tag">${m.tier || 'Tier I'}</span>
        ${m.sourcePaperId ? `<span class="mock-tag">📄 Based on PYQ</span>` : ''}
      </div>
      <div class="mock-footer">
        <span class="${m.isPaid ? 'paid-tag' : 'free-tag'}">${m.isPaid ? '🔒 Premium' : '✅ Free'}</span>
        <span class="start-link">Start Test →</span>
      </div>
    </a>`;
  }).join('');
}
</script>
</body>
</html>
