<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Today's Current Affairs — TrickySSC</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3MMDNVBJQN"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3MMDNVBJQN');</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F0F4F8;color:#1E293B;min-height:100vh;}

/* Topbar */
.topbar{background:linear-gradient(135deg,#FF6B00,#FF8C38);padding:0.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.brand{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani';font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.topbar-title{font-family:'Rajdhani';font-size:1.15rem;font-weight:700;color:#fff;}
.back-btn{background:rgba(255,255,255,0.2);color:#fff;padding:0.3rem 0.9rem;border-radius:100px;font-size:0.78rem;font-weight:600;text-decoration:none;transition:background 0.2s;}
.back-btn:hover{background:rgba(255,255,255,0.35);}

/* Page */
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;}

/* Header */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.25rem;}
.page-header h1{font-family:'Rajdhani';font-size:1.7rem;font-weight:700;color:#1E293B;line-height:1.2;}
.page-header p{font-size:0.82rem;color:#64748B;margin-top:3px;}
.date-chip{background:#fff;border:1px solid #E2E8F0;border-radius:100px;padding:0.35rem 1rem;font-size:0.8rem;font-weight:600;color:#FF6B00;box-shadow:0 1px 4px rgba(0,0,0,0.06);white-space:nowrap;}

/* Stats bar */
.stats-bar{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:0.75rem 1.1rem;display:flex;gap:1.25rem;flex-wrap:wrap;align-items:center;margin-bottom:1.1rem;font-size:0.8rem;}
.stat{display:flex;align-items:center;gap:0.35rem;color:#64748B;}
.stat strong{color:#1E293B;font-weight:700;}
.stat-sep{color:#E2E8F0;}
.update-time{margin-left:auto;font-size:0.72rem;color:#94A3B8;}

/* Category pills */
.cat-filter{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.cat-pill{background:#fff;border:1.5px solid #E2E8F0;border-radius:100px;padding:0.32rem 0.85rem;font-size:0.75rem;font-weight:600;cursor:pointer;color:#64748B;transition:all 0.15s;font-family:'Plus Jakarta Sans';}
.cat-pill.active{color:#fff;border-color:transparent;}
.cat-pill:hover:not(.active){border-color:#FF6B00;color:#FF6B00;}

/* News cards */
.news-grid{display:flex;flex-direction:column;gap:0.9rem;}
.news-card{background:#fff;border-radius:14px;padding:1.1rem 1.3rem;box-shadow:0 1px 4px rgba(0,0,0,0.05);border:1px solid #E2E8F0;transition:box-shadow 0.2s,transform 0.15s;}
.news-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.09);transform:translateY(-1px);}

.card-meta{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.6rem;flex-wrap:wrap;}
.cat-badge{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:0.18rem 0.65rem;border-radius:100px;}
.card-title{font-size:0.97rem;font-weight:700;color:#1E293B;line-height:1.45;margin-bottom:0.5rem;}
.card-summary{font-size:0.83rem;color:#475569;line-height:1.7;margin-bottom:0.6rem;}
.key-points{margin:0.5rem 0 0.6rem 0;padding-left:1.1rem;}
.key-points li{font-size:0.8rem;color:#374151;line-height:1.6;margin-bottom:0.2rem;}
.exam-tip{background:#FFF7ED;border-left:3px solid #FF6B00;border-radius:0 6px 6px 0;padding:0.4rem 0.7rem;font-size:0.76rem;color:#92400E;margin-top:0.5rem;line-height:1.5;}
.exam-tip strong{color:#EA580C;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem;flex-wrap:wrap;gap:0.4rem;}
.tags{display:flex;gap:0.3rem;flex-wrap:wrap;}
.tag{background:#F1F5F9;color:#64748B;padding:0.16rem 0.55rem;border-radius:100px;font-size:0.68rem;font-weight:500;}
.src-link{font-size:0.73rem;color:#FF6B00;font-weight:600;text-decoration:none;opacity:0.8;}
.src-link:hover{opacity:1;text-decoration:underline;}

/* Category colors */
.cat-polity  {background:#EFF6FF;color:#2563EB;}
.cat-economy {background:#F0FDF4;color:#16A34A;}
.cat-science {background:#FDF4FF;color:#9333EA;}
.cat-intl    {background:#FFF7ED;color:#EA580C;}
.cat-environ {background:#ECFDF5;color:#059669;}
.cat-society {background:#FFF1F2;color:#E11D48;}
.cat-defence {background:#F8FAFC;color:#334155;}
.cat-sports  {background:#FFFBEB;color:#D97706;}
.cat-awards  {background:#FDF4FF;color:#7C3AED;}
.cat-general {background:#F1F5F9;color:#64748B;}

/* Loading */
.loading-wrap{text-align:center;padding:3rem 1rem;}
.spinner{width:38px;height:38px;border:3px solid #E2E8F0;border-top-color:#FF6B00;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.9rem;color:#64748B;font-weight:600;}
.loading-sub{font-size:0.78rem;color:#94A3B8;margin-top:0.35rem;}

/* Error */
.error-wrap{background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:1.5rem;text-align:center;}
.error-title{color:#EF4444;font-weight:700;font-size:1rem;margin-bottom:0.5rem;}
.error-sub{color:#94A3B8;font-size:0.82rem;margin-bottom:1rem;}
.src-links{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;}
.src-btn{padding:0.5rem 1.1rem;border-radius:8px;font-size:0.82rem;font-weight:600;text-decoration:none;color:#fff;}

/* Empty */
.empty{text-align:center;padding:2.5rem;color:#94A3B8;}
.empty-icon{font-size:2.5rem;margin-bottom:0.5rem;}

/* Sources footer */
.sources-footer{margin-top:1.5rem;background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;padding:0.8rem 1rem;font-size:0.78rem;color:#92400E;line-height:1.7;}
.sources-footer a{color:#EA580C;font-weight:600;}

/* No results */
.no-results{text-align:center;padding:2rem;color:#94A3B8;font-size:0.88rem;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="brand">T</div>
    <span class="topbar-title">TrickySSC — Current Affairs</span>
  </div>
  <a href="index.html" class="back-btn">← Home</a>
</div>

<div class="page">

  <div class="page-header">
    <div>
      <h1>📰 Today's Current Affairs</h1>
      <p>Summarized from Drishti IAS &amp; Adda247 — rephrased for SSC exam prep</p>
    </div>
    <span class="date-chip" id="dateChip">Loading...</span>
  </div>

  <div id="root">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Loading current affairs...</div>
      <div class="loading-sub">Fetching today's content</div>
    </div>
  </div>

</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
// Replace with your GitHub username and repo
const DATA_URL = 'https://raw.githubusercontent.com/nirala01/TrickySSC/main/current-affairs-data.json';

// ── Category config ────────────────────────────────────────────────────────
const CATS = {
  polity:  { label:'Polity & Governance', color:'#2563EB' },
  economy: { label:'Economy',             color:'#16A34A' },
  science: { label:'Science & Tech',      color:'#9333EA' },
  intl:    { label:'International',       color:'#EA580C' },
  environ: { label:'Environment',         color:'#059669' },
  society: { label:'Society & Education', color:'#E11D48' },
  defence: { label:'Defence',             color:'#334155' },
  sports:  { label:'Sports',              color:'#D97706' },
  awards:  { label:'Awards & Rankings',   color:'#7C3AED' },
  general: { label:'General',             color:'#64748B' },
};

let allItems    = [];
let activeFilter = 'all';

// ── Load ───────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    document.getElementById('dateChip').textContent = data.date || 'Today';

    if (data.error || !data.items || !data.items.length) {
      showError(data.error || 'No items found', data.sources || []);
      return;
    }

    allItems = data.items;
    render(data);

  } catch(err) {
    showError(err.message, []);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(data) {
  // Build category list from actual items
  const usedCats = [...new Set(allItems.map(i => i.category || 'general'))];

  // Stats
  const statsHtml = `
    <div class="stats-bar">
      <div class="stat">📰 <strong>${allItems.length}</strong> items</div>
      <span class="stat-sep">·</span>
      <div class="stat">📅 <strong>${data.date}</strong></div>
      <div class="update-time">Updated: ${formatTime(data.generatedAt)}</div>
    </div>`;

  // Category filter pills
  let pillsHtml = `<button class="cat-pill active" data-cat="all"
    style="background:#FF6B00;color:#fff;border-color:#FF6B00;"
    onclick="filterCat('all',this)">All (${allItems.length})</button>`;

  usedCats.forEach(cat => {
    const cfg   = CATS[cat] || CATS.general;
    const count = allItems.filter(i => (i.category||'general') === cat).length;
    pillsHtml += `<button class="cat-pill" data-cat="${cat}"
      onclick="filterCat('${cat}',this)">${cfg.label} (${count})</button>`;
  });

  document.getElementById('root').innerHTML =
    statsHtml +
    `<div class="cat-filter" id="catFilter">${pillsHtml}</div>` +
    `<div class="news-grid" id="grid"></div>` +
    buildSourcesFooter(data.sources);

  renderGrid(allItems);
}

function renderGrid(items) {
  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = `<div class="no-results">No items for this category</div>`;
    return;
  }
  grid.innerHTML = items.map(buildCard).join('');
}

function buildCard(item) {
  const cat    = item.category || 'general';
  const cfg    = CATS[cat] || CATS.general;
  const kp     = (item.keyPoints || []).slice(0,4).map(p => `<li>${esc(p)}</li>`).join('');
  const tags   = (item.tags || []).slice(0,4).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  const srcUrl = 'https://www.drishtiias.com/current-affairs-news-analysis-editorials';

  return `<div class="news-card">
    <div class="card-meta">
      <span class="cat-badge cat-${cat}">${cfg.label}</span>
    </div>
    <div class="card-title">${esc(item.title || '')}</div>
    <div class="card-summary">${esc(item.summary || '')}</div>
    ${kp ? `<ul class="key-points">${kp}</ul>` : ''}
    ${item.examRelevance
      ? `<div class="exam-tip"><strong>📚 SSC Tip:</strong> ${esc(item.examRelevance)}</div>`
      : ''}
    <div class="card-footer">
      <div class="tags">${tags}</div>
      <a href="${srcUrl}" target="_blank" rel="noopener" class="src-link">Read more ↗</a>
    </div>
  </div>`;
}

function buildSourcesFooter(sources) {
  const links = (sources || []).map((s,i) =>
    `<a href="${s}" target="_blank" rel="noopener">${i===0?'Drishti IAS':'Adda247'}</a>`
  ).join(' and ');
  return `<div class="sources-footer">
    📌 Content sourced &amp; rephrased from ${links || 'Drishti IAS and Adda247'}.
    All content is AI-summarized and rephrased — visit source sites for full detailed analysis.
  </div>`;
}

// ── Filter ─────────────────────────────────────────────────────────────────
window.filterCat = (cat, btn) => {
  activeFilter = cat;
  document.querySelectorAll('.cat-pill').forEach(p => {
    const isCat = p.dataset.cat === cat;
    p.classList.toggle('active', isCat);
    if (isCat) {
      const cfg = cat === 'all' ? { color:'#FF6B00' } : (CATS[cat] || CATS.general);
      p.style.background  = cfg.color;
      p.style.color       = '#fff';
      p.style.borderColor = 'transparent';
    } else {
      p.style.background  = '';
      p.style.color       = '';
      p.style.borderColor = '';
    }
  });
  const filtered = cat === 'all' ? allItems : allItems.filter(i => (i.category||'general') === cat);
  renderGrid(filtered);
};

// ── Error ──────────────────────────────────────────────────────────────────
function showError(msg, sources) {
  const dDate = getDrishtiDate();
  document.getElementById('root').innerHTML = `
    <div class="error-wrap">
      <div class="error-title">⚠️ Could not load today's current affairs</div>
      <div class="error-sub">${msg || 'The daily update may not have run yet. Try again after 6 AM IST.'}</div>
      <div style="font-size:0.82rem;color:#64748B;margin-bottom:0.75rem;">Read directly from source:</div>
      <div class="src-links">
        <a class="src-btn" style="background:#2563EB;"
           href="https://www.drishtiias.com/current-affairs-news-analysis-editorials/news-analysis/${dDate}"
           target="_blank">Drishti IAS ↗</a>
        <a class="src-btn" style="background:#16A34A;"
           href="https://currentaffairs.adda247.com/"
           target="_blank">Adda247 ↗</a>
      </div>
    </div>`;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatTime(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('en-IN',{
      day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:true
    });
  } catch(e) { return iso; }
}
function getDrishtiDate() {
  const d  = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}-${mm}-${d.getFullYear()}`;
}

// ── Boot ───────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
