<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily Current Affairs — TrickySSC</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3MMDNVBJQN"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3MMDNVBJQN');</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F1F5F9;color:#1E293B;min-height:100vh;}

/* ── Topbar ── */
.topbar{background:linear-gradient(135deg,#FF6B00,#FF8C38);padding:0.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;position:sticky;top:0;z-index:200;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.brand{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani';font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.topbar-brand{font-family:'Rajdhani';font-size:1.15rem;font-weight:700;color:#fff;}
.back-btn{background:rgba(255,255,255,0.2);color:#fff;padding:0.3rem 0.9rem;border-radius:100px;font-size:0.78rem;font-weight:600;text-decoration:none;}
.back-btn:hover{background:rgba(255,255,255,0.35);}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:calc(100vh - 56px);}
@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .sidebar.mobile-open{display:flex;}
  .mobile-bar{display:flex!important;}
}

/* ── Sidebar ── */
.sidebar{background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow:hidden;}
.sidebar-header{background:linear-gradient(135deg,#FF6B00,#FF8C38);color:#fff;padding:1rem 1.1rem;font-family:'Rajdhani';font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:0.5rem;flex-shrink:0;}
.date-list{overflow-y:auto;flex:1;}
.date-list::-webkit-scrollbar{width:4px;}
.date-list::-webkit-scrollbar-track{background:#F8FAFC;}
.date-list::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}
.date-entry{display:flex;align-items:center;gap:0.65rem;padding:0.85rem 1.1rem;cursor:pointer;border-bottom:1px solid #F1F5F9;transition:all 0.15s;border-left:3px solid transparent;}
.date-entry:hover{background:#FFF7ED;border-left-color:#FF6B00;}
.date-entry.active{background:#FFF7ED;border-left-color:#FF6B00;}
.date-entry.active .date-day{color:#FF6B00;}
.date-entry.active .date-label{color:#FF6B00;font-weight:700;}
.date-icon{color:#94A3B8;font-size:0.85rem;flex-shrink:0;}
.date-entry.active .date-icon{color:#FF6B00;}
.date-label{font-size:0.87rem;font-weight:500;color:#374151;flex:1;}
.date-count{background:#F1F5F9;color:#64748B;border-radius:100px;padding:0.1rem 0.5rem;font-size:0.68rem;font-weight:600;}
.date-entry.active .date-count{background:#FF6B00;color:#fff;}
.date-arrow{color:#CBD5E1;font-size:0.8rem;}
.no-dates{padding:2rem 1rem;text-align:center;color:#94A3B8;font-size:0.82rem;}

/* ── Mobile date bar ── */
.mobile-bar{display:none;background:#fff;border-bottom:1px solid #E2E8F0;padding:0.6rem 1rem;gap:0.4rem;overflow-x:auto;flex-wrap:nowrap;}
.mobile-bar::-webkit-scrollbar{display:none;}
.mob-date-pill{background:#F1F5F9;border:1.5px solid #E2E8F0;border-radius:8px;padding:0.3rem 0.75rem;font-size:0.75rem;font-weight:600;cursor:pointer;color:#64748B;white-space:nowrap;flex-shrink:0;}
.mob-date-pill.active{background:#FF6B00;border-color:#FF6B00;color:#fff;}

/* ── Content panel ── */
.content-panel{padding:1.5rem;overflow-y:auto;}

/* ── Content header ── */
.content-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.1rem;}
.content-title{font-family:'Rajdhani';font-size:1.5rem;font-weight:700;color:#1E293B;}
.content-date-chip{background:#FF6B00;color:#fff;border-radius:8px;padding:0.3rem 0.85rem;font-size:0.8rem;font-weight:600;}

/* ── Stats bar ── */
.stats-bar{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:0.65rem 1rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;font-size:0.78rem;}
.stat{display:flex;align-items:center;gap:0.3rem;color:#64748B;}
.stat strong{color:#1E293B;}
.upd-time{margin-left:auto;font-size:0.7rem;color:#94A3B8;}

/* ── Category filter ── */
.cat-bar{display:flex;gap:0.35rem;flex-wrap:wrap;margin-bottom:1rem;}
.cat-pill{background:#fff;border:1.5px solid #E2E8F0;border-radius:100px;padding:0.28rem 0.8rem;font-size:0.73rem;font-weight:600;cursor:pointer;color:#64748B;transition:all 0.15s;}
.cat-pill.active{color:#fff;border-color:transparent;}
.cat-pill:hover:not(.active){border-color:#FF6B00;color:#FF6B00;}

/* ── News cards ── */
.news-list{display:flex;flex-direction:column;gap:0.85rem;}
.news-card{background:#fff;border-radius:12px;padding:1.1rem 1.25rem;border:1px solid #E2E8F0;transition:box-shadow 0.2s,transform 0.15s;}
.news-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-1px);}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.55rem;flex-wrap:wrap;}
.cat-badge{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:0.18rem 0.6rem;border-radius:100px;}
.card-title{font-size:0.95rem;font-weight:700;color:#1E293B;line-height:1.45;margin-bottom:0.5rem;}

/* Section blocks */
.why-block{background:#EFF6FF;border-left:3px solid #3B82F6;border-radius:0 8px 8px 0;padding:0.45rem 0.75rem;margin-bottom:0.5rem;}
.why-lbl{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#1D4ED8;margin-bottom:0.2rem;}
.why-text{font-size:0.8rem;color:#1E40AF;line-height:1.6;}
.summary{font-size:0.82rem;color:#475569;line-height:1.7;margin-bottom:0.5rem;}
.kp-lbl{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#64748B;margin-bottom:0.25rem;}
.kp-list{padding-left:1.1rem;margin-bottom:0.5rem;}
.kp-list li{font-size:0.78rem;color:#374151;line-height:1.6;}
.imp-block{background:#F0FDF4;border-left:3px solid #16A34A;border-radius:0 8px 8px 0;padding:0.45rem 0.75rem;margin-bottom:0.5rem;}
.imp-lbl{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#15803D;margin-bottom:0.2rem;}
.imp-list{padding-left:1.1rem;}
.imp-list li{font-size:0.78rem;color:#166534;line-height:1.6;}
.tip-block{background:#FFF7ED;border-left:3px solid #FF6B00;border-radius:0 6px 6px 0;padding:0.35rem 0.65rem;font-size:0.75rem;color:#92400E;margin-top:0.4rem;}
.tip-block strong{color:#C2410C;}
.card-tags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.6rem;}
.tag{background:#F1F5F9;color:#64748B;padding:0.15rem 0.55rem;border-radius:100px;font-size:0.67rem;font-weight:500;}

/* Category colors */
.cat-polity  {background:#EFF6FF;color:#1D4ED8;}
.cat-economy {background:#F0FDF4;color:#15803D;}
.cat-science {background:#FDF4FF;color:#7C3AED;}
.cat-intl    {background:#FFF7ED;color:#C2410C;}
.cat-environ {background:#ECFDF5;color:#065F46;}
.cat-society {background:#FFF1F2;color:#BE123C;}
.cat-defence {background:#F8FAFC;color:#334155;}
.cat-sports  {background:#FFFBEB;color:#92400E;}
.cat-awards  {background:#F5F3FF;color:#5B21B6;}
.cat-general {background:#F1F5F9;color:#475569;}

/* Loading / error / empty */
.spinner{width:36px;height:36px;border:3px solid #E2E8F0;border-top-color:#FF6B00;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.center-box{text-align:center;padding:3rem 1rem;color:#94A3B8;}
.center-box h3{font-family:'Rajdhani';font-size:1.2rem;color:#64748B;margin-bottom:0.4rem;}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:1.25rem;text-align:center;}
.err-title{color:#EF4444;font-weight:700;margin-bottom:0.4rem;}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="brand">T</div>
    <span class="topbar-brand">TrickySSC — Current Affairs</span>
  </div>
  <a href="index.html" class="back-btn">← Home</a>
</div>

<!-- Mobile date bar -->
<div class="mobile-bar" id="mobileDateBar"></div>

<!-- Main layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">📅 Daily Current Affairs</div>
    <div class="date-list" id="dateList">
      <div class="no-dates">
        <div class="spinner"></div>
        Loading dates...
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content-panel" id="contentPanel">
    <div class="center-box">
      <div class="spinner"></div>
      <h3>Loading...</h3>
      <p style="font-size:0.82rem;">Fetching today's current affairs</p>
    </div>
  </div>

</div>

<script>
const REPO         = 'nirala01/TrickySSC';
const BRANCH       = 'main';
const RAW          = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const INDEX_URL    = `${RAW}/ca-archive/index.json`;
const TODAY_URL    = `${RAW}/current-affairs-data.json`;
const ARCHIVE_BASE = `${RAW}/ca-archive`;

const CATS = {
  polity:'Polity & Governance', economy:'Economy', science:'Science & Tech',
  intl:'International', environ:'Environment', society:'Society & Education',
  defence:'Defence', sports:'Sports', awards:'Awards & Rankings', general:'General'
};

let archiveIndex = [];
let activeDate   = null;
let allItems     = [];
let activeFilter = 'all';

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadIndex();
  // Load today by default
  if (archiveIndex.length) {
    loadDate(archiveIndex[0].dateKey);
  } else {
    // Try main file directly
    loadTodayFallback();
  }
});

async function loadIndex() {
  try {
    const res = await fetch(INDEX_URL + '?v=' + Date.now());
    if (res.ok) archiveIndex = await res.json();
  } catch(e) {}
  renderSidebar();
  renderMobileBar();
}

async function loadDate(dateKey) {
  activeDate   = dateKey;
  activeFilter = 'all';
  highlightSidebar(dateKey);
  highlightMobileBar(dateKey);
  showContentLoading();

  try {
    const entry = archiveIndex.find(e => e.dateKey === dateKey);
    // Try archive first, then main file
    let url = `${ARCHIVE_BASE}/ca-${dateKey}.json?v=` + Date.now();
    let res = await fetch(url);
    if (!res.ok) {
      res = await fetch(TODAY_URL + '?v=' + Date.now());
    }
    if (!res.ok) throw new Error('Content not found');
    const data = await res.json();
    if (!data.items || !data.items.length) throw new Error('No items for this date');
    allItems = data.items;
    renderContent(data);
  } catch(err) {
    showContentError(err.message);
  }
}

async function loadTodayFallback() {
  try {
    const res = await fetch(TODAY_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('No current affairs yet');
    const data = await res.json();
    if (!data.items || !data.items.length) throw new Error('No items available');
    allItems = data.items;
    activeDate = data.dateKey;
    renderContent(data);
  } catch(err) {
    showContentError(err.message);
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('dateList');
  if (!archiveIndex.length) {
    list.innerHTML = '<div class="no-dates">No dates available yet.<br>Add content via CA Admin.</div>';
    return;
  }
  list.innerHTML = archiveIndex.map(entry => `
    <div class="date-entry" data-key="${entry.dateKey}" onclick="loadDate('${entry.dateKey}')">
      <span class="date-icon">📅</span>
      <span class="date-label">${entry.date}</span>
      <span class="date-count">${entry.count}</span>
      <span class="date-arrow">›</span>
    </div>`).join('');
}

function highlightSidebar(dateKey) {
  document.querySelectorAll('.date-entry').forEach(el => {
    el.classList.toggle('active', el.dataset.key === dateKey);
  });
}

// ── Mobile bar ────────────────────────────────────────────────────────────────
function renderMobileBar() {
  const bar = document.getElementById('mobileDateBar');
  if (!archiveIndex.length) { bar.style.display='none'; return; }
  bar.innerHTML = archiveIndex.slice(0,15).map(entry => {
    const [dd,mm] = entry.dateKey.split('-');
    const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const label  = `${parseInt(dd)} ${months[parseInt(mm)]}`;
    return `<button class="mob-date-pill" data-key="${entry.dateKey}" onclick="loadDate('${entry.dateKey}')">${label}</button>`;
  }).join('');
}

function highlightMobileBar(dateKey) {
  document.querySelectorAll('.mob-date-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.key === dateKey);
  });
}

// ── Content ───────────────────────────────────────────────────────────────────
function renderContent(data) {
  const usedCats = [...new Set(allItems.map(i => i.category||'general'))];

  // Category pills
  let pillsHtml = `<button class="cat-pill active" data-cat="all"
    style="background:#FF6B00;color:#fff;border-color:#FF6B00;"
    onclick="filterCat('all',this)">All (${allItems.length})</button>`;
  usedCats.forEach(cat => {
    const cfg   = CATS[cat] || 'General';
    const count = allItems.filter(i=>(i.category||'general')===cat).length;
    pillsHtml += `<button class="cat-pill" data-cat="${cat}" onclick="filterCat('${cat}',this)">${typeof cfg==='string'?cfg:cfg} (${count})</button>`;
  });

  document.getElementById('contentPanel').innerHTML = `
    <div class="content-header">
      <div class="content-title">📰 Current Affairs</div>
      <div class="content-date-chip">${data.date||activeDate}</div>
    </div>
    <div class="stats-bar">
      <div class="stat">📰 <strong>${allItems.length}</strong> items</div>
      <div class="stat">📅 <strong>${data.date||''}</strong></div>
      ${data.generatedAt?`<div class="upd-time">Updated: ${fmtTime(data.generatedAt)}</div>`:''}
    </div>
    <div class="cat-bar" id="catBar">${pillsHtml}</div>
    <div class="news-list" id="newsList"></div>`;

  renderCards(allItems);
}

function renderCards(items) {
  const list = document.getElementById('newsList');
  if (!list) return;
  if (!items.length) { list.innerHTML = '<div class="center-box"><p>No items for this filter</p></div>'; return; }
  list.innerHTML = items.map(buildCard).join('');
}

function buildCard(item) {
  const cat    = item.category||'general';
  const catLbl = CATS[cat]||'General';
  const kp     = (item.keyPoints||[]).slice(0,4).map(p=>`<li>${esc(p)}</li>`).join('');
  const ip     = (item.importantPoints||[]).slice(0,5).map(p=>`<li>${esc(p)}</li>`).join('');
  const tags   = (item.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('');

  return `<div class="news-card">
    <div class="card-top">
      <span class="cat-badge cat-${cat}">${catLbl}</span>
    </div>
    <div class="card-title">${esc(item.title||'')}</div>
    ${item.whyInNews?`<div class="why-block"><div class="why-lbl">📌 Why in News?</div><div class="why-text">${esc(item.whyInNews)}</div></div>`:''}
    ${item.summary?`<div class="summary">${esc(item.summary)}</div>`:''}
    ${kp?`<div class="kp-lbl">🔑 Key Facts</div><ul class="kp-list">${kp}</ul>`:''}
    ${ip?`<div class="imp-block"><div class="imp-lbl">📝 Important Points to Remember</div><ul class="imp-list">${ip}</ul></div>`:''}
    ${item.examRelevance?`<div class="tip-block"><strong>📚 SSC Tip:</strong> ${esc(item.examRelevance)}</div>`:''}
    ${tags?`<div class="card-tags">${tags}</div>`:''}
  </div>`;
}

// ── Filter ────────────────────────────────────────────────────────────────────
window.filterCat = (cat, btn) => {
  activeFilter = cat;
  document.querySelectorAll('.cat-pill').forEach(p => {
    const isActive = p.dataset.cat === cat;
    p.classList.toggle('active', isActive);
    if (isActive) {
      const colors = { all:'#FF6B00',polity:'#1D4ED8',economy:'#15803D',science:'#7C3AED',intl:'#C2410C',environ:'#065F46',society:'#BE123C',defence:'#334155',sports:'#92400E',awards:'#5B21B6',general:'#475569' };
      p.style.background  = colors[cat]||'#FF6B00';
      p.style.color       = '#fff';
      p.style.borderColor = 'transparent';
    } else {
      p.style.background  = '';
      p.style.color       = '';
      p.style.borderColor = '';
    }
  });
  const filtered = cat === 'all' ? allItems : allItems.filter(i=>(i.category||'general')===cat);
  renderCards(filtered);
};

// ── Loading / Error states ────────────────────────────────────────────────────
function showContentLoading() {
  document.getElementById('contentPanel').innerHTML = `
    <div class="center-box">
      <div class="spinner"></div>
      <h3>Loading...</h3>
    </div>`;
}

function showContentError(msg) {
  document.getElementById('contentPanel').innerHTML = `
    <div class="err-box">
      <div class="err-title">⚠️ Could not load content</div>
      <div style="font-size:0.82rem;color:#94A3B8;">${msg||'Please try again'}</div>
    </div>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  try { return new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true}); }
  catch(e){ return ''; }
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
